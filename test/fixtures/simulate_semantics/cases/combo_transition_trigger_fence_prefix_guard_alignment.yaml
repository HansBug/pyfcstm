title: Combo transition trigger fence prefix guard alignment
origin:
  files:
  - test/simulate/test_combo_runtime_compat.py::test_middle_guard_false_rolls_back_and_uses_later_fallback_transition
  - test/simulate/test_combo_runtime_compat.py::test_priority_fence_matches_split_hand_written_pseudo_chains
  - test/simulate/test_combo_runtime_compat.py::test_prefix_reuse_matches_shared_hand_written_pseudo_chain
  notes:
  - Covers a local event-guard-event combo whose middle guard fails after the first event is present, so validation must roll back and allow a later plain event fallback to commit source exit, fallback effect, and target enter actions.
  - Covers a priority fence where the earlier combo must win over a later plain event fallback when the full combo succeeds.
  - Covers both terminal branches that share the same combo prefix from one source state, so generated runtimes must preserve prefix sharing and terminal edge ordering for both branches.
  - The fixture is consumed by both the simulator and generated Python runtime alignment runners.
categories:
- runtime
- template_alignment
- pseudo_chain
- lifecycle
