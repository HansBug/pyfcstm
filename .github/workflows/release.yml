              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload controlled CLI evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-release-cli-controlled-ubuntu
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-controlled-cli-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt

  release_cli_publish:
    name: Upload verified standalone artifact (${{ matrix.os }})
    runs-on: ubuntu-22.04
    needs: [resolve_release_target, release_gate, release_cli_stage, release_cli_fresh, release_cli_controlled_linux]
    if: ${{ needs.resolve_release_target.result == 'success' && needs.release_gate.result == 'success' && needs.release_cli_stage.result == 'success' && needs.release_cli_fresh.result == 'success' && needs.release_cli_controlled_linux.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
    steps:
      - name: Download the exact verified CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: pyfcstm-release-cli-${{ matrix.os }}
          path: ${{ runner.temp }}/pyfcstm-release-cli
      - name: Upload binary to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: ${{ needs.resolve_release_target.outputs.tag }}
          TARGET_COMMIT: ${{ needs.resolve_release_target.outputs.full_commit }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$TARGET_TAG"
          archive=$(find "$RUNNER_TEMP/pyfcstm-release-cli" -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$archive"
          identity=$(find "$RUNNER_TEMP/pyfcstm-release-cli" -maxdepth 1 -name build-identity.txt -print -quit)
          digest_file=$(find "$RUNNER_TEMP/pyfcstm-release-cli" -maxdepth 1 -name artifact-sha256.txt -print -quit)
          test -n "$identity" -a -n "$digest_file"
          grep -F "full_commit=$TARGET_COMMIT" "$identity"
          grep -F "tag=$tag" "$identity"
          archive_name=$(basename "$archive")
          expected_digest=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          actual_digest=$(python - "$archive" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$archive")"
          gh release upload "$tag" "$archive" --clobber

  release_finalize:
    name: Finalize verified draft release
    runs-on: ubuntu-22.04
    needs: [resolve_release_target, package_publish, release_cli_publish]
    if: ${{ needs.resolve_release_target.result == 'success' && needs.package_publish.result == 'success' && needs.release_cli_publish.result == 'success' }}
    steps:
      - name: Publish the verified draft only
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: ${{ needs.resolve_release_target.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$TARGET_TAG"
          gh release edit "$tag" --draft=false

  release_vscode_extension:
    name: VSCode Extension Build And Release
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'hansbug/pyfcstm' && github.event_name == 'release' && github.event.action == 'published' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-build.txt

      - name: Download ANTLR
        run: |
          make antlr

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce (VSCode Extension Manager)
        run: |
          npm install -g @vscode/vsce

      - name: Get extension version
        id: ext_version
        run: |
          cd editors/vscode
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "NAME=${NAME}" >> $GITHUB_OUTPUT
          echo "Extension: ${NAME} v${VERSION}"

      - name: Build VSCode extension using make
        run: |
          make vscode
          ls -lh editors/vscode/build/

      - name: Find and verify extension file
        id: find_vsix
        run: |
          VSIX_FILE=$(find editors/vscode/build -name "*.vsix" -type f | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No .vsix file found in editors/vscode/build/"
            exit 1
          fi
          echo "Found extension: $VSIX_FILE"
          echo "VSIX_FILE=${VSIX_FILE}" >> $GITHUB_OUTPUT
          echo "VSIX_BASENAME=$(basename ${VSIX_FILE})" >> $GITHUB_OUTPUT

      # Publish to VSCode Marketplace (commented out until configured)
      # - name: Publish to VSCode Marketplace
      #   run: |
      #     cd editors/vscode
      #     vsce publish -p ${{ secrets.VSCE_PAT }}
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Publish to Open VSX Registry (commented out until configured)
      # - name: Publish to Open VSX
      #   run: |
      #     npm install -g ovsx
      #     cd editors/vscode
      #     ovsx publish -p ${{ secrets.OVSX_PAT }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload VSCode extension to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.find_vsix.outputs.VSIX_FILE }}
          asset_name: ${{ steps.find_vsix.outputs.VSIX_BASENAME }}
          tag: ${{ github.ref }}
          overwrite: true
