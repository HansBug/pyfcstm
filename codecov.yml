coverage:
  status:
    project:
      default:
        # basic
        target: auto
        threshold: 3%
        if_ci_failed: success #success, failure, error, ignore

# Two flags upload from .github/workflows/test.yml:
#   - ``python``: pytest + coverage.xml from the matrix unittest job
#   - ``jsfcstm``: mocha + c8 lcov.info from the standalone jsfcstm job
# Codecov merges these into a single project total; the flag rows on
# the PR comment let reviewers see per-side coverage at a glance.
flags:
  python:
    paths:
      - pyfcstm/
    carryforward: true
  jsfcstm:
    paths:
      - editors/jsfcstm/src/
    carryforward: true

# The jsfcstm grammar files are generated by ANTLR and should not count
# toward coverage. Same for raw / synth model bridges that are exposed
# only for compatibility.
ignore:
  - "editors/jsfcstm/src/dsl/grammar/**"
  - "editors/jsfcstm/src/model/raw.ts"
  - "editors/jsfcstm/src/model/model.ts"
  - "editors/jsfcstm/src/diagram/model.ts"
