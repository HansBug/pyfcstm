#file: noinspection YAMLSchemaValidation
name: jsfcstm Test

on:
  - push
  - workflow_dispatch

jobs:
  jsfcstm-unit:
    name: jsfcstm unit tests
    runs-on: ubuntu-22.04
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'js skip') }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Java (ANTLR runtime for parser generation)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download ANTLR jar
        run: |
          wget -q -O antlr-4.9.3.jar https://www.antlr.org/download/antlr-4.9.3-complete.jar
          ls -lh antlr-4.9.3.jar
      - name: Install jsfcstm dependencies
        working-directory: editors/jsfcstm
        run: make install
      - name: Build jsfcstm (parser + tsc)
        working-directory: editors/jsfcstm
        run: make build
      - name: Run jsfcstm unit tests
        working-directory: editors/jsfcstm
        run: npm run test:unit
