expr_styles:
  python_native_expr:
    base_lang: dsl
    Name: "self._vars[{{ node.name | repr }}]"
    Paren: "({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc: "math.{{ node.func }}({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc(abs): "abs({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc(round): "round({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc(ceil): "math.ceil({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc(floor): "math.floor({{ node.expr | expr_render(style='python_native_expr') }})"
    UFunc(trunc): "math.trunc({{ node.expr | expr_render(style='python_native_expr') }})"
    UnaryOp: "{{ node.op }}{{ node.expr | expr_render(style='python_native_expr') }}"
    UnaryOp(!): "not {{ node.expr | expr_render(style='python_native_expr') }}"
    BinaryOp: "{{ node.expr1 | expr_render(style='python_native_expr') }} {{ node.op }} {{ node.expr2 | expr_render(style='python_native_expr') }}"
    BinaryOp(&&): "{{ node.expr1 | expr_render(style='python_native_expr') }} and {{ node.expr2 | expr_render(style='python_native_expr') }}"
    BinaryOp(||): "{{ node.expr1 | expr_render(style='python_native_expr') }} or {{ node.expr2 | expr_render(style='python_native_expr') }}"
    ConditionalOp: "{{ node.value_true | expr_render(style='python_native_expr') }} if {{ node.cond | expr_render(style='python_native_expr') }} else {{ node.value_false | expr_render(style='python_native_expr') }}"
  python_native_scope_expr:
    base_lang: dsl
    Name: "scope[{{ node.name | repr }}]"
    Paren: "({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc: "math.{{ node.func }}({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc(abs): "abs({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc(round): "round({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc(ceil): "math.ceil({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc(floor): "math.floor({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UFunc(trunc): "math.trunc({{ node.expr | expr_render(style='python_native_scope_expr') }})"
    UnaryOp: "{{ node.op }}{{ node.expr | expr_render(style='python_native_scope_expr') }}"
    UnaryOp(!): "not {{ node.expr | expr_render(style='python_native_scope_expr') }}"
    BinaryOp: "{{ node.expr1 | expr_render(style='python_native_scope_expr') }} {{ node.op }} {{ node.expr2 | expr_render(style='python_native_scope_expr') }}"
    BinaryOp(&&): "{{ node.expr1 | expr_render(style='python_native_scope_expr') }} and {{ node.expr2 | expr_render(style='python_native_scope_expr') }}"
    BinaryOp(||): "{{ node.expr1 | expr_render(style='python_native_scope_expr') }} or {{ node.expr2 | expr_render(style='python_native_scope_expr') }}"
    ConditionalOp: "{{ node.value_true | expr_render(style='python_native_scope_expr') }} if {{ node.cond | expr_render(style='python_native_scope_expr') }} else {{ node.value_false | expr_render(style='python_native_scope_expr') }}"

ignores:
  - 'README.md'
  - 'template.json'
