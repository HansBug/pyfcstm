expr_styles:
  python_expr:
    base_lang: dsl
    Name: "self._vars[{{ node.name | tojson }}]"
    Paren: "({{ node.expr | expr_render(style='python_expr') }})"
    UFunc: "math.{{ node.func }}({{ node.expr | expr_render(style='python_expr') }})"
    UFunc(abs): "abs({{ node.expr | expr_render(style='python_expr') }})"
    UFunc(round): "round({{ node.expr | expr_render(style='python_expr') }})"
    UFunc(ceil): "math.ceil({{ node.expr | expr_render(style='python_expr') }})"
    UFunc(floor): "math.floor({{ node.expr | expr_render(style='python_expr') }})"
    UFunc(trunc): "math.trunc({{ node.expr | expr_render(style='python_expr') }})"
    UnaryOp: "{{ node.op }}{{ node.expr | expr_render(style='python_expr') }}"
    UnaryOp(!): "not {{ node.expr | expr_render(style='python_expr') }}"
    BinaryOp: "{{ node.expr1 | expr_render(style='python_expr') }} {{ node.op }} {{ node.expr2 | expr_render(style='python_expr') }}"
    BinaryOp(&&): "{{ node.expr1 | expr_render(style='python_expr') }} and {{ node.expr2 | expr_render(style='python_expr') }}"
    BinaryOp(||): "{{ node.expr1 | expr_render(style='python_expr') }} or {{ node.expr2 | expr_render(style='python_expr') }}"
    ConditionalOp: "{{ node.value_true | expr_render(style='python_expr') }} if {{ node.cond | expr_render(style='python_expr') }} else {{ node.value_false | expr_render(style='python_expr') }}"
  python_scope_expr:
    base_lang: dsl
    Name: "scope[{{ node.name | tojson }}]"
    Paren: "({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc: "math.{{ node.func }}({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc(abs): "abs({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc(round): "round({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc(ceil): "math.ceil({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc(floor): "math.floor({{ node.expr | expr_render(style='python_scope_expr') }})"
    UFunc(trunc): "math.trunc({{ node.expr | expr_render(style='python_scope_expr') }})"
    UnaryOp: "{{ node.op }}{{ node.expr | expr_render(style='python_scope_expr') }}"
    UnaryOp(!): "not {{ node.expr | expr_render(style='python_scope_expr') }}"
    BinaryOp: "{{ node.expr1 | expr_render(style='python_scope_expr') }} {{ node.op }} {{ node.expr2 | expr_render(style='python_scope_expr') }}"
    BinaryOp(&&): "{{ node.expr1 | expr_render(style='python_scope_expr') }} and {{ node.expr2 | expr_render(style='python_scope_expr') }}"
    BinaryOp(||): "{{ node.expr1 | expr_render(style='python_scope_expr') }} or {{ node.expr2 | expr_render(style='python_scope_expr') }}"
    ConditionalOp: "{{ node.value_true | expr_render(style='python_scope_expr') }} if {{ node.cond | expr_render(style='python_scope_expr') }} else {{ node.value_false | expr_render(style='python_scope_expr') }}"

globals:
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ model.root_state.name | to_identifier }}Machine"
  state_path:
    type: template
    params:
      - state
    template: "{{ state.path | join('.') }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ state.path | join('_') | to_identifier }}"
  action_hook_name:
    type: template
    params:
      - action
    template: "_abstract_hook_{{ action.func_name | to_identifier }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action.parent.path | join('.') }}"

filters:
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ machine_class_name(model) }}"
  state_path:
    type: template
    params:
      - state
    template: "{{ state_path(state) }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ state_slug(state) }}"
  action_hook_name:
    type: template
    params:
      - action
    template: "{{ action_hook_name(action) }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action_owner_path(action) }}"

ignores:
  - 'README.md'
  - 'README_zh.md'
  - 'template.json'
