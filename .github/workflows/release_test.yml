name: Release Test

on:
  push:
    paths:
      # Source code & assets that ship in the package
      - 'pyfcstm/**'
      - 'editors/jsfcstm/**'
      - 'editors/vscode/**'
      - 'editors/fcstm.tmLanguage.json'
      - 'editors/fcstm-bmc-query.tmLanguage.json'
      - 'templates/**'
      - 'tools/**'
      # Build & packaging manifests
      - 'setup.py'
      - 'setup.cfg'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'requirements*.txt'
      - 'Makefile'
      # This workflow itself
      - '.github/workflows/release_test.yml'
  workflow_dispatch:

jobs:
  source_release:
    name: Try package the source
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
        python-version:
          - '3.8'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up python dependences
        run: |
          pip install --upgrade pip
          pip install --upgrade flake8 setuptools wheel twine
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-build.txt ]; then pip install -r requirements-build.txt; fi
          if [ -f requirements-test.txt ]; then pip install -r requirements-test.txt; fi
          pip install --upgrade build
      - name: Build packages
        run: |
          make build_info
          make package
          test -z "$(git status --porcelain)"
          test "$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l)" -eq 1
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 1
          {
            echo 'schema=pyfcstm-build-identity/v1'
            echo 'artifact_kind=python-distributions'
            echo "full_commit=$GITHUB_SHA"
            echo 'dirty=0'
            echo 'tag='
            echo 'platform=ubuntu-latest'
          } > dist/build-identity.txt
          python - <<'PY' > dist/artifact-sha256.txt
          import hashlib
          import os
          from glob import glob

          for path in sorted(glob("dist/*.whl") + glob("dist/*.tar.gz")):
              digest = hashlib.sha256()
              with open(path, "rb") as stream:
                  for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                      digest.update(chunk)
              print("{} {} dist/{}".format(
                  digest.hexdigest(), os.path.getsize(path), os.path.basename(path)
              ))
          PY
          ls -al dist
      - name: Upload packed files to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-source-pack
          path: ./dist/*

  fresh_wheel_selfcheck_linux:
    name: Fresh wheel self-check (Ubuntu service)
    runs-on: ubuntu-22.04
    needs: source_release
    if: ${{ needs.source_release.result == 'success' }}
    services:
      plantuml:
        image: plantuml/plantuml-server@sha256:00b96145a7e2999fd9504b84e26d00c47222b7963a0072ee14ea59449d634e99
        ports:
          - 18080:8080
    timeout-minutes: 25
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-wheel-reports"
          mkdir -p "$reports"
          printf 'job=fresh-wheel-linux\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
      - name: Set up Python 3.7
        uses: actions/setup-python@v6
        with:
          python-version: '3.7'
      - name: Set up Java runtime
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-source-pack
          path: ${{ runner.temp }}/pyfcstm-package-artifact
      - name: Install and verify PlantUML JAR
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Install exact wheel in a fresh venv and run self-check
        shell: bash
        env:
          PYTHONPATH: ''
          PYTHONNOUSERSITE: '1'
          PIP_CONFIG_FILE: /dev/null
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-wheel-clean-root"
          reports="$RUNNER_TEMP/pyfcstm-wheel-reports"
          venv="$RUNNER_TEMP/pyfcstm-wheel-venv"
          rm -rf "$root" "$venv"
          mkdir -p "$root" "$reports"
          wheel_count=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -maxdepth 1 -type f -name '*.whl' -print | wc -l)
          test "$wheel_count" -eq 1
          wheel=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -maxdepth 1 -type f -name '*.whl' -print -quit)
          test -n "$wheel"
          identity="$RUNNER_TEMP/pyfcstm-package-artifact/build-identity.txt"
          digest_file="$RUNNER_TEMP/pyfcstm-package-artifact/artifact-sha256.txt"
          test -f "$identity" -a -f "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=python-distributions' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' 'platform=ubuntu-latest'
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          wheel_name=$(basename "$wheel")
          actual_digest=$(python - "$wheel" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          expected_digest=$(awk -v file="$wheel_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$wheel_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$wheel")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          printf '%s  %s\n' "$actual_digest" "$wheel_name" | tee "$reports/artifact.sha256"
          set +e
          curl --fail --location --retry 5 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          test "$readiness_status" -eq 0
          python -m venv "$venv"
          source "$venv/bin/activate"
          python -m pip --isolated install --upgrade 'pip<24.1' 2>&1 | tee "$reports/pip-bootstrap.log"
          set +e
          python -m pip --isolated install --no-cache-dir "$wheel" 2>&1 | tee "$reports/pip-install.log"
          install_status=${PIPESTATUS[0]}
          set -e
          test "$install_status" -eq 0
          python -m pip check 2>&1 | tee "$reports/pip-check.log"
          python -m pip list --format=json 2>&1 | tee "$reports/pip-list.json"
          python -c 'import pyfcstm, sys; print(pyfcstm.__file__); print(sys.executable); print("\\n".join(sys.path))' \
            | tee "$reports/module-path.txt"
          if grep -F "$GITHUB_WORKSPACE" "$reports/module-path.txt"; then
            echo 'installed module came from the checkout workspace' >&2
            exit 1
          fi
          set +e
          pyfcstm --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          python -m pyfcstm --version 2>&1 | tee "$reports/module-version.log"
          module_version_status=${PIPESTATUS[0]}
          pyfcstm --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          pyfcstm --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'install=%s\nversion=%s\nmodule_version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$install_status" "$version_status" "$module_version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
            | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$module_version_status" -eq 0
          test "$default_status" -eq 0
          test "$visualize_status" -eq 0
          test "$readiness_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Assert controlled PlantUML results
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-wheel-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload fresh Linux wheel evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-wheel-selfcheck-ubuntu-22.04
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-wheel-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt

  fresh_wheel_selfcheck:
    name: Fresh wheel self-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: source_release
    if: ${{ needs.source_release.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            python-version: '3.7'
          - os: macos-14
            python-version: '3.8'
    timeout-minutes: 25
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-wheel-reports"
          mkdir -p "$reports"
          printf 'job=fresh-wheel-nonlinux\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
          : > "$RUNNER_TEMP/plantuml-readiness.txt"
          : > "$RUNNER_TEMP/plantuml-service.log"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Java runtime
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-source-pack
          path: ${{ runner.temp }}/pyfcstm-package-artifact
      - name: Install and verify PlantUML JAR
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Start local PlantUML service
        continue-on-error: true
        shell: bash
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/plantuml-service.log"
          java -jar "$RUNNER_TEMP/plantuml.jar" -picoweb:18080:127.0.0.1 > "$log" 2>&1 &
          echo $! > "$RUNNER_TEMP/plantuml-service.pid"
          for attempt in $(seq 1 30); do
            if curl --fail --location --silent --show-error --max-time 2 "${PLANTUML_HOST%/}/" > "$RUNNER_TEMP/plantuml-readiness.txt" 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "$log" >&2
          exit 1
      - name: Install exact wheel in a fresh venv and run self-check
        shell: bash
        env:
          PYTHONPATH: ''
          PYTHONNOUSERSITE: '1'
          PIP_CONFIG_FILE: /dev/null
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-wheel-clean-root"
          reports="$RUNNER_TEMP/pyfcstm-wheel-reports"
          venv="$RUNNER_TEMP/pyfcstm-wheel-venv"
          rm -rf "$root" "$venv"
          mkdir -p "$root" "$reports"
          wheel_count=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name '*.whl' -print | wc -l)
          test "$wheel_count" -eq 1
          wheel=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name '*.whl' -print -quit)
          test -n "$wheel"
          identity=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name build-identity.txt -print -quit)
          digest_file=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name artifact-sha256.txt -print -quit)
          test -n "$identity" -a -n "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=python-distributions' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' 'platform=ubuntu-latest'
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          wheel_name=$(basename "$wheel")
          expected_digest=$(awk -v file="$wheel_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$wheel_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          actual_digest=$(python - "$wheel" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$wheel")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          printf '%s  %s\n' "$actual_digest" "$wheel_name" | tee "$reports/artifact.sha256"
          set +e
          curl --fail --location --retry 3 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          python -m venv "$venv"
          source "$venv/bin/activate" 2>/dev/null || source "$venv/Scripts/activate"
          python -m pip --isolated install --upgrade 'pip<24.1' 2>&1 | tee "$reports/pip-bootstrap.log"
          set +e
          python -m pip --isolated install --no-cache-dir "$wheel" 2>&1 | tee "$reports/pip-install.log"
          install_status=${PIPESTATUS[0]}
          set -e
          test "$install_status" -eq 0
          python -m pip check 2>&1 | tee "$reports/pip-check.log"
          python -m pip list --format=json 2>&1 | tee "$reports/pip-list.json"
          python -c 'import pyfcstm, sys; print(pyfcstm.__file__); print(sys.executable); print("\\n".join(sys.path))' \
            | tee "$reports/module-path.txt"
          if grep -F "$GITHUB_WORKSPACE" "$reports/module-path.txt"; then
            echo 'installed module came from the checkout workspace' >&2
            exit 1
          fi
          script=pyfcstm
          if [ "${RUNNER_OS:-}" = "Windows" ]; then script=pyfcstm.exe; fi
          set +e
          "$script" --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          python -m pyfcstm --version 2>&1 | tee "$reports/module-version.log"
          module_version_status=${PIPESTATUS[0]}
          "$script" --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          "$script" --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'install=%s\nversion=%s\nmodule_version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$install_status" "$version_status" "$module_version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
            | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$module_version_status" -eq 0
          test "$default_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Record optional PlantUML results
        continue-on-error: true
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-wheel-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload fresh wheel evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-wheel-selfcheck-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-wheel-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt

  fresh_sdist_selfcheck:
    name: Fresh sdist self-check (Ubuntu service)
    runs-on: ubuntu-22.04
    needs: source_release
    if: ${{ needs.source_release.result == 'success' }}
    services:
      plantuml:
        image: plantuml/plantuml-server@sha256:00b96145a7e2999fd9504b84e26d00c47222b7963a0072ee14ea59449d634e99
        ports:
          - 18080:8080
    timeout-minutes: 25
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-sdist-reports"
          mkdir -p "$reports"
          printf 'job=fresh-sdist\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
      - name: Set up Python 3.7
        uses: actions/setup-python@v6
        with:
          python-version: '3.7'
      - name: Set up Java runtime
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-source-pack
          path: ${{ runner.temp }}/pyfcstm-package-artifact
      - name: Install and verify PlantUML JAR
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Install exact sdist in a fresh venv and run self-check
        shell: bash
        env:
          PYTHONPATH: ''
          PYTHONNOUSERSITE: '1'
          PIP_CONFIG_FILE: /dev/null
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-sdist-clean-root"
          reports="$RUNNER_TEMP/pyfcstm-sdist-reports"
          venv="$RUNNER_TEMP/pyfcstm-sdist-venv"
          rm -rf "$root" "$venv"
          mkdir -p "$root" "$reports"
          sdist_count=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print | wc -l)
          test "$sdist_count" -eq 1
          sdist=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print -quit)
          test -n "$sdist"
          identity=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name build-identity.txt -print -quit)
          digest_file=$(find "$RUNNER_TEMP/pyfcstm-package-artifact" -type f -name artifact-sha256.txt -print -quit)
          test -n "$identity" -a -n "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=python-distributions' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' 'platform=ubuntu-latest'
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          sdist_name=$(basename "$sdist")
          actual_digest=$(python - "$sdist" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          expected_digest=$(awk -v file="$sdist_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$sdist_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$sdist")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          printf '%s  %s\n' "$actual_digest" "$sdist_name" | tee "$reports/artifact.sha256"
          set +e
          curl --fail --location --retry 5 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          test "$readiness_status" -eq 0
          python -m venv "$venv"
          source "$venv/bin/activate"
          python -m pip --isolated install --upgrade 'pip<24.1' 2>&1 | tee "$reports/pip-bootstrap.log"
          set +e
          python -m pip --isolated install --no-cache-dir "$sdist" 2>&1 | tee "$reports/pip-install.log"
          install_status=${PIPESTATUS[0]}
          set -e
          test "$install_status" -eq 0
          python -m pip check 2>&1 | tee "$reports/pip-check.log"
          python -m pip list --format=json 2>&1 | tee "$reports/pip-list.json"
          python -c 'import pyfcstm, sys; print(pyfcstm.__file__); print(sys.executable); print("\\n".join(sys.path))' \
            | tee "$reports/module-path.txt"
          if grep -F "$GITHUB_WORKSPACE" "$reports/module-path.txt"; then
            echo 'installed module came from the checkout workspace' >&2
            exit 1
          fi
          set +e
          pyfcstm --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          python -m pyfcstm --version 2>&1 | tee "$reports/module-version.log"
          module_version_status=${PIPESTATUS[0]}
          pyfcstm --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          pyfcstm --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'install=%s\nversion=%s\nmodule_version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$install_status" "$version_status" "$module_version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
            | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$module_version_status" -eq 0
          test "$default_status" -eq 0
          test "$visualize_status" -eq 0
          test "$readiness_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Assert controlled PlantUML results
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-sdist-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload fresh sdist evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-sdist-selfcheck
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-sdist-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt

  release_docs_pdf:
    name: Bilingual Docs PDF
    runs-on: ubuntu-24.04
    services:
      plantuml:
        image: plantuml/plantuml-server@sha256:00b96145a7e2999fd9504b84e26d00c47222b7963a0072ee14ea59449d634e99
        ports:
          - 18080:8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install docs PDF dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            graphviz \
            fonts-freefont-otf \
            latexmk \
            librsvg2-bin \
            make \
            pandoc \
            poppler-utils \
            qpdf \
            ripgrep \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-xetex
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-doc.txt
          python -m pip install -e . --no-deps
      - name: Verify XeLaTeX and PDF toolchain
        shell: bash
        run: |
          set -euo pipefail
          xelatex --version | head -n 1
          latexmk -v
          qpdf --version
          pdfinfo -v 2>&1 | head -n 1
          kpsewhich xeCJK.sty
          kpsewhich FandolSong-Regular.otf
          fc-match -f '%{family}\n' FreeSerif | grep -F FreeSerif
      - name: Run PDF validator adversarial self-check
        shell: bash
        run: |
          set -euo pipefail
          python tools/check_docs_pdf.py --check
      - name: Build and stage bilingual PDFs
        env:
          PLANTUML_HOST: http://localhost:18080
        shell: bash
        run: |
          set -euo pipefail
          plantumlcli -c
          make docs_pdf

          package_version="$(python -c 'from pyfcstm.config.meta import __VERSION__; print(__VERSION__)')"
          rm -rf release-docs
          mkdir -p release-docs
          for language in en zh; do
            tex_files=("docs/build/pdf/${language}/latex/"*.tex)
            if (( ${#tex_files[@]} != 1 )); then
              echo "Expected exactly one primary TeX file for ${language}, found ${#tex_files[@]}" >&2
              exit 1
            fi
            source_pdf="${tex_files[0]%.tex}.pdf"
            if [[ ! -s "${source_pdf}" ]]; then
              echo "Primary PDF is missing or empty: ${source_pdf}" >&2
              exit 1
            fi
            output_pdf="release-docs/pyfcstm-v${package_version}-docs-${language}.pdf"
            cp "${source_pdf}" "${output_pdf}"
            qpdf --check "${output_pdf}"
            pdfinfo "${output_pdf}" | awk '$1 == "Pages:" && $2 > 0 { found = 1 } END { exit found ? 0 : 1 }'
          done

          staged_pdfs=(release-docs/*.pdf)
          if (( ${#staged_pdfs[@]} != 2 )); then
            echo "Expected exactly two staged PDFs, found ${#staged_pdfs[@]}" >&2
            exit 1
          fi
          if cmp -s "${staged_pdfs[0]}" "${staged_pdfs[1]}"; then
            echo 'English and Chinese PDFs must not be byte-identical' >&2
            exit 1
          fi
          sha256sum "${staged_pdfs[@]}"
      - name: Upload bilingual PDFs to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-docs-pdf
          if-no-files-found: error
          path: release-docs/*.pdf

  release_cli:
    name: CLI Build And Release
    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
        python-version:
          - '3.7'
        exclude:
          - os: 'macos-14'
            python-version: '3.7'
        include:
          - os: 'macos-14'
            python-version: '3.8'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Set environment for Cpython
        if: ${{ !contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=" >> $GITHUB_ENV
      - name: Set environment for PyPy
        if: ${{ contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make zip
      - name: Set up system dependencies on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make zip
      - name: Set up Cairo runtime on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo
      - name: Expose Cairo runtime on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          echo "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" >> "$GITHUB_PATH"
      - name: Set up system dependencies on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install tree cloc wget curl make zip
      - name: Set up Cairo runtime on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install cairo pkg-config
      - name: Expose Cairo runtime on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          BREW_PREFIX="$(brew --prefix)"
          echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> $GITHUB_ENV
          echo "DYLD_FALLBACK_LIBRARY_PATH=${BREW_PREFIX}/lib${DYLD_FALLBACK_LIBRARY_PATH:+:${DYLD_FALLBACK_LIBRARY_PATH}}" >> $GITHUB_ENV
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
      - name: Verify Cairo runtime on Windows and MacOS
        if: ${{ env.OS_NAME == 'Windows' || env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          python - <<'PY'
          import cairosvg
          cairosvg.svg2png(
              bytestring=(
                  b'<svg xmlns="http://www.w3.org/2000/svg" width="1" height="1">'
                  b'<rect width="1" height="1" fill="#000000"/>'
                  b'</svg>'
              )
          )
          print('CairoSVG runtime is available on', "${{ env.OS_NAME }}")
          PY
      - name: Test the basic environment
        shell: bash
        run: |
          python -V
          pip --version
          pip list
          tree .
      - name: Get package version
        shell: bash
        run: |
          python -c 'from pyfcstm.config.meta import __VERSION__;print(__VERSION__)'
          echo "PACKAGE_VERSION=$(python -c 'from pyfcstm.config.meta import __VERSION__;print(__VERSION__)')" >> $GITHUB_ENV
          echo "GIT_COMMIT_ID=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
          echo "PYTHON_VERSION=$(python -V | xargs -n 1 | tail -1)" >> $GITHUB_ENV
          echo "CPU_ARCH=$(uname -m)" >> $GITHUB_ENV
      - name: Get CLI name
        shell: bash
        run: |
          echo "ZIP_NAME=pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}-${{ env.GIT_COMMIT_ID }}-standalone" >> $GITHUB_ENV
          echo "CLI_NAME=pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}" >> $GITHUB_ENV
      - name: Build standalone cli on Linux and MacOS
        if: ${{ env.OS_NAME != 'Windows' }}
        shell: bash
        run: |
          make build_info
          # Keep the tracked logo PNG as the build input; otherwise Make's
          # timestamp rule can rewrite it before the recursive build_info
          # prerequisite and falsely mark the artifact dirty.
          make -o logos/logo.png build
          mkdir -p dist/${{ env.CLI_NAME }}
          cp dist/pyfcstm dist/${{ env.CLI_NAME }}/pyfcstm
          cd dist
          zip -r ${{ env.ZIP_NAME }}.zip ${{ env.CLI_NAME }}
          cd ..
          ls -al dist
          dist/pyfcstm -v
          dist/pyfcstm -h
      - name: Test CLI executable on Linux and MacOS
        if: ${{ env.OS_NAME != 'Windows' }}
        shell: bash
        run: |
          make test_cli
      - name: Build standalone CLI on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          make build_info
          # Keep the tracked logo PNG as the build input; see the Linux/macOS
          # build step above.
          make -o logos/logo.png build
          mkdir -p dist/${{ env.CLI_NAME }}
          cp dist/pyfcstm.exe dist/${{ env.CLI_NAME }}/pyfcstm.exe
          cd dist
          zip -r ${{ env.ZIP_NAME }}.zip ${{ env.CLI_NAME }}
          cd ..
          ls -al dist
          dist/pyfcstm.exe -v
          dist/pyfcstm.exe -h
      - name: Test CLI executable on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          python -m tools.test_cli dist/pyfcstm.exe --test-dsl docs/source/tutorials/cli/simple_machine.fcstm --template-dir test/testfile/template_1
      - name: Record CLI identity and archive digest
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          {
            echo 'schema=pyfcstm-build-identity/v1'
            echo 'artifact_kind=standalone'
            echo "full_commit=$GITHUB_SHA"
            echo 'dirty=0'
            echo 'tag='
            echo "platform=${{ matrix.os }}"
          } > dist/build-identity.txt
          python - "dist/${ZIP_NAME}.zip" > dist/artifact-sha256.txt <<'PY'
          import hashlib
          import os
          import sys
          path = sys.argv[1]
          digest = hashlib.sha256()
          with open(path, "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print("{} {} dist/{}".format(
              digest.hexdigest(), os.path.getsize(path), os.path.basename(path)
          ))
          PY
      - name: Upload packed files to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}-${{ env.GIT_COMMIT_ID }}
          path: ./dist/*
      - name: Upload exact CLI artifact for fresh verification
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-release-test-cli-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist/${{ env.ZIP_NAME }}.zip
            dist/build-identity.txt
            dist/artifact-sha256.txt

  fresh_release_cli_selfcheck:
    name: Fresh release-test CLI self-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release_cli
    if: ${{ needs.release_cli.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14
    timeout-minutes: 25
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-release-test-cli-reports"
          mkdir -p "$reports"
          printf 'job=fresh-release-cli\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
          : > "$RUNNER_TEMP/plantuml-readiness.txt"
          : > "$RUNNER_TEMP/plantuml-service.log"
      - name: Set up Java runtime
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: pyfcstm-release-test-cli-${{ matrix.os }}
          path: ${{ runner.temp }}/pyfcstm-release-test-cli
      - name: Install and verify PlantUML JAR
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Start local PlantUML service
        continue-on-error: true
        shell: bash
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/plantuml-service.log"
          java -jar "$RUNNER_TEMP/plantuml.jar" -picoweb:18080:127.0.0.1 > "$log" 2>&1 &
          echo $! > "$RUNNER_TEMP/plantuml-service.pid"
          for attempt in $(seq 1 30); do
            if curl --fail --location --silent --show-error --max-time 2 "${PLANTUML_HOST%/}/" > "$RUNNER_TEMP/plantuml-readiness.txt" 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "$log" >&2
          exit 1
      - name: Run downloaded CLI without checkout
        shell: bash
        env:
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-release-test-cli-root"
          reports="$RUNNER_TEMP/pyfcstm-release-test-cli-reports"
          rm -rf "$root"
          mkdir -p "$root" "$reports"
          archive_count=$(find "$RUNNER_TEMP/pyfcstm-release-test-cli" -maxdepth 1 -type f -name '*.zip' -print | wc -l)
          test "$archive_count" -eq 1
          archive=$(find "$RUNNER_TEMP/pyfcstm-release-test-cli" -maxdepth 1 -type f -name '*.zip' -print -quit)
          identity="$RUNNER_TEMP/pyfcstm-release-test-cli/build-identity.txt"
          digest_file="$RUNNER_TEMP/pyfcstm-release-test-cli/artifact-sha256.txt"
          test -n "$archive" -a -f "$identity" -a -f "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=standalone' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' "platform=${{ matrix.os }}"
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          archive_name=$(basename "$archive")
          expected_digest=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          actual_digest=$(python - "$archive" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$archive")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          unzip -q "$archive" -d "$root"
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            xattr -dr com.apple.quarantine "$root" 2>/dev/null || true
          fi
          if find "$root" -type d -name pyfcstm -print -quit | grep -q .; then
            echo "forbidden source package directory found in clean root" >&2
            exit 1
          fi
          for forbidden in setup.py 'requirements*.txt' Makefile; do
            if find "$root" -type f -name "$forbidden" -print -quit | grep -q .; then
              echo "forbidden source/build file found in clean root: $forbidden" >&2
              exit 1
            fi
          done
          set +e
          curl --fail --location --retry 3 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          if [ "${{ matrix.os }}" = "windows-2022" ]; then
            exe=$(find "$root" -type f -name pyfcstm.exe -print -quit)
          else
            exe=$(find "$root" -type f -name pyfcstm -print -quit)
          fi
          test -n "$exe"
          set +e
          "$exe" --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          "$exe" --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          "$exe" --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
            | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$default_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Record optional PlantUML results
        continue-on-error: true
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-release-test-cli-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload fresh CLI evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-release-test-cli-selfcheck-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-release-test-cli-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt
            ${{ runner.temp }}/plantuml-readiness.txt
            ${{ runner.temp }}/plantuml-service.log

  release_test_artifact_gate:
    name: release-test artifact fresh gate
    runs-on: ubuntu-22.04
    needs:
      - source_release
      - fresh_wheel_selfcheck_linux
      - fresh_wheel_selfcheck
      - fresh_sdist_selfcheck
      - release_cli
      - fresh_release_cli_selfcheck
    if: ${{ always() }}
    steps:
      - name: Require every artifact consumer to pass
        env:
          SOURCE_RESULT: ${{ needs.source_release.result }}
          WHEEL_LINUX_RESULT: ${{ needs.fresh_wheel_selfcheck_linux.result }}
          WHEEL_NONLINUX_RESULT: ${{ needs.fresh_wheel_selfcheck.result }}
          SDIST_RESULT: ${{ needs.fresh_sdist_selfcheck.result }}
          CLI_BUILD_RESULT: ${{ needs.release_cli.result }}
          CLI_FRESH_RESULT: ${{ needs.fresh_release_cli_selfcheck.result }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail
          skip_cli=false
          if [[ "$HEAD_COMMIT_MSG" == *"ci skip"* ]]; then
            skip_cli=true
          fi
          for pair in \
            "source=$SOURCE_RESULT" \
            "wheel_linux=$WHEEL_LINUX_RESULT" \
            "wheel_nonlinux=$WHEEL_NONLINUX_RESULT" \
            "sdist=$SDIST_RESULT"; do
            echo "$pair"
            test "${pair#*=}" = success
          done
          if [[ "$skip_cli" == true ]]; then
            echo "cli_build=$CLI_BUILD_RESULT (accepted by ci skip)"
            echo "cli_fresh=$CLI_FRESH_RESULT (accepted by ci skip)"
            test "$CLI_BUILD_RESULT" = skipped
            test "$CLI_FRESH_RESULT" = skipped
          else
            for pair in \
              "cli_build=$CLI_BUILD_RESULT" \
              "cli_fresh=$CLI_FRESH_RESULT"; do
              echo "$pair"
              test "${pair#*=}" = success
            done
          fi
          echo 'all release-test artifact fresh gates passed'

  release_vscode_extension:
    name: VSCode Extension Build And Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-build.txt

      - name: Download ANTLR
        run: |
          make antlr

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce (VSCode Extension Manager)
        run: |
          npm install -g @vscode/vsce

      - name: Get extension version
        id: ext_version
        run: |
          cd editors/vscode
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "NAME=${NAME}" >> $GITHUB_OUTPUT
          echo "Extension: ${NAME} v${VERSION}"

      - name: Build VSCode extension using make
        run: |
          make vscode
          ls -lh editors/vscode/build/

      - name: Find and verify extension file
        id: find_vsix
        run: |
          VSIX_FILE=$(find editors/vscode/build -name "*.vsix" -type f | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: No .vsix file found in editors/vscode/build/"
            exit 1
          fi
          echo "Found extension: $VSIX_FILE"
          echo "VSIX_FILE=${VSIX_FILE}" >> $GITHUB_OUTPUT
          echo "VSIX_BASENAME=$(basename ${VSIX_FILE})" >> $GITHUB_OUTPUT

      - name: Upload VSCode extension to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-${{ steps.ext_version.outputs.NAME }}-v${{ steps.ext_version.outputs.VERSION }}
          path: ${{ steps.find_vsix.outputs.VSIX_FILE }}
