<?plantuml 1.2026.2beta3?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="STATE" height="1113px" preserveAspectRatio="none" style="width:431px;height:1113px;background:#FFFFFF;" version="1.1" viewBox="0 0 431 1113" width="431px" zoomAndPan="magnify"><defs/><g><g class="entity" data-qualified-name="DefinitionNote" data-source-line="3" id="ent0002"><path d="M6,6 L6,106.7969 L236.3076,106.7969 L236.3076,16 L226.3076,6 L6,6" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M226.3076,6 L226.3076,16 L236.3076,16 L226.3076,6" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="59.8521" x="12" y="23.0669">defines {</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.8672" x="28.5293" y="38.1997">def int counter = 0;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="125.5693" x="28.5293" y="53.3325">def int flags = 255;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.7783" x="28.5293" y="68.4653">def float temperature = 25.5;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="138.5757" x="28.5293" y="83.5981">def float angle = 0.0;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="8.271" x="12" y="98.731">}</text></g><path d="M157.06,166.79 L405.2529,166.79 A12.5,12.5 0 0 1 417.7529,179.29 L417.7529,193.0869 L144.56,193.0869 L144.56,179.29 A12.5,12.5 0 0 1 157.06,166.79" fill="#F1F1F1"/><rect fill="none" height="858.6069" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="273.1929" x="144.56" y="166.79"/><line style="stroke:#181818;stroke-width:0.5;" x1="144.56" x2="417.7529" y1="193.0869" y2="193.0869"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.8994" x="222.2067" y="184.7851">ExpressionDemo</text><g class="entity" data-qualified-name="expression_demo.expression_demo__arithmetic_ops" id="ent0004"><rect fill="#F1F1F1" height="120.1094" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="174.3711" x="189.63" y="261.0869"/><line style="stroke:#181818;stroke-width:0.5;" x1="189.63" x2="364.0011" y1="287.3838" y2="287.3838"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="100.1123" x="226.7594" y="279.082">ArithmeticOps</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="43.459" x="194.63" y="303.5224">enter {</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="129.75" x="209.8878" y="317.4912">counter = 10 + 5 * 2;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="139.1133" x="209.8878" y="331.4599">counter = (10 + 5) * 2;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="102.7969" x="209.8878" y="345.4287">counter = 2 ** 3;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="109.834" x="209.8878" y="359.3974">counter = 17 % 5;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="7.6348" x="194.63" y="373.3662">}</text></g><g class="entity" data-qualified-name="expression_demo.expression_demo__bitwise_ops" id="ent0005"><rect fill="#F1F1F1" height="134.0781" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="144.043" x="204.79" y="434.1969"/><line style="stroke:#181818;stroke-width:0.5;" x1="204.79" x2="348.833" y1="460.4938" y2="460.4938"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="77.4307" x="238.0962" y="452.192">BitwiseOps</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="43.459" x="209.79" y="476.6324">enter {</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="105.668" x="225.0478" y="490.6012">flags = 255 &amp; 15;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="100.3535" x="225.0478" y="504.5699">flags = 240 | 15;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="106.3652" x="225.0478" y="518.5387">flags = 255 ^ 15;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="93.5156" x="225.0478" y="532.5074">flags = 1 &lt;&lt; 4;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="108.7852" x="225.0478" y="546.4762">flags = 128 &gt;&gt; 2;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="7.6348" x="209.79" y="560.4449">}</text></g><g class="entity" data-qualified-name="expression_demo.expression_demo__math_functions" id="ent0006"><rect fill="#F1F1F1" height="175.9844" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="240.5059" x="156.56" y="621.2769"/><line style="stroke:#181818;stroke-width:0.5;" x1="156.56" x2="397.0659" y1="647.5738" y2="647.5738"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="102.6279" x="225.499" y="639.272">MathFunctions</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="43.459" x="161.56" y="663.7124">enter {</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="205.248" x="176.8178" y="677.6812">temperature = sin(angle) * 100.0;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="197.0332" x="176.8178" y="691.6499">temperature = cos(angle) + 1.0;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159.7383" x="176.8178" y="705.6187">temperature = tan(angle);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="157.0078" x="176.8178" y="719.5874">temperature = sqrt(16.0);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="151.418" x="176.8178" y="733.5562">temperature = abs(-5.5);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.5137" x="176.8178" y="747.5249">temperature = ceil(3.2);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="153.041" x="176.8178" y="761.4937">temperature = floor(3.8);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.9688" x="176.8178" y="775.4624">temperature = round(3.5);</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="7.6348" x="161.56" y="789.4312">}</text></g><g class="entity" data-qualified-name="expression_demo.expression_demo__complex_expr" id="ent0007"><rect fill="#F1F1F1" height="106.1406" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="236.668" x="158.48" y="850.2569"/><line style="stroke:#181818;stroke-width:0.5;" x1="158.48" x2="395.148" y1="876.5538" y2="876.5538"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.4268" x="230.1006" y="868.252">ComplexExpr</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="43.459" x="163.48" y="892.6924">enter {</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="158.707" x="178.7378" y="906.6612">counter = (10 + 5) * 2 - 3;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="132.6094" x="178.7378" y="920.6299">flags = 255 &amp; 15 | 16;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="201.4102" x="178.7378" y="934.5987">temperature = sqrt(16.0) + 10.0;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="7.6348" x="163.48" y="948.5674">}</text></g><g class="start_entity" data-qualified-name="expression_demo..start.expression_demo" data-source-line="20" id="ent0002"><ellipse cx="276.81" cy="214.0869" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/></g><g class="end_entity" data-qualified-name="expression_demo..end.expression_demo" data-source-line="24" id="ent0007"><ellipse cx="276.81" cy="1004.3969" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="276.81" cy="1004.3969" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><!--link *start*expression_demo to expression_demo__arithmetic_ops--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="20" id="lnk3"><path d="M276.81,224.4069 C276.81,233.0469 276.81,240.6869 276.81,254.9869" fill="none" id="*start*expression_demo-to-expression_demo__arithmetic_ops" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="276.81,260.9869,280.81,251.9869,276.81,255.9869,272.81,251.9869,276.81,260.9869" style="stroke:#181818;stroke-width:1;"/></g><!--link expression_demo__arithmetic_ops to expression_demo__bitwise_ops--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="21" id="lnk4"><path d="M276.81,381.4369 C276.81,398.2369 276.81,410.6269 276.81,427.8169" fill="none" id="expression_demo__arithmetic_ops-to-expression_demo__bitwise_ops" style="stroke:#181818;stroke-width:1;"/><polygon