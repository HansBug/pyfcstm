title: Ref abstract handler reports callsite lifecycle stage
origin:
  files:
  - test/simulate/test_semantic_fixtures.py::test_simulation_semantic_fixture
  docs:
  - https://github.com/HansBug/pyfcstm/issues/156#issuecomment-4631761534
  notes:
  - REF-1 regression proving cross-stage refs report the callsite stage.
categories:
- runtime
- abstract
- lifecycle
handlers:
- action: Root.Library.SharedEnter
  behavior: record_call
- action: Root.Library.SharedDuring
  behavior: record_call
- action: Root.Library.SharedExit
  behavior: record_call
steps:
- cycle: []
  expect:
    state: Root.A
    vars_exact: {}
    ended: false
    handler_calls:
    - action: Root.Library.SharedExit
      state: Root.A
      stage: enter
      vars: {}
      active_leaf: Root.A
      call_stage: enter
      abstract_target: Root.Library.SharedExit
      named_ref: null
    - action: Root.Library.SharedExit
      state: Root.A
      stage: during
      vars: {}
      active_leaf: Root.A
      call_stage: during
      abstract_target: Root.Library.SharedExit
      named_ref: null
    - action: Root.Library.SharedEnter
      state: Root.A
      stage: during
      vars: {}
      active_leaf: Root.A
      call_stage: during
      abstract_target: Root.Library.SharedEnter
      named_ref: null
- cycle: Root.A.Go
  expect:
    state: Root.B
    vars_exact: {}
    ended: false
    handler_calls:
    - action: Root.Library.SharedExit
      state: Root.A
      stage: enter
      vars: {}
      active_leaf: Root.A
      call_stage: enter
      abstract_target: Root.Library.SharedExit
      named_ref: null
    - action: Root.Library.SharedExit
      state: Root.A
      stage: during
      vars: {}
      active_leaf: Root.A
      call_stage: during
      abstract_target: Root.Library.SharedExit
      named_ref: null
    - action: Root.Library.SharedEnter
      state: Root.A
      stage: during
      vars: {}
      active_leaf: Root.A
      call_stage: during
      abstract_target: Root.Library.SharedEnter
      named_ref: null
    - action: Root.Library.SharedDuring
      state: Root.A
      stage: exit
      vars: {}
      active_leaf: Root.A
      call_stage: exit
      abstract_target: Root.Library.SharedDuring
      named_ref: null
    - action: Root.Library.SharedExit
      state: Root.B
      stage: during
      vars: {}
      active_leaf: Root.B
      call_stage: during
      abstract_target: Root.Library.SharedExit
      named_ref: null
