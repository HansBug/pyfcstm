schema_version: 1
id: cli_init_basic
title: CLI init command initializes a leaf state
source:
  fcstm: cli_init_basic.fcstm
origin:
  files:
  - test/simulate/test_cli_init.py::TestCLIInitCommand::test_init_command_basic
  assertion_types:
  - cli_output
  - state
  - vars
  - ended
categories:
- runtime
- hot_start
- cli
runners:
- cli_command
initial:
  state: null
  vars: null
commands:
- input: init System.Active counter=5 flag=1
