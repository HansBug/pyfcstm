title: Combo transition trigger duplicate event alignment
origin:
  files:
  - test/diagnostics/test_combo_inspect_contract.py::test_combo_duplicate_event_warning_points_to_second_term_and_first_related_term
  notes:
  - Exercises duplicate event terms as executable runtime semantics, not only as an inspect warning. Current cycle input matching is presence-based, so one input event can satisfy repeated identical terms; this fixture pins simulator/generated-runtime alignment for that existing behavior.
  - The fixture is consumed by both the simulator and generated Python runtime alignment runners.
categories:
- runtime
- template_alignment
- pseudo_chain
- event_paths
