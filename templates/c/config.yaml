expr_styles:
  c_scope_expr:
    base_lang: c
    Name: "scope->{{ node.name | to_c_identifier }}"

stmt_styles:
  c_runtime:
    base_lang: c
    state_var_target: "scope->{{ name | to_c_identifier }}"
    temp_var_target: "{{ name | to_c_identifier }}"
    declare_temp: "{{ temp_type }} {{ name | to_c_identifier }};"
    temp_type_aliases:
      int: PYFCSTM_GENERATED_INT64
      float: double
    temp_type_fallback: double

globals:
  render_c_action_body:
    type: import
    from: pyfcstm.render.c_runtime.render_c_action_body
  render_c_condition_body:
    type: import
    from: pyfcstm.render.c_runtime.render_c_condition_body
  render_c_reset_vars_body:
    type: import
    from: pyfcstm.render.c_runtime.render_c_reset_vars_body
  to_c_identifier:
    type: import
    from: pyfcstm.utils.to_c_identifier
  to_c_path_identifier:
    type: import
    from: pyfcstm.utils.to_c_path_identifier
  to_c_public_identifier:
    type: import
    from: pyfcstm.utils.to_c_public_identifier
  to_c_public_macro_identifier:
    type: import
    from: pyfcstm.utils.to_c_public_macro_identifier
  is_c_public_identifier_reserved:
    type: import
    from: pyfcstm.utils.is_c_public_identifier_reserved
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ to_c_public_identifier(model.root_state.name, 'Machine') }}"
  machine_macro_name:
    type: template
    params:
      - model
    template: "{{ to_c_public_macro_identifier(model.root_state.name, '_MACHINE') }}"
  machine_header_guard:
    type: template
    params:
      - model
    template: "PYFCSTM_GENERATED_{{ machine_macro_name(model) }}_H"
  state_path:
    type: template
    params:
      - state
    template: "{{ state.path | join('.') }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ to_c_path_identifier(state.path) }}"
  state_enum_name:
    type: template
    params:
      - state
    template: "{{ machine_macro_name(model) }}_STATE_{{ state_slug(state) }}"
  hook_field_name:
    type: template
    params:
      - action
    template: "on_{{ to_c_identifier(action.func_name) }}"
  hook_field_id_name:
    type: template
    params:
      - action
    template: "on_{{ to_c_path_identifier(action.func_name.split('.')) }}"
  hook_enum_name:
    type: template
    params:
      - action
    template: "{{ machine_macro_name(model) }}_HOOK_{{ to_c_identifier(action.func_name) | upper }}"
  hook_enum_id_name:
    type: template
    params:
      - action
    template: "{{ machine_macro_name(model) }}_HOOK_{{ to_c_path_identifier(action.func_name.split('.')) }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action.parent.path | join('.') }}"

filters:
  to_c_identifier:
    type: import
    from: pyfcstm.utils.to_c_identifier
  to_c_path_identifier:
    type: import
    from: pyfcstm.utils.to_c_path_identifier
  to_c_public_identifier:
    type: import
    from: pyfcstm.utils.to_c_public_identifier
  to_c_public_macro_identifier:
    type: import
    from: pyfcstm.utils.to_c_public_macro_identifier
  is_c_public_identifier_reserved:
    type: import
    from: pyfcstm.utils.is_c_public_identifier_reserved
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ machine_class_name(model) }}"
  machine_macro_name:
    type: template
    params:
      - model
    template: "{{ machine_macro_name(model) }}"
  machine_header_guard:
    type: template
    params:
      - model
    template: "{{ machine_header_guard(model) }}"
  state_path:
    type: template
    params:
      - state
    template: "{{ state_path(state) }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ state_slug(state) }}"
  state_enum_name:
    type: template
    params:
      - state
    template: "{{ state_enum_name(state) }}"
  hook_field_name:
    type: template
    params:
      - action
    template: "{{ hook_field_name(action) }}"
  hook_field_id_name:
    type: template
    params:
      - action
    template: "{{ hook_field_id_name(action) }}"
  hook_enum_name:
    type: template
    params:
      - action
    template: "{{ hook_enum_name(action) }}"
  hook_enum_id_name:
    type: template
    params:
      - action
    template: "{{ hook_enum_id_name(action) }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action_owner_path(action) }}"

tests:
  c_public_identifier_reserved:
    type: import
    from: pyfcstm.utils.is_c_public_identifier_reserved

ignores:
  - 'README.md'
  - 'README_zh.md'
  - 'template.json'
