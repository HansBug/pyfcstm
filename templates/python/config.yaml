expr_styles:
  python_expr:
    base_lang: python
    Name: "self._vars[{{ node.name | tojson }}]"
  python_scope_expr:
    base_lang: python
    Name: "scope[{{ node.name | tojson }}]"

globals:
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ model.root_state.name | to_identifier }}Machine"
  state_path:
    type: template
    params:
      - state
    template: "{{ state.path | join('.') }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ state.path | join('_') | to_identifier }}"
  action_hook_name:
    type: template
    params:
      - action
    template: "_abstract_hook_{{ action.func_name | to_identifier }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action.parent.path | join('.') }}"

filters:
  machine_class_name:
    type: template
    params:
      - model
    template: "{{ machine_class_name(model) }}"
  state_path:
    type: template
    params:
      - state
    template: "{{ state_path(state) }}"
  state_slug:
    type: template
    params:
      - state
    template: "{{ state_slug(state) }}"
  action_hook_name:
    type: template
    params:
      - action
    template: "{{ action_hook_name(action) }}"
  action_owner_path:
    type: template
    params:
      - action
    template: "{{ action_owner_path(action) }}"

ignores:
  - 'README.md'
  - 'README_zh.md'
  - 'template.json'
