# Single source of truth for structured diagnostic codes emitted by
# `pyfcstm.model` and consumed by downstream tools (LLM agent loops, IDE
# integrations, evaluation scripts, and the jsfcstm visualization layer).
#
# Each entry documents:
#   - `severity`       — 'error' or 'warning'
#   - `description`    — human-readable explanation of when this code fires
#   - `refs`           — payload schema for `ModelDiagnostic.refs`. Each
#                        field declares its type, whether it is required,
#                        and a short description. Field names are part of
#                        the public contract; downstream consumers should
#                        rely on these names verbatim.
#   - `example_dsl`    — minimal DSL snippet that triggers the code (used
#                        by unit tests and by downstream tooling to
#                        validate their dispatch paths).
#
# Allowed `refs.*.type` tokens (must mirror `_ALLOWED_REF_TYPES` in
# codes.py — that tuple is the single source of truth, this comment block
# is documentation; a test asserts the two stay aligned):
#   str | str_or_null | int | int_or_null | bool | Span | list[str]
#
# Adding a new code: append a new top-level entry here AND add a fixture
# test that triggers it from a real DSL snippet. The loader in `codes.py`
# verifies the schema at import time.

E_UNDEFINED_VAR:
  severity: error
  description: >-
    A guard, effect, or lifecycle-action block references a name that was
    never declared with a top-level `def` statement.
  refs:
    var_name:
      type: str
      required: true
      description: The undeclared identifier as it appeared in the source.
    referenced_in:
      type: str
      required: true
      description: >-
        Which kind of block contained the reference.
      enum: ['guard', 'effect', 'enter', 'during', 'exit', 'during_aspect', 'init']
    state_path:
      type: str_or_null
      required: false
      description: >-
        Dotted path of the state that owns the offending block, when the
        reference is inside a state body (not a guard/effect on a
        transition).
    expr_text:
      type: str_or_null
      required: false
      description: Original expression text containing the reference.
    is_temporary:
      type: bool
      required: false
      description: >-
        ``True`` when the identifier looked like a block-local temporary
        (the read occurred before the variable was assigned within the
        same ``enter`` / ``during`` / ``exit`` / ``effect`` block). Layer 2
        merges what jsfcstm previously emitted as
        ``fcstm.readBeforeAssignTemporary`` into this single ``E_*`` code
        plus this flag. Defaults to ``False`` / absent for "real" undefined
        variables that have no matching ``def`` declaration anywhere.
  example_dsl: |
    def int x = 0;
    state Root { state A; state B; A -> B : if [unknown_var > 0]; }

E_DUPLICATE_VAR:
  severity: error
  description: >-
    A top-level `def` statement re-declares an identifier that was already
    defined earlier in the file.
  refs:
    var_name:
      type: str
      required: true
      description: The duplicated identifier.
    previous_span:
      type: Span
      required: false
      description: Source position of the first declaration.
  example_dsl: |
    def int x = 0;
    def int x = 1;
    state Root { state A; }

E_MISSING_STATE:
  severity: error
  description: >-
    A transition target references a state path that cannot be resolved
    in the surrounding hierarchy.
  refs:
    state_path:
      type: str
      required: true
      description: The unresolved dotted state path.
    referenced_from:
      type: str_or_null
      required: false
      description: Dotted path of the state from which the reference was made.
    reason:
      type: str
      required: false
      description: >-
        Short tag describing the resolution failure mode.
      enum:
        - 'not_found'
        - 'parent_missing'
        - 'ambiguous'
        - 'event_path_not_found'
  example_dsl: |
    state Root { state A; A -> NoSuch; }

E_DUPLICATE_STATE:
  severity: error
  description: Two states share the same name within the same parent scope.
  refs:
    state_name:
      type: str
      required: true
      description: The duplicated state name.
    parent_path:
      type: str
      required: true
      description: Dotted path of the parent that contains both states.
    previous_span:
      type: Span
      required: false
      description: Source position of the first declaration.
  example_dsl: |
    state Root { state A; state A; }

E_EVENT_REF_INVALID:
  severity: error
  description: >-
    The textual form of an event reference is syntactically invalid (e.g.
    bare '/', trailing dots, going beyond the root state).
  refs:
    event_ref:
      type: str
      required: true
      description: The raw event reference text.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing why the reference is invalid.
      enum:
        - 'empty'
        - 'bare_slash'
        - 'invalid_absolute'
        - 'invalid_relative'
        - 'trailing_dots'
        - 'beyond_root'
  example_dsl: |
    state Root { state A; state B; A -> B : /; }

E_EVENT_NOT_FOUND:
  severity: error
  description: >-
    An event reference parses correctly but does not resolve to any event
    defined in the targeted scope.
  refs:
    event_ref:
      type: str
      required: true
      description: The raw event reference text.
    scope:
      type: str
      required: true
      description: >-
        Resolution scope used.
      enum: ['local', 'chain', 'absolute']
    searched_from:
      type: str_or_null
      required: false
      description: >-
        Dotted state path of the **caller** that initiated the lookup
        (i.e. the state on which `.resolve_event()` was invoked, or, for
        `StateMachine.resolve_event`, the state machine's root). This is
        the originating location of the bad reference in source — not
        the effective search root, which is always the model root for
        absolute references.
  example_dsl: |
    state Root { state A; state B; A -> B :: NoEvent; }

E_DANGLING_TRANSITION:
  severity: error
  description: >-
    A transition cannot resolve either its source or its target.
  refs:
    src:
      type: str_or_null
      required: false
      description: Raw source state expression as written in the DSL.
    tgt:
      type: str_or_null
      required: false
      description: Raw target state expression as written in the DSL.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing the dangling reason.
      enum: ['src_not_found', 'tgt_not_found', 'both_not_found']
  example_dsl: |
    state Root { state A; NoSuch -> A; }

E_TYPE_MISMATCH:
  severity: error
  description: >-
    A guard, effect, or assignment uses an expression whose type does not
    match the expected category (arithmetic vs boolean).
  refs:
    expected:
      type: str
      required: true
      description: >-
        Expected category. One of: 'numeric', 'boolean'.
    actual:
      type: str
      required: true
      description: Actual category produced by the expression.
    expr_text:
      type: str
      required: true
      description: Original expression text.
  example_dsl: |
    def int x = 0;
    state Root { state A; state B; A -> B : if [x]; }

E_FORCED_TRANSITION_EXPANSION:
  severity: error
  description: >-
    A forced transition (`!State -> ...` or `!*`) cannot be expanded
    because the source or target reference is invalid.
  refs:
    original_raw:
      type: str
      required: true
      description: Raw forced-transition text as written.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing why expansion failed.
      enum:
        - 'src_not_found'
        - 'tgt_not_found'
        - 'src_is_root'
        - 'wildcard_no_descendants'
  example_dsl: |
    state Root { state A; !NoSuch -> A; }

E_INITIAL_TRANSITION_INVALID:
  severity: error
  description: >-
    A composite state either lacks an entry transition (`[*] -> child`) or
    declares one whose target is not a direct child of the composite.
  refs:
    composite_path:
      type: str
      required: true
      description: Dotted path of the offending composite state.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing the failure.
      enum: ['missing_entry', 'target_not_child']
  example_dsl: |
    state Root { state Outer { state Inner; } }

E_DUPLICATE_FUNCTION_NAME:
  severity: error
  description: >-
    Two named lifecycle actions (enter / during / exit / during-aspect) within
    the same state share the same name. Named actions are referenced via
    `ref <name>` and must be uniquely identifiable.
  refs:
    function_name:
      type: str
      required: true
      description: The duplicated named-action name.
    state_path:
      type: str
      required: true
      description: Dotted path of the state declaring the duplicates.
    stage:
      type: str
      required: true
      description: Lifecycle stage where the duplicate appears.
      enum: ['enter', 'during', 'exit', 'during_aspect']
  example_dsl: |
    state Root {
        state A {
            enter Foo { }
            enter Foo { }
        }
    }

E_DURING_ASPECT_INVALID:
  severity: error
  description: >-
    A `during` block is declared inconsistently with the host state's
    leaf/composite kind. Leaf states must use `during { ... }` without an
    aspect modifier; composite states must use `during before { ... }` or
    `during after { ... }` (the aspect is mandatory on composites).
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the offending state.
    state_kind:
      type: str
      required: true
      description: Kind of the host state.
      enum: ['leaf', 'composite']
    aspect:
      type: str_or_null
      required: false
      description: >-
        The aspect token that was actually used (``'before'``, ``'after'``,
        or null when the user wrote a bare ``during`` on a composite).
      enum: ['before', 'after']
  example_dsl: |
    state Root {
        state A {
            during before { }
        }
    }

E_PSEUDO_NOT_LEAF:
  severity: error
  description: >-
    A state was declared with the `pseudo` keyword but has nested
    substates. Pseudo states must be leaves: they skip ancestor
    `>> during` aspects and only make sense without inner structure.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the offending pseudo state.
  example_dsl: |
    state Root {
        pseudo state Outer {
            state Inner;
            [*] -> Inner;
        }
    }

E_NAMED_FUNCTION_REF_NOT_FOUND:
  severity: error
  description: >-
    A `ref` lifecycle action could not resolve its target named action.
    Either the path walks through a state that does not exist, or the final
    segment is not a named action defined inside the resolved state.
  refs:
    ref_path:
      type: str
      required: true
      description: Dotted path of the unresolved reference.
    reason:
      type: str
      required: true
      description: Short tag describing the resolution failure.
      enum: ['state_not_found', 'named_function_not_found']
    missing_segment:
      type: str_or_null
      required: false
      description: >-
        The path segment that failed to resolve. For 'state_not_found' this
        is the state name that does not exist under the parent path; for
        'named_function_not_found' this is the action name searched for in
        the resolved state.
  example_dsl: |
    state Root {
        state A {
            enter ref NoSuch.NoSuch;
        }
    }

# ---------------------------------------------------------------------------
# Import-related errors (Layer 2 PR-A alignment).
#
# These cover the ``imports.py`` raise sites that previously surfaced as
# unstructured ``SyntaxError`` ``ValueError``. jsfcstm has its own set of
# import-time analyzers (workspace-graph based) which now emit the same
# ``E_IMPORT_*`` codes so the two ends stay aligned.
# ---------------------------------------------------------------------------

E_IMPORT_NOT_FOUND:
  severity: error
  capability: pure_static
  description: >-
    An ``import`` statement points at a source file that cannot be found,
    cannot be read, or fails to parse.
  refs:
    source_path:
      type: str
      required: true
      description: >-
        The source-path token from the import statement, exactly as it
        appeared in the DSL.
    alias:
      type: str
      required: true
      description: >-
        The alias under which the import was declared.
    host_state_path:
      type: str
      required: true
      description: >-
        Dotted path of the composite state hosting the import statement.
    reason:
      type: str
      required: true
      description: >-
        Why resolution failed.
      enum: ['file_not_found', 'read_error', 'parse_error', 'no_root_state']
  for_llm:
    summary: >-
      An imported sub-machine file is missing or unreadable. The import
      statement at host_state_path is dangling — every downstream
      mapping that depends on it will also be invalid.
    recommended_actions:
      - kind: fix_path
        target: import_statement
        rationale: >-
          Adjust the source_path to a real file relative to the host file,
          or remove the import if the sub-machine is no longer required.
      - kind: create_file
        target: import_target
        rationale: >-
          If the file should exist, create it with at least a top-level
          ``state Root { ... }`` so its root state can be merged in.
    do_not:
      - "Do not silently rename the alias to dodge the missing file."
      - "Do not add a placeholder state under the alias — the import must resolve to a real file."
  example_dsl: |
    state System {
        import "missing.fcstm" as Sub;
    }

E_IMPORT_CIRCULAR:
  severity: error
  capability: pure_static
  description: >-
    A cycle was detected while resolving ``import`` statements between
    two or more state-machine source files.
  refs:
    source_path:
      type: str
      required: true
      description: The source-path token that closed the cycle.
    alias:
      type: str
      required: true
      description: The alias under which the cyclic import was declared.
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    cycle_chain:
      type: list[str]
      required: true
      description: >-
        Ordered list of file paths that participate in the cycle, starting
        and ending at the same file.
  for_llm:
    summary: >-
      Two or more state-machine files import each other transitively. The
      compiler refuses to resolve cycles to keep the merged hierarchy
      tractable.
    recommended_actions:
      - kind: refactor
        target: import_statement
        rationale: >-
          Break the cycle by extracting the shared state(s) into a third
          file that both ends import without depending on each other.
      - kind: drop_back_edge
        target: import_statement
        rationale: >-
          If the cycle is accidental, remove the import statement that
          closes the loop (the one named in ``source_path``).
    do_not:
      - "Do not duplicate the imported states inline to break the cycle — that defeats the purpose of imports."
      - "Do not introduce a stub alias that re-exports the cycle from another file."
  example_dsl: |
    # a.fcstm
    state A { import "b.fcstm" as B; }
    # b.fcstm
    state B { import "a.fcstm" as A; }

E_IMPORT_ALIAS_CONFLICT:
  severity: error
  capability: pure_static
  description: >-
    An ``import`` alias clashes with an existing child state (or with
    another import alias) under the same composite state.
  refs:
    alias:
      type: str
      required: true
      description: The conflicting alias name.
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    conflicting_kind:
      type: str
      required: true
      description: >-
        What the alias clashed with.
      enum: ['existing_substate', 'previous_import_alias']
  for_llm:
    summary: >-
      The import alias collides with an already-defined name in the same
      composite scope. The merged hierarchy cannot have two children
      sharing a name.
    recommended_actions:
      - kind: rename_alias
        target: import_statement
        rationale: >-
          Pick a unique alias for the import; references to the imported
          machine elsewhere in the file must follow the new alias.
      - kind: rename_other
        target: existing_substate
        rationale: >-
          If the existing substate is the one that should be renamed,
          update its declaration and every transition referencing it.
    do_not:
      - "Do not silently drop one of the conflicting definitions."
      - "Do not add a numeric suffix to the alias as an automatic fix without checking downstream references."
  example_dsl: |
    state System {
        state Worker;
        import "worker.fcstm" as Worker;
    }

E_IMPORT_DUPLICATE_MAPPING:
  severity: error
  capability: pure_static
  description: >-
    Two or more mapping clauses under the same ``import { ... }`` block
    target the same source name (event or variable), or two source names
    target the same host name.
  refs:
    alias:
      type: str
      required: true
      description: The import alias whose mapping is duplicated.
    mapping_kind:
      type: str
      required: true
      description: >-
        Which mapping flavor was duplicated.
      enum: ['event', 'variable']
    duplicated_name:
      type: str
      required: true
      description: >-
        The source-side or target-side name that appears more than once.
    direction:
      type: str
      required: true
      description: >-
        Which side of the mapping was duplicated.
      enum: ['source_duplicated', 'target_duplicated']
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
  for_llm:
    summary: >-
      An import-mapping block contains a duplicate source or target name.
      Each source identifier can be mapped at most once; each target host
      slot can receive at most one source.
    recommended_actions:
      - kind: drop_duplicate
        target: mapping_clause
        rationale: >-
          Delete the duplicated mapping line — keep the intended one.
      - kind: rename_target
        target: mapping_clause
        rationale: >-
          If both sources are needed, give them distinct host-side names
          via a fresh mapping target.
    do_not:
      - "Do not merge mappings by concatenating their values."
      - "Do not introduce wildcard selectors to mask the duplicate."
  example_dsl: |
    state System {
        import "sub.fcstm" as Sub {
            def x = a;
            def x = b;
        }
    }

E_IMPORT_MAPPING_INVALID:
  severity: error
  capability: pure_static
  description: >-
    An import-mapping clause refers to a source name that does not exist
    in the imported machine, uses an invalid selector / template, or
    points at a host target that cannot host the mapped element.
  refs:
    alias:
      type: str
      required: true
      description: The import alias whose mapping is malformed.
    mapping_kind:
      type: str
      required: true
      description: Mapping flavor.
      enum: ['event', 'variable']
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    reason:
      type: str
      required: true
      description: Short tag describing the failure mode.
      enum:
        - 'source_not_found'
        - 'target_invalid'
        - 'selector_invalid'
        - 'template_invalid'
        - 'empty_path'
        - 'host_root_mismatch'
    detail:
      type: str
      required: true
      description: >-
        Human-readable specifics of the mapping failure (mapping text,
        selector / template literal, or path that failed to resolve).
  for_llm:
    summary: >-
      An ``import { ... }`` mapping clause is malformed or points at a
      non-existent element on the source side / a non-receivable element
      on the host side.
    recommended_actions:
      - kind: fix_source
        target: mapping_clause
        rationale: >-
          Update the source-side name to match a real def / event in the
          imported file.
      - kind: fix_target
        target: mapping_clause
        rationale: >-
          Update the host-side target to a valid identifier that the
          merge can attach the imported element to.
      - kind: drop_clause
        target: mapping_clause
        rationale: >-
          Remove the mapping if it was speculative — unmapped imports
          still merge under their alias.
    do_not:
      - "Do not invent fake source names to make the selector match."
      - "Do not silently widen the selector to a wildcard if the original was specific."
  example_dsl: |
    state System {
        import "sub.fcstm" as Sub {
            def x = no_such_var;
        }
    }
