title: Combo transition trigger exit guard mutation alignment
origin:
  files:
  - test/simulate/test_combo_runtime_compat.py::test_event_guard_event_success_matches_hand_written_pseudo_chain
  - test/simulate/test_combo_runtime_compat.py::test_middle_guard_false_rolls_back_and_uses_later_fallback_transition
  - test/fixtures/simulate_semantics/cases/combo_transition_trigger_exit_guard_mutation_alignment.fcstm
  notes:
  - Covers combo guard terms that read variables written by the source state's exit action during the same cycle.
  - The first phase proves the middle guard is evaluated after source exit actions by requiring the exit action to set gate before the guard can pass.
  - The second phase proves a false guard after a source-exit mutation rolls back only the speculative combo continuation and still lets a later same-source fallback commit with the already-required source exit ordering.
categories:
- runtime
- template_alignment
- pseudo_chain
- lifecycle
steps:
- cycle: []
  expect:
    state: Root.StartTrue
    vars:
      gate: 0
      score: 0
    ended: false
- cycle:
  - Root.StartTrue.Kick
  - Root.StartTrue.Ack
  expect:
    state: Root.TargetTrue
    vars:
      gate: 1
      score: 111
    ended: false
- cycle:
  - Root.TargetTrue.Next
  expect:
    state: Root.StartFalse
    vars:
      gate: 0
      score: 111
    ended: false
- cycle:
  - Root.StartFalse.Kick
  - Root.StartFalse.Ack
  expect:
    state: Root.FallbackFalse
    vars:
      gate: 1
      score: 102111
    ended: false
- cycle:
  - Root.FallbackFalse.Finish
  expect:
    state: Root.Done
    vars:
      gate: 1
      score: 102111
    ended: false
