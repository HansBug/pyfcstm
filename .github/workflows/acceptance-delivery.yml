name: Acceptance Delivery

on:
  push:
    paths:
      - 'pyfcstm/**'
      - 'templates/**'
      - 'docs/**'
      - 'editors/jsfcstm/**'
      - 'editors/vscode/**'
      - 'editors/fcstm.tmLanguage.json'
      - 'tools/**'
      - 'logos/**'
      - 'setup.py'
      - 'setup.cfg'
      - 'pyproject.toml'
      - 'MANIFEST.in'
      - 'requirements*.txt'
      - 'Makefile'
      - '.github/workflows/acceptance-delivery.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable_artifacts:
    name: Build Python packages and VSIX
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            -r requirements.txt \
            -r requirements-dev.txt \
            -r requirements-build.txt
          npm install --global @vscode/vsce
          make antlr
      - name: Build and validate Python packages
        shell: bash
        run: |
          set -euo pipefail
          make package
          python tools/check_acceptance_artifacts.py packages \
            --artifact-dir dist \
            --source docs/source/acceptance/acceptance.fcstm \
            --install-smoke \
            --python python \
            --assert-isolated
      - name: Build and validate VSIX
        shell: bash
        run: |
          set -euo pipefail
          make vscode
          vsix_file="$(find editors/vscode/build -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          test -n "$vsix_file"
          python tools/check_acceptance_artifacts.py vsix \
            --path "$vsix_file" \
            --source docs/source/acceptance/acceptance.fcstm
      - name: Stage portable deliverables
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acceptance-stage
          cp dist/pyfcstm-*.whl acceptance-stage/
          cp dist/pyfcstm-*.tar.gz acceptance-stage/
          cp editors/vscode/build/*.vsix acceptance-stage/
          test "$(find acceptance-stage -maxdepth 1 -type f | wc -l)" -eq 3
      - name: Upload portable staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-portable-${{ github.run_id }}
          path: acceptance-stage/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  acceptance_pdf:
    name: Build complete acceptance PDF
    runs-on: ubuntu-24.04
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty-v1.2023.6
        ports:
          - 18080:8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PDF dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            graphviz \
            fonts-freefont-otf \
            latexmk \
            librsvg2-bin \
            make \
            mupdf-tools \
            pandoc \
            poppler-utils \
            qpdf \
            ripgrep \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-xetex
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-doc.txt
          python -m pip install -e . --no-deps
      - name: Build and validate complete acceptance PDF
        env:
          PLANTUML_HOST: http://localhost:18080
        shell: bash
        run: |
          set -euo pipefail
          xelatex --version | head -n 1
          plantumlcli -c
          python tools/check_docs_pdf.py --check
          make docs_pdf
          python tools/check_acceptance_artifacts.py pdf \
            --build-root docs/build/pdf/acceptance-zh
      - name: Stage PDF deliverable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acceptance-stage
          cp \
            docs/build/pdf/acceptance-zh/latex/pyfcstm-acceptance-zh.pdf \
            acceptance-stage/
          test "$(find acceptance-stage -maxdepth 1 -type f | wc -l)" -eq 1
      - name: Upload PDF staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-pdf-${{ github.run_id }}
          path: acceptance-stage/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  windows_cli:
    name: Build Windows 7 delivery CLI
    runs-on: windows-2022
    env:
      OS_NAME: Windows
      IS_WIN: '1'
      IS_MAC: ''
      PYFCSTM_WINDOWS7_DELIVERY_BASELINE: windows-2022-cpython-3.7-x86_64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Install GNU Make
        shell: powershell
        run: choco install make --no-progress -y
      - name: Set up Cairo runtime
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-cairo
      - name: Expose Cairo runtime
        shell: bash
        run: echo "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" >> "$GITHUB_PATH"
      - name: Set up Python 3.7
        uses: actions/setup-python@v6
        with:
          python-version: '3.7'
          architecture: 'x64'
      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt
      - name: Build and validate Windows executable
        shell: bash
        run: |
          set -euo pipefail
          make build
          executable="$(python -m tools.resources --artifact-path)"
          test -f "$executable"
          mkdir -p build/acceptance-tools
          curl -fsSL \
            -o build/acceptance-tools/plantuml-1.2022.7.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2022.7/plantuml-1.2022.7.jar
          printf '%s  %s\n' \
            eaea0c5777f3ee2c484046d115e2404156bd005961d37dd219f03ae5650375b8 \
            build/acceptance-tools/plantuml-1.2022.7.jar | sha256sum --check
          python tools/check_acceptance_artifacts.py executable \
            --path "$executable" \
            --source docs/source/acceptance/acceptance.fcstm \
            --plantuml-jar build/acceptance-tools/plantuml-1.2022.7.jar
          mkdir -p acceptance-stage
          cp "$executable" acceptance-stage/
          test "$(find acceptance-stage -maxdepth 1 -type f | wc -l)" -eq 1
      - name: Upload Windows staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-stage-windows-${{ github.run_id }}
          path: acceptance-stage/*
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  bundle:
    name: Assemble acceptance delivery
    runs-on: ubuntu-22.04
    needs:
      - portable_artifacts
      - acceptance_pdf
      - windows_cli
    steps:
      - name: Download all staged deliverables
        uses: actions/download-artifact@v4
        with:
          pattern: acceptance-stage-*-${{ github.run_id }}
          path: delivery
          merge-multiple: true
      - name: Verify the five-file delivery contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          root = Path('delivery')
          files = sorted(path for path in root.iterdir() if path.is_file())
          names = [path.name for path in files]
          if len(files) != 5:
              raise SystemExit(
                  'Expected exactly five delivery files, got {0}: {1}'.format(
                      len(files), names
                  )
              )

          def unique_match(pattern):
              matches = [path for path in files if re.fullmatch(pattern, path.name)]
              if len(matches) != 1:
                  raise SystemExit(
                      'Expected one file matching {0!r}, got {1!r}.'.format(
                          pattern, [path.name for path in matches]
                      )
                  )
              return matches[0]

          wheel = unique_match(r'pyfcstm-([0-9][^-]*)-py3-none-any\.whl')
          version = re.fullmatch(
              r'pyfcstm-([0-9][^-]*)-py3-none-any\.whl', wheel.name
          ).group(1)
          sdist = unique_match(r'pyfcstm-{0}\.tar\.gz'.format(re.escape(version)))
          executable = unique_match(
              r'pyfcstm-{0}-windows-x86_64\.exe'.format(re.escape(version))
          )
          pdf = unique_match(r'pyfcstm-acceptance-zh\.pdf')
          vsix = unique_match(r'fcstm-language-support-([0-9][^-]*)\.vsix')

          signatures = {
              wheel: b'PK',
              sdist: b'\x1f\x8b',
              executable: b'MZ',
              pdf: b'%PDF',
              vsix: b'PK',
          }
          for path, signature in signatures.items():
              if path.stat().st_size <= len(signature):
                  raise SystemExit('Delivery file is empty: {0}.'.format(path.name))
              with path.open('rb') as stream:
                  actual = stream.read(len(signature))
              if actual != signature:
                  raise SystemExit(
                      'Invalid signature for {0}: expected {1!r}, got {2!r}.'.format(
                          path.name, signature, actual
                      )
                  )

          summary_path = Path(os.environ['GITHUB_STEP_SUMMARY'])
          with summary_path.open('a', encoding='utf-8') as summary:
              print('## Acceptance delivery', file=summary)
              print('', file=summary)
              print('| File | Bytes | SHA-256 |', file=summary)
              print('| --- | ---: | --- |', file=summary)
              for path in files:
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  print(
                      '| `{0}` | {1} | `{2}` |'.format(
                          path.name, path.stat().st_size, digest
                      ),
                      file=summary,
                  )
          PY
      - name: Upload consolidated acceptance delivery
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-acceptance-delivery-${{ github.sha }}
          path: delivery/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
      - name: Link consolidated artifact
        shell: bash
        run: |
          {
            echo
            echo "Artifact: ${{ steps.upload.outputs.artifact-url }}"
          } >> "$GITHUB_STEP_SUMMARY"
