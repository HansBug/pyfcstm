#file: noinspection YAMLSchemaValidation
name: Code Test

on:
  push:
  workflow_dispatch:
    inputs:
      template_suites:
        description: 'Comma-separated template suites to run fully, e.g. c,c_poll or all.'
        required: false
        default: ''
      skip_template_suites:
        description: 'Comma-separated manually selected template suites to skip.'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  detect_template_suites:
    name: Detect template suites
    runs-on: ubuntu-22.04
    outputs:
      template_matrix: ${{ steps.detect.outputs.template_matrix }}
      selected_full_count: ${{ steps.detect.outputs.selected_full_count }}
      selected_suites: ${{ steps.detect.outputs.selected_suites }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Detect selected template suites
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DISPATCH_TEMPLATE_SUITES: ${{ github.event.inputs.template_suites }}
          DISPATCH_SKIP_TEMPLATE_SUITES: ${{ github.event.inputs.skip_template_suites }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/template-suites
          changed_file=.ci/template-suites/changed-files.txt
          message_file=.ci/template-suites/message.txt
          detector_output=.ci/template-suites/detector.json
          : > "$changed_file"
          : > "$message_file"

          include_args=()
          skip_args=()
          detector_event="${GITHUB_EVENT_NAME}"
          zero_sha="0000000000000000000000000000000000000000"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            printf '%s' "${HEAD_COMMIT_MSG:-}" > "$message_file"
            ref_name="${REF_NAME:-}"
            default_branch="${DEFAULT_BRANCH:-}"
            if [ -z "${HEAD_SHA:-}" ] || ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              echo "Push head SHA is unavailable; failing closed to all template full suites."
              include_args=(--include-suites all)
            elif [ -z "$default_branch" ]; then
              echo "Default branch is unavailable; failing closed to all template full suites."
              include_args=(--include-suites all)
            elif [ -n "$ref_name" ] && [ "$ref_name" != "$default_branch" ]; then
              echo "Push on non-default ref ${ref_name}; detecting suites from merge-base with ${default_branch}."
              if git fetch --no-tags --prune origin "+refs/heads/${default_branch}:refs/remotes/origin/${default_branch}" \
                && merge_base="$(git merge-base "origin/${default_branch}" "${HEAD_SHA}")" \
                && [ -n "$merge_base" ] \
                && git diff --name-only "$merge_base" "${HEAD_SHA}" > "$changed_file"; then
                echo "Detected changed files between merge-base ${merge_base} and ${HEAD_SHA}."
              else
                echo "Could not diff ${default_branch} merge-base..${HEAD_SHA}; failing closed to all template full suites."
                : > "$changed_file"
                include_args=(--include-suites all)
              fi
            elif [ -z "${BEFORE_SHA:-}" ] || [ "${BEFORE_SHA}" = "$zero_sha" ]; then
              echo "Default-branch push base SHA is unavailable; failing closed to all template full suites."
              include_args=(--include-suites all)
            elif git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null && git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}" > "$changed_file"; then
              echo "Detected changed files between ${BEFORE_SHA} and ${HEAD_SHA}."
            else
              echo "Could not diff ${BEFORE_SHA}..${HEAD_SHA}; failing closed to all template full suites."
              : > "$changed_file"
              include_args=(--include-suites all)
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            detector_event="workflow_dispatch"
            dispatch_include="${DISPATCH_TEMPLATE_SUITES:-}"
            dispatch_skip="${DISPATCH_SKIP_TEMPLATE_SUITES:-}"
            if [ -n "$(printf '%s' "$dispatch_include" | tr -d '[:space:]')" ]; then
              include_args=(--include-suites "$dispatch_include")
              if [ -n "$(printf '%s' "$dispatch_skip" | tr -d '[:space:]')" ]; then
                skip_args=(--skip-suites "$dispatch_skip")
              fi
            else
              echo "workflow_dispatch has no positive template_suites input; failing closed to all template full suites."
              if [ -n "$(printf '%s' "$dispatch_skip" | tr -d '[:space:]')" ]; then
                echo "Ignoring skip_template_suites without positive template_suites so skip-only dispatch cannot narrow coverage."
              fi
              include_args=(--include-suites all)
            fi
          else
            echo "Unsupported event ${GITHUB_EVENT_NAME}; failing closed to all template full suites."
            detector_event="local"
            include_args=(--include-suites all)
          fi

          python tools/detect_template_suites.py \
            --changed-files "$changed_file" \
            --commit-message-file "$message_file" \
            --event-name "$detector_event" \
            "${include_args[@]}" \
            "${skip_args[@]}" \
            --json > "$detector_output"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path('.ci/template-suites/detector.json')
          result = json.loads(output_path.read_text(encoding='utf-8'))
          matrix = result.get('matrix', {'include': []})
          selected_suites = result.get('selected_suites', [])
          full_count = len(matrix.get('include', []))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              print('template_matrix=' + json.dumps(matrix, separators=(',', ':')), file=out)
              print('selected_full_count=' + str(full_count), file=out)
              print('selected_suites=' + ','.join(selected_suites), file=out)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              print('## Template suite detector', file=summary)
              print('', file=summary)
              print('* Selected suites: `{0}`'.format(','.join(selected_suites) or '(none)'), file=summary)
              print('* Dynamic full suite count: `{0}`'.format(full_count), file=summary)
              print('', file=summary)
              print('```json', file=summary)
              print(json.dumps(result, indent=2, sort_keys=True), file=summary)
              print('```', file=summary)
          PY


  detect_ci_routes:
    name: Detect CI routes
    runs-on: ubuntu-22.04
    outputs:
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
      docs_resource_changed: ${{ steps.detect.outputs.docs_resource_changed }}
      code_changed: ${{ steps.detect.outputs.code_changed }}
      js_changed: ${{ steps.detect.outputs.js_changed }}
      cli_changed: ${{ steps.detect.outputs.cli_changed }}
      code_test_relevant: ${{ steps.detect.outputs.code_test_relevant }}
      run_expensive_code_test: ${{ steps.detect.outputs.run_expensive_code_test }}
      run_cli_build: ${{ steps.detect.outputs.run_cli_build }}
      run_jsfcstm_test: ${{ steps.detect.outputs.run_jsfcstm_test }}
      run_docs_check: ${{ steps.detect.outputs.run_docs_check }}
      fail_closed: ${{ steps.detect.outputs.fail_closed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Detect CI routes
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/ci-routes
          changed_file=.ci/ci-routes/changed-files.txt
          detector_output=.ci/ci-routes/detector.json
          : > "$changed_file"

          detector_event="${GITHUB_EVENT_NAME}"
          fail_closed_args=()
          zero_sha="0000000000000000000000000000000000000000"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            ref_name="${REF_NAME:-}"
            default_branch="${DEFAULT_BRANCH:-}"
            if [ -z "${HEAD_SHA:-}" ] || ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              echo "Push head SHA is unavailable; failing closed for CI routes."
              fail_closed_args=(--fail-closed)
            elif [ -z "$default_branch" ]; then
              echo "Default branch is unavailable; failing closed for CI routes."
              fail_closed_args=(--fail-closed)
            elif [ -n "$ref_name" ] && [ "$ref_name" != "$default_branch" ]; then
              echo "Push on non-default ref ${ref_name}; detecting CI routes from merge-base with ${default_branch}."
              if git fetch --no-tags --prune origin "+refs/heads/${default_branch}:refs/remotes/origin/${default_branch}" \
                && merge_base="$(git merge-base "origin/${default_branch}" "${HEAD_SHA}")" \
                && [ -n "$merge_base" ] \
                && git diff --name-only "$merge_base" "${HEAD_SHA}" > "$changed_file"; then
                echo "Detected changed files between merge-base ${merge_base} and ${HEAD_SHA}."
              else
                echo "Could not diff ${default_branch} merge-base..${HEAD_SHA}; failing closed for CI routes."
                : > "$changed_file"
                fail_closed_args=(--fail-closed)
              fi
            elif [ -z "${BEFORE_SHA:-}" ] || [ "${BEFORE_SHA}" = "$zero_sha" ]; then
              echo "Default-branch push base SHA is unavailable; failing closed for CI routes."
              fail_closed_args=(--fail-closed)
            elif git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null && git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}" > "$changed_file"; then
              echo "Detected changed files between ${BEFORE_SHA} and ${HEAD_SHA}."
            else
              echo "Could not diff ${BEFORE_SHA}..${HEAD_SHA}; failing closed for CI routes."
              : > "$changed_file"
              fail_closed_args=(--fail-closed)
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ -n "${PR_BASE_SHA:-}" ] \
              && [ -n "${PR_HEAD_SHA:-}" ] \
              && git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null \
              && git cat-file -e "${PR_HEAD_SHA}^{commit}" 2>/dev/null \
              && git diff --name-only "${PR_BASE_SHA}" "${PR_HEAD_SHA}" > "$changed_file"; then
              echo "Detected changed files between PR base ${PR_BASE_SHA} and head ${PR_HEAD_SHA}."
            else
              echo "Could not diff PR base..head; failing closed for CI routes."
              : > "$changed_file"
              fail_closed_args=(--fail-closed)
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            detector_event="workflow_dispatch"
            echo "workflow_dispatch uses fail-closed CI route defaults."
          else
            echo "Unsupported event ${GITHUB_EVENT_NAME}; failing closed for CI routes."
            detector_event="local"
            fail_closed_args=(--fail-closed)
          fi

          python .github/scripts/detect_ci_routes.py \
            --changed-files "$changed_file" \
            --event-name "$detector_event" \
            "${fail_closed_args[@]}" \
            --json > "$detector_output"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          output_path = Path('.ci/ci-routes/detector.json')
          result = json.loads(output_path.read_text(encoding='utf-8'))
          output_keys = (
              'docs_changed',
              'docs_resource_changed',
              'code_changed',
              'js_changed',
              'cli_changed',
              'code_test_relevant',
              'run_expensive_code_test',
              'run_cli_build',
              'run_jsfcstm_test',
              'run_docs_check',
              'fail_closed',
          )
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              for key in output_keys:
                  value = result.get(key, False)
                  print('{0}={1}'.format(key, str(bool(value)).lower()), file=out)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              print('## CI route detector', file=summary)
              print('', file=summary)
              print('* Code Test relevant: `{0}`'.format(result.get('code_test_relevant')), file=summary)
              print('* Run expensive code test: `{0}`'.format(result.get('run_expensive_code_test')), file=summary)
              print('* Run CLI build: `{0}`'.format(result.get('run_cli_build')), file=summary)
              print('* Run jsfcstm test: `{0}`'.format(result.get('run_jsfcstm_test')), file=summary)
              print('* Run Docs Check: `{0}`'.format(result.get('run_docs_check')), file=summary)
              print('* Docs resource changed: `{0}`'.format(result.get('docs_resource_changed')), file=summary)
              print('', file=summary)
              print('```json', file=summary)
              print(json.dumps(result, indent=2, sort_keys=True), file=summary)
              print('```', file=summary)
          PY

  template_representative:
    name: Template representative
    runs-on: ubuntu-22.04
    needs: detect_ci_routes
    if: ${{ needs.detect_ci_routes.outputs.run_expensive_code_test == 'true' && !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'test skip') && !contains(github.event.head_commit.message, '[python skip]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make zip cmake build-essential clang-format gcc g++ clang
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flake8 setuptools wheel twine
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Run representative template alignment
        env:
          CI: 'true'
          SKIP_SLOW_TESTS: ''
        shell: bash
        run: |
          make template_unittest TEMPLATE_UNITTEST_ARGS="--include-suites template_representative"

  template_full:
    name: Template full (${{ matrix.suite }})
    runs-on: ubuntu-22.04
    needs:
      - detect_template_suites
      - detect_ci_routes
    if: ${{ needs.detect_template_suites.result == 'success' && needs.detect_ci_routes.result == 'success' && needs.detect_template_suites.outputs.selected_full_count != '0' && !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'test skip') && !contains(github.event.head_commit.message, '[python skip]') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect_template_suites.outputs.template_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make zip cmake build-essential clang-format gcc g++ clang
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flake8 setuptools wheel twine
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Run selected template full suite
        env:
          CI: 'true'
          SKIP_SLOW_TESTS: ''
          TEMPLATE_SUITE: ${{ matrix.suite }}
          TEMPLATE_SUITE_REASON: ${{ matrix.reason }}
        shell: bash
        run: |
          echo "Running template suite '${TEMPLATE_SUITE}' selected because '${TEMPLATE_SUITE_REASON}'."
          make template_unittest TEMPLATE_UNITTEST_ARGS="--include-suites ${TEMPLATE_SUITE}"

  template_suite_gate:
    name: template-suite-gate
    runs-on: ubuntu-22.04
    needs:
      - detect_template_suites
      - detect_ci_routes
      - unittest
      - template_representative
      - template_full
      - build_cli
      - fresh_cli_selfcheck_linux
      - fresh_cli_selfcheck_nonlinux
      - jsfcstm_test
    if: ${{ always() }}
    steps:
      - name: Check template suite results
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          TEMPLATE_DETECTOR_RESULT: ${{ needs.detect_template_suites.result }}
          ROUTE_RESULT: ${{ needs.detect_ci_routes.result }}
          UNITTEST_RESULT: ${{ needs.unittest.result }}
          REPRESENTATIVE_RESULT: ${{ needs.template_representative.result }}
          TEMPLATE_FULL_RESULT: ${{ needs.template_full.result }}
          BUILD_CLI_RESULT: ${{ needs.build_cli.result }}
          FRESH_CLI_LINUX_RESULT: ${{ needs.fresh_cli_selfcheck_linux.result }}
          FRESH_CLI_NONLINUX_RESULT: ${{ needs.fresh_cli_selfcheck_nonlinux.result }}
          JSFCSTM_RESULT: ${{ needs.jsfcstm_test.result }}
          SELECTED_FULL_COUNT: ${{ needs.detect_template_suites.outputs.selected_full_count }}
          SELECTED_SUITES: ${{ needs.detect_template_suites.outputs.selected_suites }}
          CODE_TEST_RELEVANT: ${{ needs.detect_ci_routes.outputs.code_test_relevant }}
          RUN_EXPENSIVE_CODE_TEST: ${{ needs.detect_ci_routes.outputs.run_expensive_code_test }}
          RUN_CLI_BUILD: ${{ needs.detect_ci_routes.outputs.run_cli_build }}
          RUN_JSFCSTM_TEST: ${{ needs.detect_ci_routes.outputs.run_jsfcstm_test }}
          ROUTE_FAIL_CLOSED: ${{ needs.detect_ci_routes.outputs.fail_closed }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys

          def is_true(value):
              return (value or '').strip().lower() == 'true'

          message = os.environ.get('HEAD_COMMIT_MSG') or ''
          skip_all = 'ci skip' in message
          skip_python_side = skip_all or 'test skip' in message or '[python skip]' in message
          skip_js_side = skip_all or 'test skip' in message or '[js skip]' in message

          template_detector = os.environ.get('TEMPLATE_DETECTOR_RESULT') or ''
          route = os.environ.get('ROUTE_RESULT') or ''
          unittest = os.environ.get('UNITTEST_RESULT') or ''
          representative = os.environ.get('REPRESENTATIVE_RESULT') or ''
          template_full = os.environ.get('TEMPLATE_FULL_RESULT') or ''
          build_cli = os.environ.get('BUILD_CLI_RESULT') or ''
          fresh_cli_linux = os.environ.get('FRESH_CLI_LINUX_RESULT') or ''
          fresh_cli_nonlinux = os.environ.get('FRESH_CLI_NONLINUX_RESULT') or ''
          jsfcstm = os.environ.get('JSFCSTM_RESULT') or ''
          selected_count_text = os.environ.get('SELECTED_FULL_COUNT') or ''
          selected_suites = os.environ.get('SELECTED_SUITES') or ''
          run_expensive_code_test = is_true(os.environ.get('RUN_EXPENSIVE_CODE_TEST'))
          run_cli_build = is_true(os.environ.get('RUN_CLI_BUILD'))
          run_jsfcstm_test = is_true(os.environ.get('RUN_JSFCSTM_TEST'))
          code_test_relevant = is_true(os.environ.get('CODE_TEST_RELEVANT'))
          route_fail_closed = is_true(os.environ.get('ROUTE_FAIL_CLOSED'))

          if selected_count_text.strip():
              try:
                  selected_count = int(selected_count_text)
              except ValueError:
                  selected_count = -1
          else:
              selected_count = -1

          print('template_detector={0}'.format(template_detector))
          print('route={0}'.format(route))
          print('unittest={0}'.format(unittest))
          print('representative={0}'.format(representative))
          print('template_full={0}'.format(template_full))
          print('build_cli={0}'.format(build_cli))
          print('fresh_cli_linux={0}'.format(fresh_cli_linux))
          print('fresh_cli_nonlinux={0}'.format(fresh_cli_nonlinux))
          print('jsfcstm={0}'.format(jsfcstm))
          print('selected_full_count={0}'.format(selected_count_text))
          print('selected_suites={0}'.format(selected_suites or '(none)'))
          print('code_test_relevant={0}'.format(code_test_relevant))
          print('run_expensive_code_test={0}'.format(run_expensive_code_test))
          print('run_cli_build={0}'.format(run_cli_build))
          print('run_jsfcstm_test={0}'.format(run_jsfcstm_test))
          print('route_fail_closed={0}'.format(route_fail_closed))

          failures = []
          if template_detector != 'success':
              failures.append('template detector job result is {0}'.format(template_detector))
          if route != 'success':
              failures.append('CI route detector job result is {0}'.format(route))
          if selected_count < 0:
              failures.append('selected_full_count is not an integer: {0}'.format(selected_count_text))

          if failures:
              for failure in failures:
                  print('ERROR: {0}'.format(failure))
              sys.exit(1)

          if skip_python_side:
              print('Code Test skip token detected for Python/template side; expensive Python/template jobs may be skipped after detector success.')
          else:
              if run_expensive_code_test:
                  if unittest != 'success':
                      failures.append('unittest job result is {0}'.format(unittest))
                  if representative != 'success':
                      failures.append('template representative job result is {0}'.format(representative))
              else:
                  print('CI route detector marked Python/template side as Code Test unrelated; skipped unittest and representative template jobs are accepted.')

              if selected_count == 0:
                  if template_full not in ('success', 'skipped'):
                      failures.append('template full job should be skipped or success for empty matrix, got {0}'.format(template_full))
              elif template_full != 'success':
                  failures.append('template full job result is {0} for {1} selected suite(s)'.format(template_full, selected_count))

          if skip_all or '[python skip]' in message:
              print('Code Test skip token detected for CLI build; skipped CLI build is accepted.')
          elif run_cli_build and build_cli != 'success':
              failures.append('CLI build job result is {0}'.format(build_cli))
          elif run_cli_build:
              if fresh_cli_linux != 'success':
                  failures.append('fresh Linux CLI self-check result is {0}'.format(fresh_cli_linux))
              if fresh_cli_nonlinux != 'success':
                  failures.append('fresh Windows/macOS CLI self-check result is {0}'.format(fresh_cli_nonlinux))
          elif not run_cli_build:
              print('CI route detector marked CLI build as unrelated; skipped CLI build is accepted.')

          if skip_js_side:
              print('Code Test skip token detected for jsfcstm; skipped jsfcstm job is accepted.')
          elif run_jsfcstm_test and jsfcstm != 'success':
              failures.append('jsfcstm job result is {0}'.format(jsfcstm))
          elif not run_jsfcstm_test:
              print('CI route detector marked jsfcstm as unrelated; skipped jsfcstm job is accepted.')

          if not code_test_relevant:
              print('Code Test route is lightweight-only: detector and template-suite-gate provide the stable required check.')

          if failures:
              for failure in failures:
                  print('ERROR: {0}'.format(failure))
              sys.exit(1)
          print('template-suite-gate passed')
          PY

  unittest:
    name: Code test
    runs-on: ${{ matrix.os }}
    needs: detect_ci_routes
    if: ${{ needs.detect_ci_routes.outputs.run_expensive_code_test == 'true' && !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'test skip') && !contains(github.event.head_commit.message, '[python skip]') }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
        python-version:
          - '3.7'
          - '3.8'
          - '3.9'
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        exclude:
          - os: 'macos-14'
            python-version: '3.7'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Set environment for Cpython
        if: ${{ !contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=" >> $GITHUB_ENV
      - name: Set environment for PyPy
        if: ${{ contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependences on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make zip
          sudo apt-get install -y git-lfs
          sudo apt-get install -y p7zip-full rar unrar
      - name: Set up system dependences on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make zip
          choco install 7zip
          choco install mingw
          choco install llvm
          echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\bin" >> $GITHUB_PATH
          echo "C:\\ProgramData\\chocolatey\\lib\\mingw\\tools\\install\\mingw64\\bin" >> $GITHUB_PATH
          echo "C:\\Program Files\\LLVM\\bin" >> $GITHUB_PATH
      - name: Set up system dependences on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        run: |
          brew install tree cloc wget curl make zip
          brew install sevenzip
          brew install --cask rar
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade flake8 setuptools wheel twine
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      - name: Test the basic environment
        shell: bash
        run: |
          python -V
          pip --version
          pip list
          if command -v tree >/dev/null 2>&1; then tree .; else echo "tree not available; skipping directory tree output"; fi
          if command -v cloc >/dev/null 2>&1; then cloc pyfcstm; else echo "cloc not available; skipping pyfcstm line count"; fi
          if command -v cloc >/dev/null 2>&1; then cloc test; else echo "cloc not available; skipping test line count"; fi
      - name: Enable lightweight template test subset
        id: template_subset
        # Pass the commit message via env to avoid shell injection. Inline
        # `${{ github.event.head_commit.message }}` would be substituted as
        # raw shell tokens before bash sees the script, so any backtick,
        # bracket, or `key: value` pattern in the commit body could be
        # mis-parsed as commands.
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          echo "SKIP_SLOW_TESTS=1" >> "$GITHUB_ENV"
          if printf '%s' "$HEAD_COMMIT_MSG" | grep -q '\[skip-slow\]'; then
            echo "Detected legacy [skip-slow] — default Code Test already uses the lightweight template subset."
          else
            echo "Default Code Test uses the lightweight template subset; selected full suites run in template_full jobs."
          fi
      - name: Run test boundary check
        shell: bash
        run: |
          make test_boundary_check
      - name: Run unittest
        env:
          CI: 'true'
        shell: bash
        run: |
          make unittest IS_WIN=${{ env.IS_WIN }} IS_MAC=${{ env.IS_MAC }}
      - name: Run template maintenance checks
        shell: bash
        run: |
          make template_packaging_check
          make template_source_install_check
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: python
          name: codecov-umbrella
          fail_ci_if_error: false

  build_cli:
    name: CLI Build
    runs-on: ${{ matrix.os }}
    needs: detect_ci_routes
    if: ${{ needs.detect_ci_routes.outputs.run_cli_build == 'true' && !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, '[python skip]') }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'windows-2022'
          - 'macos-14'
        python-version:
          - '3.7'
        exclude:
          - os: 'macos-14'
            python-version: '3.7'
        include:
          - os: 'macos-14'
            python-version: '3.8'

    steps:
      - name: Get system version for Linux
        if: ${{ contains(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          echo "OS_NAME=Linux" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for Windows
        if: ${{ contains(matrix.os, 'windows') }}
        shell: bash
        run: |
          echo "OS_NAME=Windows" >> $GITHUB_ENV
          echo "IS_WIN=1" >> $GITHUB_ENV
          echo "IS_MAC=" >> $GITHUB_ENV
      - name: Get system version for MacOS
        if: ${{ contains(matrix.os, 'macos') }}
        shell: bash
        run: |
          echo "OS_NAME=MacOS" >> $GITHUB_ENV
          echo "IS_WIN=" >> $GITHUB_ENV
          echo "IS_MAC=1" >> $GITHUB_ENV
      - name: Set environment for Cpython
        if: ${{ !contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=" >> $GITHUB_ENV
      - name: Set environment for PyPy
        if: ${{ contains(matrix.python-version, 'pypy') }}
        shell: bash
        run: |
          echo "IS_PYPY=1" >> $GITHUB_ENV
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up system dependencies on Linux
        if: ${{ env.OS_NAME == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y tree cloc wget curl make zip
      - name: Set up system dependencies on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          choco install tree cloc wget curl make zip
      - name: Set up Cairo runtime on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo
      - name: Expose Cairo runtime on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          echo "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" >> "$GITHUB_PATH"
      - name: Set up system dependencies on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install tree cloc wget curl make zip
      - name: Set up Cairo runtime on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          brew install cairo pkg-config
      - name: Expose Cairo runtime on MacOS
        if: ${{ env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          BREW_PREFIX="$(brew --prefix)"
          echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> $GITHUB_ENV
          echo "DYLD_FALLBACK_LIBRARY_PATH=${BREW_PREFIX}/lib${DYLD_FALLBACK_LIBRARY_PATH:+:${DYLD_FALLBACK_LIBRARY_PATH}}" >> $GITHUB_ENV
      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
      - name: Verify Cairo runtime on Windows and MacOS
        if: ${{ env.OS_NAME == 'Windows' || env.OS_NAME == 'MacOS' }}
        shell: bash
        run: |
          python - <<'PY'
          import cairosvg
          cairosvg.svg2png(
              bytestring=(
                  b'<svg xmlns="http://www.w3.org/2000/svg" width="1" height="1">'
                  b'<rect width="1" height="1" fill="#000000"/>'
                  b'</svg>'
              )
          )
          print('CairoSVG runtime is available on', "${{ env.OS_NAME }}")
          PY
      - name: Test the basic environment
        shell: bash
        run: |
          python -V
          pip --version
          pip list
          if command -v tree >/dev/null 2>&1; then tree .; else echo "tree not available; skipping directory tree output"; fi
      - name: Get package version
        shell: bash
        run: |
          python -c 'from pyfcstm.config.meta import __VERSION__;print(__VERSION__)'
          echo "PACKAGE_VERSION=$(python -c 'from pyfcstm.config.meta import __VERSION__;print(__VERSION__)')" >> $GITHUB_ENV
          echo "GIT_COMMIT_ID=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
          echo "PYTHON_VERSION=$(python -V | xargs -n 1 | tail -1)" >> $GITHUB_ENV
          echo "CPU_ARCH=$(uname -m)" >> $GITHUB_ENV
      - name: Get CLI name
        shell: bash
        run: |
          echo "ZIP_NAME=pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}-${{ env.GIT_COMMIT_ID }}-standalone" >> $GITHUB_ENV
          echo "CLI_NAME=pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}" >> $GITHUB_ENV
      - name: Build standalone cli on Linux and MacOS
        if: ${{ env.OS_NAME != 'Windows' }}
        shell: bash
        run: |
          make build_info
          # Keep the tracked logo PNG as the build input; otherwise Make's
          # timestamp rule can rewrite it before the recursive build_info
          # prerequisite and falsely mark the artifact dirty.
          make -o logos/logo.png build
          mkdir -p dist/${{ env.CLI_NAME }}
          cp dist/pyfcstm dist/${{ env.CLI_NAME }}/pyfcstm
          cd dist
          zip -r ${{ env.ZIP_NAME }}.zip ${{ env.CLI_NAME }}
          cd ..
          ls -al dist
          dist/pyfcstm -v
          dist/pyfcstm -h
      - name: Test CLI executable on Linux and MacOS
        if: ${{ env.OS_NAME != 'Windows' }}
        shell: bash
        run: |
          make test_cli
      - name: Build standalone CLI on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          make build_info
          # Keep the tracked logo PNG as the build input; see the Linux/macOS
          # build step above.
          make -o logos/logo.png build
          mkdir -p dist/${{ env.CLI_NAME }}
          cp dist/pyfcstm.exe dist/${{ env.CLI_NAME }}/pyfcstm.exe
          cd dist
          zip -r ${{ env.ZIP_NAME }}.zip ${{ env.CLI_NAME }}
          cd ..
          ls -al dist
          dist/pyfcstm.exe -v
          dist/pyfcstm.exe -h
      - name: Test CLI executable on Windows
        if: ${{ env.OS_NAME == 'Windows' }}
        shell: bash
        run: |
          python -m tools.test_cli dist/pyfcstm.exe --test-dsl docs/source/tutorials/cli/simple_machine.fcstm --template-dir test/testfile/template_1
      - name: Record CLI identity and archive digest
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain)"
          {
            echo 'schema=pyfcstm-build-identity/v1'
            echo 'artifact_kind=standalone'
            echo "full_commit=$GITHUB_SHA"
            echo 'dirty=0'
            echo 'tag='
            echo "platform=${{ matrix.os }}"
          } > dist/build-identity.txt
          python - "dist/${ZIP_NAME}.zip" > dist/artifact-sha256.txt <<'PY'
          import hashlib
          import os
          import sys

          path = sys.argv[1]
          digest = hashlib.sha256()
          with open(path, "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print("{} {} dist/{}".format(
              digest.hexdigest(), os.path.getsize(path), os.path.basename(path)
          ))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-v${{ env.PACKAGE_VERSION }}-${{ env.OS_NAME }}-${{ env.CPU_ARCH }}-${{ env.GIT_COMMIT_ID }}
          path: dist
      - uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-cli-${{ matrix.os }}
          if-no-files-found: error
          path: |
            dist/${{ env.ZIP_NAME }}.zip
            dist/build-identity.txt
            dist/artifact-sha256.txt

  fresh_cli_selfcheck_linux:
    name: Fresh CLI self-check (Ubuntu service)
    runs-on: ubuntu-22.04
    needs: build_cli
    if: ${{ needs.build_cli.result == 'success' }}
    services:
      plantuml:
        image: plantuml/plantuml-server@sha256:00b96145a7e2999fd9504b84e26d00c47222b7963a0072ee14ea59449d634e99
        ports:
          - 18080:8080
    timeout-minutes: 20
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-selfcheck-reports"
          mkdir -p "$reports"
          printf 'job=fresh-cli-linux\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
      - name: Set up Java runtime
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: pyfcstm-cli-ubuntu-22.04
          path: ${{ runner.temp }}/pyfcstm-cli-artifact
      - name: Install and verify PlantUML JAR
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Run downloaded CLI in a clean directory
        shell: bash
        env:
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-clean-root"
          reports="$RUNNER_TEMP/pyfcstm-selfcheck-reports"
          rm -rf "$root"
          mkdir -p "$root" "$reports"
          archive=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$archive"
          identity=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -name build-identity.txt -print -quit)
          digest_file=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -name artifact-sha256.txt -print -quit)
          test -n "$identity" -a -n "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=standalone' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' 'platform=ubuntu-22.04'
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          archive_name=$(basename "$archive")
          expected_digest=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          actual_digest=$(python - "$archive" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$archive")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          printf '%s  %s\n' "$actual_digest" "$archive_name" | tee "$reports/artifact.sha256"
          set +e
          curl --fail --location --retry 5 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          unzip -q "$archive" -d "$root"
          if find "$root" -type d -name pyfcstm -print -quit | grep -q .; then
            echo "forbidden source package directory found in clean root" >&2
            exit 1
          fi
          for forbidden in setup.py 'requirements*.txt' Makefile; do
            if find "$root" -type f -name "$forbidden" -print -quit | grep -q .; then
              echo "forbidden source/build file found in clean root: $forbidden" >&2
              exit 1
            fi
          done
          exe=$(find "$root" -type f -name pyfcstm -perm -u+x -print -quit)
          test -n "$exe"
          set +e
          "$exe" --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          "$exe" --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          "$exe" --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
          | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$default_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Record optional PlantUML results
        continue-on-error: true
        shell: bash
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-selfcheck-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload clean CLI evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-cli-selfcheck-ubuntu
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-selfcheck-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt

  fresh_cli_selfcheck_nonlinux:
    name: Fresh CLI self-check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build_cli
    if: ${{ needs.build_cli.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: pyfcstm-cli-windows-2022
            exe: pyfcstm.exe
          - os: macos-14
            artifact: pyfcstm-cli-macos-14
            exe: pyfcstm
    timeout-minutes: 20
    steps:
      - name: Prepare self-check evidence directory
        shell: bash
        run: |
          set -euo pipefail
          reports="$RUNNER_TEMP/pyfcstm-selfcheck-reports"
          mkdir -p "$reports"
          printf 'job=fresh-cli-nonlinux\nstarted_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$reports/bootstrap.txt"
          : > "$RUNNER_TEMP/java-version.txt"
          : > "$RUNNER_TEMP/plantuml-version.txt"
          : > "$RUNNER_TEMP/plantuml-readiness.txt"
          : > "$RUNNER_TEMP/plantuml-service.log"
      - name: Set up Java runtime
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download only the built CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/pyfcstm-cli-artifact
      - name: Install and verify PlantUML JAR
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          jar="$RUNNER_TEMP/plantuml.jar"
          curl --fail --location --silent --show-error \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar \
            --output "$jar"
          actual_digest=$(python - "$jar" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test "$actual_digest" = 5a8dc3b37fe133a4744e55be80caf6080a70350aba716d95400a0f0cbd79e846
          java -version 2> "$RUNNER_TEMP/java-version.txt"
          java -jar "$jar" -version 2>&1 | tee "$RUNNER_TEMP/plantuml-version.txt"
      - name: Start local PlantUML service
        continue-on-error: true
        shell: bash
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/plantuml-service.log"
          java -jar "$RUNNER_TEMP/plantuml.jar" -picoweb:18080:127.0.0.1 > "$log" 2>&1 &
          echo $! > "$RUNNER_TEMP/plantuml-service.pid"
          for attempt in $(seq 1 30); do
            if curl --fail --location --silent --show-error --max-time 2 "${PLANTUML_HOST%/}/" > "$RUNNER_TEMP/plantuml-readiness.txt" 2>&1; then
              exit 0
            fi
            sleep 1
          done
          cat "$log" >&2
          exit 1
      - name: Run downloaded CLI in a clean directory
        shell: bash
        env:
          PLANTUML_JAR: ${{ runner.temp }}/plantuml.jar
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/pyfcstm-clean-root"
          reports="$RUNNER_TEMP/pyfcstm-selfcheck-reports"
          rm -rf "$root"
          mkdir -p "$root" "$reports"
          archive=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -type f -name '*.zip' -print -quit)
          test -n "$archive"
          identity=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -name build-identity.txt -print -quit)
          digest_file=$(find "$RUNNER_TEMP/pyfcstm-cli-artifact" -maxdepth 1 -name artifact-sha256.txt -print -quit)
          test -n "$identity" -a -n "$digest_file"
          check_identity() {
            local identity_file="$1"
            shift
            local expected count
            for expected in "$@"; do
              count=$(grep -Fxc "$expected" "$identity_file" || true)
              test "$count" -eq 1
            done
          }
          check_identity "$identity" \
            'schema=pyfcstm-build-identity/v1' \
            'artifact_kind=standalone' \
            "full_commit=$GITHUB_SHA" \
            'dirty=0' 'tag=' "platform=${{ matrix.os }}"
          grep -F "full_commit=$GITHUB_SHA" "$identity"
          archive_name=$(basename "$archive")
          expected_digest=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $1}' "$digest_file")
          expected_size=$(awk -v file="$archive_name" '$3 == "dist/" file || $3 == file {print $2}' "$digest_file")
          actual_digest=$(python - "$archive" <<'PY'
          import hashlib
          import sys
          digest = hashlib.sha256()
          with open(sys.argv[1], "rb") as stream:
              for chunk in iter(lambda: stream.read(1024 * 1024), b""):
                  digest.update(chunk)
          print(digest.hexdigest())
          PY
          )
          test -n "$expected_digest" -a "$expected_digest" = "$actual_digest"
          test "$expected_size" -eq "$(wc -c < "$archive")"
          cp "$identity" "$reports/build-identity.txt"
          cp "$digest_file" "$reports/artifact-sha256.txt"
          printf '%s  %s\n' "$actual_digest" "$archive_name" | tee "$reports/artifact.sha256"
          set +e
          curl --fail --location --retry 3 --retry-delay 2 --max-time 15 \
            "${PLANTUML_HOST%/}/" > "$reports/plantuml-readiness.txt" 2>&1
          readiness_status=$?
          set -e
          unzip -q "$archive" -d "$root"
          if [ "${{ matrix.os }}" = "macos-14" ]; then
            xattr -dr com.apple.quarantine "$root" 2>/dev/null || true
          fi
          if find "$root" -type d -name pyfcstm -print -quit | grep -q .; then
            echo "forbidden source package directory found in clean root" >&2
            exit 1
          fi
          for forbidden in setup.py 'requirements*.txt' Makefile; do
            if find "$root" -type f -name "$forbidden" -print -quit | grep -q .; then
              echo "forbidden source/build file found in clean root: $forbidden" >&2
              exit 1
            fi
          done
          exe=$(find "$root" -type f -name '${{ matrix.exe }}' -print -quit)
          test -n "$exe"
          set +e
          "$exe" --version 2>&1 | tee "$reports/version.log"
          version_status=${PIPESTATUS[0]}
          "$exe" --self-check --color always --report "$reports/default.json" 2>&1 | tee "$reports/default.log"
          default_status=${PIPESTATUS[0]}
          "$exe" --self-check --profile visualize --network --color always --report "$reports/visualize.json" 2>&1 | tee "$reports/visualize.log"
          visualize_status=${PIPESTATUS[0]}
          set -e
          printf 'version=%s\ndefault=%s\nvisualize=%s\nplantuml_readiness=%s\nPLANTUML_HOST=%s\nPLANTUML_JAR=%s\n' \
            "$version_status" "$default_status" "$visualize_status" "$readiness_status" "$PLANTUML_HOST" "$PLANTUML_JAR" \
            | tee "$reports/summary.txt"
          test "$version_status" -eq 0
          test "$default_status" -eq 0
          grep -F "Commit: $GITHUB_SHA" "$reports/version.log"
      - name: Record optional PlantUML results
        continue-on-error: true
        shell: bash
        env:
          PLANTUML_HOST: http://127.0.0.1:18080
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP/pyfcstm-selfcheck-reports/visualize.json" "$PLANTUML_HOST" <<'PY'
          import json
          import sys

          report_path, host = sys.argv[1:]
          with open(report_path, "r") as stream:
              report = json.load(stream)
          results = {item["id"]: item for item in report["results"]}
          for check_id in ("visualize.remote_tls", "visualize.remote_render"):
              result = results.get(check_id)
              if result is None or result["status"] != "PASS":
                  raise SystemExit("{} did not PASS: {}".format(check_id, result))
              if host not in (result.get("observed") or ""):
                  raise SystemExit("{} did not record configured host: {}".format(check_id, result))
          PY
      - name: Upload clean CLI evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pyfcstm-cli-selfcheck-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pyfcstm-selfcheck-reports
            ${{ runner.temp }}/java-version.txt
            ${{ runner.temp }}/plantuml-version.txt
            ${{ runner.temp }}/plantuml-service.log

  jsfcstm_test:
    # Run jsfcstm's mocha + c8 suite across the supported Node versions.
    # The jsfcstm package is pure TypeScript/Node — it does not need the
    # Python matrix dimension. Codecov receives the lcov report under
    # the ``jsfcstm`` flag from every Node matrix leg, mirroring the
    # Python matrix. Codecov merges reports by flag so the dashboard shows
    # py/js coverage side-by-side without double-counting.
    name: jsfcstm test
    runs-on: ubuntu-22.04
    needs: detect_ci_routes
    if: ${{ needs.detect_ci_routes.outputs.run_jsfcstm_test == 'true' && !contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'test skip') && !contains(github.event.head_commit.message, '[js skip]') }}
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - '20'
          - '22'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Java (ANTLR runtime for JS parser generation)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download ANTLR jar
        shell: bash
        run: |
          wget -q -O antlr-4.9.3.jar https://www.antlr.org/download/antlr-4.9.3-complete.jar
          ls -lh antlr-4.9.3.jar
      - name: Install jsfcstm dependencies
        working-directory: editors/jsfcstm
        run: make install
      - name: Build jsfcstm (parser + tsc)
        working-directory: editors/jsfcstm
        run: make build
      - name: Run jsfcstm tests with coverage
        # ``npm test`` runs ``npm run build && npm run test:coverage``
        # which produces both the c8 threshold gate and the lcov report.
        # Same script the unit tests used previously, now with coverage.
        working-directory: editors/jsfcstm
        run: npm test
      - name: Upload jsfcstm coverage to Codecov
        # Mirror the python matrix: every matrix cell uploads, codecov
        # merges by flag. Avoids dropping coverage if one Node leg fails.
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./editors/jsfcstm/coverage/lcov.info
          flags: jsfcstm
          name: codecov-jsfcstm
          fail_ci_if_error: false
