# Single source of truth for structured diagnostic codes emitted by
# `pyfcstm.model` and consumed by downstream tools (LLM agent loops, IDE
# integrations, evaluation scripts, and the jsfcstm visualization layer).
#
# Each entry documents:
#   - `severity`       — 'error', 'warning', or 'info'
#   - `description`    — human-readable explanation of when this code fires
#   - `span_object`    — semantic object identified by the primary problem
#                        span/range for this code. Implementations may differ
#                        in precision (identifier vs containing statement),
#                        but the source slice must still hit this object.
#   - `refs`           — payload schema for `ModelDiagnostic.refs`. Each
#                        field declares its type, whether it is required,
#                        and a short description. String fields may declare
#                        `enum`; `list[str]` fields may declare `item_enum`
#                        and/or `exact_values`. Field names are part of
#                        the public contract; downstream consumers should
#                        rely on these names verbatim.
#   - `example_dsl`    — minimal DSL snippet that triggers the code (used
#                        by unit tests and by downstream tooling to
#                        validate their dispatch paths).
#
# Allowed `refs.*.type` tokens (must mirror `_ALLOWED_REF_TYPES` in
# codes.py — that tuple is the single source of truth, this comment block
# is documentation; a test asserts the two stay aligned):
#   str | str_or_null | int | int_or_null | float | number | bool | dict | Span | list[str] | list[Span]
#
# Adding a new emitted code: append a new top-level entry here AND add a
# fixture test that triggers it from a real DSL snippet. Catalog-only
# contract codes may instead provide a parseable DSL snippet that documents
# the intended trigger shape before the emitting analyzer lands. The loader
# in `codes.py` verifies the schema at import time.

E_UNDEFINED_VAR:
  severity: error
  span_object: expression
  description: >-
    A guard, effect, or lifecycle-action block references a name that was
    never declared with a top-level `def` statement.
  refs:
    var_name:
      type: str
      required: true
      description: The undeclared identifier as it appeared in the source.
    referenced_in:
      type: str
      required: true
      description: >-
        Which kind of block contained the reference.
      enum: ['guard', 'effect', 'enter', 'during', 'exit', 'during_aspect', 'init']
    state_path:
      type: str_or_null
      required: false
      description: >-
        Dotted path of the state that owns the offending block, when the
        reference is inside a state body (not a guard/effect on a
        transition).
    expr_text:
      type: str_or_null
      required: false
      description: Original expression text containing the reference.
    is_temporary:
      type: bool
      required: false
      description: >-
        ``True`` when the identifier looked like a block-local temporary
        (the read occurred before the variable was assigned within the
        same ``enter`` / ``during`` / ``exit`` / ``effect`` block). Layer 2
        merges what jsfcstm previously emitted as
        ``fcstm.readBeforeAssignTemporary`` into this single ``E_*`` code
        plus this flag. Defaults to ``False`` / absent for "real" undefined
        variables that have no matching ``def`` declaration anywhere.
  for_llm:
    summary: >-
      A variable identifier appears in an expression (guard, effect, or
      action block) but has not been declared with ``def`` at the file
      top, has not been assigned earlier in the same block (so the
      block-local temporary path doesn't apply), and is not a known
      function name. The model refuses to bind unknown identifiers
      because the generated code would not compile.
    recommended_actions:
      - kind: add_definition
        target: file_top
        rationale: >-
          If the variable is genuinely program state, declare it with
          ``def <type> <name> = <initial>;`` at the file top so the
          generated runtime allocates storage for it.
      - kind: assign_first
        target: same_block
        rationale: >-
          If the name was meant to be a block-local temporary, assign
          to it before reading. Block-local temps only exist after
          their first assignment in the enclosing concrete block.
      - kind: fix_typo
        target: expression
        rationale: >-
          If the identifier was meant to be an existing variable,
          correct the spelling. ``refs.var_name`` carries the exact
          spelling from the source.
    do_not:
      - "Do not declare the variable inside an action block expecting it to leak out — block-local temps are discarded at block exit."
      - "Do not rely on Python-style implicit None for the missing identifier; the generated runtime will fail to compile."
  example_dsl: |
    def int x = 0;
    state Root { state A; state B; A -> B : if [unknown_var > 0]; }

E_DUPLICATE_VAR:
  severity: error
  span_object: variable_declaration
  description: >-
    A top-level `def` statement re-declares an identifier that was already
    defined earlier in the file.
  refs:
    var_name:
      type: str
      required: true
      description: The duplicated identifier.
    previous_span:
      type: Span
      required: false
      description: Source position of the first declaration.
  for_llm:
    summary: >-
      Two ``def`` declarations at the file top use the same variable
      name. The model allocates one storage slot per name, so a
      duplicate definition is ambiguous.
    recommended_actions:
      - kind: drop_duplicate
        target: variable_definition
        rationale: >-
          If both definitions are meant to declare the same logical
          variable, keep the first one and delete the second.
      - kind: rename_one
        target: variable_definition
        rationale: >-
          If both definitions are meant to be separate variables, rename
          the second to give it its own storage slot.
    do_not:
      - "Do not assume the second ``def`` overrides the first — the generated runtime treats this as an error and refuses to compile."
  example_dsl: |
    def int x = 0;
    def int x = 1;
    state Root { state A; }

E_MISSING_STATE:
  severity: error
  span_object: state_identifier
  description: >-
    A transition target references a state path that cannot be resolved
    in the surrounding hierarchy.
  refs:
    state_path:
      type: str
      required: true
      description: The unresolved dotted state path.
    referenced_from:
      type: str_or_null
      required: false
      description: Dotted path of the state from which the reference was made.
    reason:
      type: str
      required: false
      description: >-
        Short tag describing the resolution failure mode.
      enum:
        - 'not_found'
        - 'parent_missing'
        - 'ambiguous'
        - 'event_path_not_found'
  for_llm:
    summary: >-
      A transition references a state name that does not exist in the
      machine. The transition target / source must resolve to a state
      declared in this file or imported.
    recommended_actions:
      - kind: fix_typo
        target: transition
        rationale: >-
          If the name was meant to refer to an existing state, correct
          the spelling. ``refs.state_name`` carries the missing token.
      - kind: declare_state
        target: composite_state
        rationale: >-
          If the state is genuinely missing, add ``state <name>;`` (or
          a composite block) under the appropriate composite parent.
    do_not:
      - "Do not silently delete the transition; the original intent of the missing state is lost."
  example_dsl: |
    state Root { state A; A -> NoSuch; }

E_DUPLICATE_STATE:
  severity: error
  span_object: state_identifier
  description: Two states share the same name within the same parent scope.
  refs:
    state_name:
      type: str
      required: true
      description: The duplicated state name.
    parent_path:
      type: str
      required: true
      description: Dotted path of the parent that contains both states.
    previous_span:
      type: Span
      required: false
      description: Source position of the first declaration.
  for_llm:
    summary: >-
      Two state declarations under the same composite parent use the
      same name. State names must be unique inside their immediate
      composite scope.
    recommended_actions:
      - kind: drop_duplicate
        target: state_definition
        rationale: >-
          If both declarations describe the same logical state, keep
          one and remove the other (merge any actions/transitions onto
          the survivor).
      - kind: rename_one
        target: state_definition
        rationale: >-
          If the two declarations are meant to be distinct states,
          rename one to give it its own identity inside the parent.
    do_not:
      - "Do not assume the second declaration overrides the first — duplicate state names produce a hard error."
  example_dsl: |
    state Root { state A; state A; }

E_EVENT_REF_INVALID:
  severity: error
  span_object: event_declaration
  emit_tier: lookup_api
  description: >-
    The textual form of an event reference is syntactically invalid (e.g.
    bare '/', trailing dots, going beyond the root state).
  refs:
    event_ref:
      type: str
      required: true
      description: The raw event reference text.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing why the reference is invalid.
      enum:
        - 'empty'
        - 'bare_slash'
        - 'invalid_absolute'
        - 'invalid_relative'
        - 'trailing_dots'
        - 'beyond_root'
  for_llm:
    summary: >-
      An event reference (``::``, ``:``, or ``/`` scoped) cannot resolve
      to a known event under the indicated scope. The grammar accepts
      the syntactic form, but the resolver cannot bind it to a real
      event object.
    recommended_actions:
      - kind: fix_scope_operator
        target: transition
        rationale: >-
          The three scope operators do not interchange freely. ``::``
          is source-local, ``:`` is parent-chain, ``/`` is root-absolute.
          Pick the one that matches where the event is actually
          declared.
      - kind: declare_event
        target: composite_state
        rationale: >-
          If the event was supposed to exist, add an
          ``event <name>;`` declaration in the matching scope.
    do_not:
      - "Do not invent a new event by silently aliasing — the dispatcher won't fire on an undeclared name."
  example_dsl: |
    state Root { state A; state B; A -> B : /; }

E_EVENT_NOT_FOUND:
  severity: error
  span_object: event_declaration
  emit_tier: lookup_api
  description: >-
    An event reference parses correctly but does not resolve to any event
    defined in the targeted scope.
  refs:
    event_ref:
      type: str
      required: true
      description: The raw event reference text.
    scope:
      type: str
      required: true
      description: >-
        Resolution scope used.
      enum: ['local', 'chain', 'absolute']
    searched_from:
      type: str_or_null
      required: false
      description: >-
        Dotted state path of the **caller** that initiated the lookup
        (i.e. the state on which `.resolve_event()` was invoked, or, for
        `StateMachine.resolve_event`, the state machine's root). This is
        the originating location of the bad reference in source — not
        the effective search root, which is always the model root for
        absolute references.
  for_llm:
    summary: >-
      A dotted event path could not be resolved against the assembled
      state hierarchy. The path syntax was valid but no event with
      that name exists at the resolved state.
    recommended_actions:
      - kind: fix_event_path
        target: transition
        rationale: >-
          Confirm the dotted path matches the state hierarchy that
          actually exists after imports have been merged.
      - kind: declare_event
        target: composite_state
        rationale: >-
          Add the missing ``event <name>;`` declaration under the
          intended state.
    do_not:
      - "Do not paper over the error by introducing a wildcard alias — events are uniquely bound by their scope."
  example_dsl: |
    state Root { state A; state B; A -> B :: NoEvent; }

E_DANGLING_TRANSITION:
  severity: error
  span_object: transition
  description: >-
    A transition cannot resolve either its source or its target.
  refs:
    src:
      type: str_or_null
      required: false
      description: Raw source state expression as written in the DSL.
    tgt:
      type: str_or_null
      required: false
      description: Raw target state expression as written in the DSL.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing the dangling reason.
      enum: ['src_not_found', 'tgt_not_found', 'both_not_found']
  for_llm:
    summary: >-
      A transition's source or target points at a state that exists
      neither in the local composite scope nor in any ancestor scope.
      The transition cannot be wired into the dispatch graph.
    recommended_actions:
      - kind: fix_typo
        target: transition
        rationale: >-
          If the dangling name is misspelled, correct it. ``refs.state_path``
          carries the location of the offending transition.
      - kind: declare_target_state
        target: composite_state
        rationale: >-
          Declare the missing state if the transition was intentional.
      - kind: drop_transition
        target: transition
        rationale: >-
          Remove the transition if it was speculative — leaving a
          dangling reference blocks the whole file.
    do_not:
      - "Do not pretend the transition resolves to ``[*]`` — that has a specific entry/exit semantics."
  example_dsl: |
    state Root { state A; NoSuch -> A; }

E_COMBO_TRIGGER_NOT_EXPANDED:
  severity: error
  emit_tier: catalog_only
  span_object: transition
  description: >-
    A legacy fail-closed compatibility code for implementations that parse
    combo trigger syntax before model expansion support is available.
  refs:
    state_path:
      type: str_or_null
      required: false
      description: Dotted path of the state that owns the combo transition.
    trigger:
      type: str
      required: true
      description: Canonical text of the combo trigger suffix.
  for_llm:
    summary: >-
      Older pyfcstm/jsfcstm builds may accept a transition trigger such as
      ``:: E1 + E2`` or ``: E1 + [x > 0]`` but stop before pseudo-state
      expansion support. Current pyfcstm expands combo triggers instead of
      emitting this code; the catalog entry remains for cross-version
      consumers.
    recommended_actions:
      - kind: wait_for_expansion_support
        target: transition
        rationale: >-
          Keep the DSL syntax if you are testing parser/provenance support;
          wait for model-expansion support before running simulation,
          verification, or code generation on combo triggers.
      - kind: expand_manually
        target: transition
        rationale: >-
          For immediate runtime use, rewrite the combo transition as explicit
          pseudo states and ordinary transitions.
    do_not:
      - "Do not treat the first event term as the whole transition; that would silently change model semantics."
  example_dsl: |
    state Root { state A; state B; A -> B :: Go + Done; }

E_COMBO_RESERVED_STATE_NAME:
  severity: error
  span_object: state_identifier
  description: >-
    A user-authored state name starts with the reserved automatic combo
    pseudo-state prefix.
  refs:
    state_name:
      type: str
      required: true
      description: The reserved user-authored state name.
    state_path:
      type: str
      required: true
      description: Dotted path of the offending state.
    reserved_prefix:
      type: str
      required: true
      description: Reserved prefix used by generated combo pseudo states.
  for_llm:
    summary: >-
      State names beginning with ``__combo_`` are reserved for generated
      pseudo states created by combo transition trigger expansion.
    recommended_actions:
      - kind: rename_state
        target: state_identifier
        rationale: >-
          Rename the user-authored state so it does not collide with the
          generated combo pseudo-state namespace.
    do_not:
      - "Do not use ``__combo_`` for hand-written states; the expander owns this namespace."
  example_dsl: |
    state Root { state __combo_user; [*] -> __combo_user; }

E_COMBO_PSEUDO_NAME_COLLISION:
  severity: error
  span_object: state_identifier
  description: >-
    Combo trigger expansion generated the same pseudo-state name for distinct
    semantic payloads, or a generated combo pseudo name collided with an
    existing non-pseudo state.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the state where expansion attempted to add the pseudo state.
    pseudo_name:
      type: str
      required: true
      description: Generated pseudo-state name that collided.
    payload_digest:
      type: str
      required: true
      description: Full digest of the semantic payload that attempted to claim the name.
  for_llm:
    summary: >-
      The combo expander uses fixed digest12 pseudo names. If two distinct
      canonical payloads truncate to the same visible name, expansion fails
      fast rather than silently renaming or reusing the wrong pseudo state.
    recommended_actions:
      - kind: report_internal_collision
        target: transition
        rationale: >-
          This is an internal collision guard. Keep the model unchanged and
          report the diagnostic, including ``refs.payload_digest``.
    do_not:
      - "Do not append an ad-hoc sequence number; user-visible combo names must remain deterministic."
  example_dsl: |
    state Root { state A; state B; [*] -> A; A -> B :: E1 + E2; }

W_COMBO_DUPLICATE_EVENT:
  severity: warning
  span_object: transition
  capability: pure_static
  description: >-
    A combo transition trigger repeats the same canonical event term. The
    model still executes the two generated hops, but the second event term is
    usually redundant or a typo.
  refs:
    origin_id:
      type: str
      required: true
      description: Stable identifier of the original combo transition.
    event_name:
      type: str
      required: true
      description: Canonical qualified event name that appears more than once.
    term_index:
      type: int
      required: true
      description: Zero-based index of the repeated event term.
    first_term_index:
      type: int
      required: true
      description: Zero-based index of the first matching event term.
    term_text:
      type: str
      required: true
      description: Canonical source text of the repeated event term.
    first_term_text:
      type: str
      required: true
      description: Canonical source text of the first matching event term.
    transition_span:
      type: Span
      required: false
      description: Source span of the original combo transition.
    trigger_span:
      type: Span
      required: false
      description: Source span of the combo trigger suffix.
    term_span:
      type: Span
      required: false
      description: Source span of the repeated event term.
    first_term_span:
      type: Span
      required: false
      description: Source span of the first matching event term.
  for_llm:
    summary: >-
      The combo trigger contains the same resolved event twice, for example
      ``E1 + E1``. This is legal but normally redundant because one cycle's
      input event set already contains ``E1``.
    recommended_actions:
      - kind: inspect_terms
        target: transition
        rationale: Check whether the second event was meant to be a different event.
      - kind: keep_if_intentional
        target: transition
        rationale: Keep it only if the explicit two-hop pseudo chain is intentional.
    do_not:
      - "Do not silently delete the repeated event; the explicit pseudo-chain shape may be intentional."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B :: E1 + E1;
    }

W_COMBO_GUARD_CONST_TRUE:
  severity: warning
  span_object: guard_expression
  capability: const_fold
  description: >-
    A guard term inside a combo trigger folds to ``true``. The term is
    redundant for the generated pseudo chain, and the primary span points at
    the original bracketed guard term.
  refs:
    origin_id:
      type: str
      required: true
      description: Stable identifier of the original combo transition.
    term_index:
      type: int
      required: true
      description: Zero-based index of the constant guard term.
    term_text:
      type: str
      required: true
      description: Canonical source text of the guard term.
    folded_value:
      type: bool
      required: true
      description: Constant-folded guard value, always ``true`` for this code.
    transition_span:
      type: Span
      required: false
      description: Source span of the original combo transition.
    trigger_span:
      type: Span
      required: false
      description: Source span of the combo trigger suffix.
    term_span:
      type: Span
      required: false
      description: Source span of the bracketed guard term.
    value_span:
      type: Span
      required: false
      description: Source span of the guard expression inside the brackets.
  for_llm:
    summary: >-
      A combo guard term is statically true and does not constrain the combo
      chain.
    recommended_actions:
      - kind: remove_guard_term
        target: transition
        rationale: Remove the guard term if it was only a placeholder.
      - kind: fix_guard_term
        target: transition
        rationale: Rewrite the guard if it was intended to depend on runtime state.
    do_not:
      - "Do not add a dummy variable dependency only to silence the diagnostic."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B :: E1 + [(1 + 2) == 3] + E2;
    }

W_COMBO_GUARD_CONST_FALSE:
  severity: warning
  span_object: guard_expression
  capability: const_fold
  description: >-
    A guard term inside a combo trigger folds to ``false``. Any combo branch
    that must pass through this term can never complete.
  refs:
    origin_id:
      type: str
      required: true
      description: Stable identifier of the original combo transition.
    term_index:
      type: int
      required: true
      description: Zero-based index of the constant guard term.
    term_text:
      type: str
      required: true
      description: Canonical source text of the guard term.
    folded_value:
      type: bool
      required: true
      description: Constant-folded guard value, always ``false`` for this code.
    transition_span:
      type: Span
      required: false
      description: Source span of the original combo transition.
    trigger_span:
      type: Span
      required: false
      description: Source span of the combo trigger suffix.
    term_span:
      type: Span
      required: false
      description: Source span of the bracketed guard term.
    value_span:
      type: Span
      required: false
      description: Source span of the guard expression inside the brackets.
  for_llm:
    summary: >-
      A combo guard term is statically false, so the generated combo branch
      cannot complete past that term.
    recommended_actions:
      - kind: fix_guard_term
        target: transition
        rationale: Rewrite the guard so it can become true under some valid state.
      - kind: remove_transition
        target: transition
        rationale: Remove the combo transition if it was placeholder / debug.
    do_not:
      - "Do not silently remove the guard term — that would change the combo semantics."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B :: E1 + [(1 + 2) == 4] + E2;
    }

W_COMBO_GUARD_PREFIX_IMPLIED:
  severity: warning
  span_object: guard_expression
  capability: requires_solver
  description: >-
    In a side-effect-free combo prefix, prior guard terms imply a later guard
    term. The later guard is redundant under the current static approximation.
  refs:
    origin_id:
      type: str
      required: true
      description: Stable identifier of the original combo transition.
    term_index:
      type: int
      required: true
      description: Zero-based index of the implied guard term.
    prior_term_index:
      type: int
      required: true
      description: Zero-based index of the nearest prior guard term used as related information.
    term_text:
      type: str
      required: true
      description: Canonical source text of the implied guard term.
    prior_term_text:
      type: str
      required: true
      description: Canonical source text of the prior guard term.
    transition_span:
      type: Span
      required: false
      description: Source span of the original combo transition.
    trigger_span:
      type: Span
      required: false
      description: Source span of the combo trigger suffix.
    term_span:
      type: Span
      required: false
      description: Source span of the implied guard term.
    value_span:
      type: Span
      required: false
      description: Source span of the implied guard expression inside brackets.
    prior_term_span:
      type: Span
      required: false
      description: Source span of the prior guard term.
    prior_value_span:
      type: Span
      required: false
      description: Source span of the prior guard expression inside brackets.
  for_llm:
    summary: >-
      Earlier guard terms in the combo prefix already guarantee this later
      guard term when no relevant side effects can occur between them.
    recommended_actions:
      - kind: remove_guard_term
        target: transition
        rationale: Remove the later guard if it is intentionally redundant.
      - kind: inspect_side_effects
        target: transition
        rationale: If the warning is surprising, check whether an intended write is missing from the model.
    do_not:
      - "Do not apply this reasoning across abstract/ref or unknown side-effect boundaries."
  emit_tier: static_pipeline
  example_dsl: |
    def int x = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : [x > 0] + [x > -1];
    }

W_COMBO_GUARD_PREFIX_CONTRADICTS:
  severity: warning
  span_object: guard_expression
  capability: requires_solver
  description: >-
    In a side-effect-free combo prefix, prior guard terms contradict a later
    guard term. The generated combo branch cannot complete through that term
    under the current static approximation.
  refs:
    origin_id:
      type: str
      required: true
      description: Stable identifier of the original combo transition.
    term_index:
      type: int
      required: true
      description: Zero-based index of the contradictory guard term.
    prior_term_index:
      type: int
      required: true
      description: Zero-based index of the nearest prior guard term used as related information.
    term_text:
      type: str
      required: true
      description: Canonical source text of the contradictory guard term.
    prior_term_text:
      type: str
      required: true
      description: Canonical source text of the prior guard term.
    transition_span:
      type: Span
      required: false
      description: Source span of the original combo transition.
    trigger_span:
      type: Span
      required: false
      description: Source span of the combo trigger suffix.
    term_span:
      type: Span
      required: false
      description: Source span of the contradictory guard term.
    value_span:
      type: Span
      required: false
      description: Source span of the contradictory guard expression inside brackets.
    prior_term_span:
      type: Span
      required: false
      description: Source span of the prior guard term.
    prior_value_span:
      type: Span
      required: false
      description: Source span of the prior guard expression inside brackets.
  for_llm:
    summary: >-
      Earlier guard terms in the combo prefix make this later guard impossible
      when no relevant side effects can occur between them.
    recommended_actions:
      - kind: fix_guard_term
        target: transition
        rationale: Rewrite the later guard if it was meant to describe a reachable branch.
      - kind: remove_transition
        target: transition
        rationale: Remove the combo branch if it was placeholder / debug.
    do_not:
      - "Do not apply this reasoning across abstract/ref or unknown side-effect boundaries."
  emit_tier: static_pipeline
  example_dsl: |
    def int x = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : [x > 0] + [x < 0];
    }

E_TYPE_MISMATCH:
  severity: error
  span_object: expression
  emit_tier: partial_static_pipeline
  description: >-
    A guard, effect, or assignment uses an expression whose type does not
    match the expected category (arithmetic vs boolean).
  refs:
    expected:
      type: str
      required: true
      description: >-
        Expected category. One of: 'numeric', 'boolean'.
    actual:
      type: str
      required: true
      description: Actual category produced by the expression.
    expr_text:
      type: str
      required: true
      description: Original expression text.
  for_llm:
    summary: >-
      An expression mixes an arithmetic and a boolean subexpression in
      a way the grammar does not allow. ``num_expression`` and
      ``cond_expression`` are strictly separated; comparison operators
      bridge them, ternary ``? :`` converts boolean → arithmetic.
    recommended_actions:
      - kind: wrap_in_ternary
        target: expression
        rationale: >-
          If you wanted to assign a boolean test, wrap it as
          ``(cond) ? 1 : 0`` so the right-hand side is arithmetic.
      - kind: add_comparison
        target: guard
        rationale: >-
          If you wanted to gate on a numeric value, compare against a
          constant (``counter > 0``) instead of using the value
          directly as a boolean.
    do_not:
      - "Do not rely on numeric → boolean implicit coercion; the generated runtimes treat the two domains as distinct."
  example_dsl: |
    def int x = 0;
    state Root { state A; state B; A -> B : if [x]; }

E_FORCED_TRANSITION_EXPANSION:
  severity: error
  span_object: transition
  description: >-
    A forced transition (`!State -> ...` or `!*`) cannot be expanded
    because the source or target reference is invalid.
  refs:
    original_raw:
      type: str
      required: true
      description: Raw forced-transition text as written.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing why expansion failed.
      enum:
        - 'src_not_found'
        - 'tgt_not_found'
        - 'src_is_root'
        - 'wildcard_no_descendants'
  for_llm:
    summary: >-
      A forced transition (``!Source -> Target`` or ``!* -> Target``)
      failed to expand cleanly — typically because the source name
      cannot be found, or because the expansion would create an
      empty/inconsistent fan-out under the current scope.
    recommended_actions:
      - kind: fix_source
        target: forced_transition
        rationale: >-
          Confirm the ``!Name`` source is a real state inside the
          current composite scope. ``!*`` only matches direct
          substates; deeper descendants need explicit names.
      - kind: relocate_forced_transition
        target: composite_state
        rationale: >-
          Move the forced transition into the composite whose substates
          you actually want to receive the event.
    do_not:
      - "Do not add an ``effect { ... }`` block to a forced transition — forced transitions cannot carry effects and the expansion would fail anyway."
  example_dsl: |
    state Root { state A; !NoSuch -> A; }

E_INITIAL_TRANSITION_INVALID:
  severity: error
  span_object: transition
  description: >-
    A composite state either lacks an entry transition (`[*] -> child`) or
    declares one whose target is not a direct child of the composite.
  refs:
    composite_path:
      type: str
      required: true
      description: Dotted path of the offending composite state.
    reason:
      type: str
      required: true
      description: >-
        Short tag describing the failure.
      enum: ['missing_entry', 'target_not_child']
  for_llm:
    summary: >-
      A composite state lacks a valid ``[*] -> Child`` initial
      transition, or its declared initial target is not actually a
      child of this composite. The runtime cannot decide which child
      to enter when this composite is activated.
    recommended_actions:
      - kind: add_initial_transition
        target: composite_state
        rationale: >-
          Add ``[*] -> <ChildName>;`` inside the composite, picking a
          direct substate as the entry point.
      - kind: fix_initial_target
        target: initial_transition
        rationale: >-
          If an initial transition already exists, retarget it at a
          direct child of this composite (not a grandchild).
    do_not:
      - "Do not rely on a default ordering of substates; the runtime requires an explicit initial transition."
  example_dsl: |
    state Root { state Outer { state Inner; } }

E_DUPLICATE_FUNCTION_NAME:
  severity: error
  span_object: named_action_declaration
  description: >-
    Two named lifecycle actions (enter / during / exit / during-aspect) within
    the same state share the same name. Named actions are referenced via
    `ref <name>` and must be uniquely identifiable.
  refs:
    function_name:
      type: str
      required: true
      description: The duplicated named-action name.
    state_path:
      type: str
      required: true
      description: Dotted path of the state declaring the duplicates.
    stage:
      type: str
      required: true
      description: Lifecycle stage where the duplicate appears.
      enum: ['enter', 'during', 'exit', 'during_aspect']
  for_llm:
    summary: >-
      Two named action / function blocks share the same name within
      the same scope. Named blocks must be uniquely identifiable so
      ``ref`` lookups can bind to a single definition.
    recommended_actions:
      - kind: rename_one
        target: named_action
        rationale: >-
          Give one of the named blocks a distinct identifier so
          ``ref <name>`` calls resolve unambiguously.
      - kind: drop_duplicate
        target: named_action
        rationale: >-
          If the two declarations are meant to be the same logical
          block, keep one and update its callers to reference it.
    do_not:
      - "Do not assume the second declaration shadows the first — the resolver treats this as a hard error."
  example_dsl: |
    state Root {
        state A {
            enter Foo { }
            enter Foo { }
        }
    }

E_DURING_ASPECT_INVALID:
  severity: error
  span_object: lifecycle_action
  description: >-
    A `during` block is declared inconsistently with the host state's
    leaf/composite kind. Leaf states must use `during { ... }` without an
    aspect modifier; composite states must use `during before { ... }` or
    `during after { ... }` (the aspect is mandatory on composites). The
    global ``>> during before/after`` aspect form is **also** invalid on
    a leaf state — aspect actions fan out to every descendant leaf, and
    a leaf has nothing to fan into.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the offending state.
    state_kind:
      type: str
      required: true
      description: Kind of the host state.
      enum: ['leaf', 'composite']
    aspect:
      type: str_or_null
      required: false
      description: >-
        The aspect token that was actually used. ``'before'`` or
        ``'after'`` for ``during before`` / ``during after`` and
        ``>> during before/after``; ``null`` when the user wrote a bare
        ``during`` on a composite state. ``null`` is intentional — the
        consumer should branch on the bare-during case rather than
        treat it as an enum value.
  for_llm:
    summary: >-
      A ``during before`` / ``during after`` or ``>> during ...``
      aspect declaration was placed on a state that cannot legally
      receive it (typically a leaf state with no descendant for the
      aspect to fan out to).
    recommended_actions:
      - kind: move_to_composite
        target: aspect_declaration
        rationale: >-
          Aspect actions only make sense on composite states. Move
          the declaration to a composite ancestor whose descendants
          should receive the aspect.
      - kind: drop_aspect
        target: aspect_declaration
        rationale: >-
          If the aspect was speculative and the state is genuinely a
          leaf, remove the aspect declaration entirely.
    do_not:
      - "Do not convert the leaf into a composite just to host the aspect — that changes the runtime entry/exit semantics."
  example_dsl: |
    state Root {
        state A {
            during before { }
        }
    }

E_PSEUDO_NOT_LEAF:
  severity: error
  span_object: state_identifier
  description: >-
    A state was declared with the `pseudo` keyword but has nested
    substates. Pseudo states must be leaves: they skip ancestor
    `>> during` aspects and only make sense without inner structure.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the offending pseudo state.
  for_llm:
    summary: >-
      A ``pseudo state`` declaration was given a composite body (or
      otherwise treated as if it had descendants). Pseudo states must
      be leaves: they cannot host substates because their semantics
      explicitly skip ancestor ``>> during`` aspects.
    recommended_actions:
      - kind: drop_pseudo_marker
        target: state_definition
        rationale: >-
          If the state genuinely needs substates, remove the
          ``pseudo`` keyword and treat it as a normal composite.
      - kind: flatten_pseudo
        target: state_definition
        rationale: >-
          If the state is meant to be a transient pseudo (e.g. an
          internal junction), remove its substates and turn it back
          into a leaf.
    do_not:
      - "Do not rely on pseudo states for normal hierarchy modeling — they exist solely to bypass ``>> during`` aspect application."
  example_dsl: |
    state Root {
        pseudo state Outer {
            state Inner;
            [*] -> Inner;
        }
    }

E_NAMED_FUNCTION_REF_CYCLE:
  severity: error
  span_object: named_action_declaration
  description: >-
    A lifecycle action `ref` chain forms a cycle and therefore never reaches
    a concrete or abstract action implementation.
  refs:
    ref_path:
      type: str
      required: true
      description: Dot-separated action path where cycle validation started.
    cycle_path:
      type: str
      required: true
      description: Dot-separated action path chain that closes the cycle.
    reason:
      type: str
      required: true
      description: Short tag describing the failure.
      enum: ['action_ref_cycle']
  for_llm:
    summary: >-
      An ``enter ref ...`` / ``exit ref ...`` / ``during ref ...`` clause
      ultimately points back to itself through one or more named actions.
    recommended_actions:
      - kind: break_ref_cycle
        target: action_ref
        rationale: >-
          Replace one link in the cycle with a concrete action block or an
          abstract action declaration so the reference chain terminates.
    do_not:
      - "Do not execute or render cyclic lifecycle references; reject the model before runtime execution."

E_NAMED_FUNCTION_REF_NOT_FOUND:
  severity: error
  span_object: named_action_declaration
  description: >-
    A `ref` lifecycle action could not resolve its target named action.
    Either the path walks through a state that does not exist, or the final
    segment is not a named action defined inside the resolved state.
  refs:
    ref_path:
      type: str
      required: true
      description: Dotted path of the unresolved reference.
    reason:
      type: str
      required: true
      description: Short tag describing the resolution failure.
      enum: ['state_not_found', 'named_function_not_found']
    missing_segment:
      type: str_or_null
      required: false
      description: >-
        The path segment that failed to resolve. For 'state_not_found' this
        is the state name that does not exist under the parent path; for
        'named_function_not_found' this is the action name searched for in
        the resolved state.
  for_llm:
    summary: >-
      An ``enter ref ...`` / ``exit ref ...`` / ``during ref ...``
      clause points at a named action that does not exist. The
      resolver could not find a matching named block in the indicated
      scope.
    recommended_actions:
      - kind: fix_ref_path
        target: action_ref
        rationale: >-
          Confirm the dotted ref path matches a real named action.
          Use ``/`` to anchor at the root, or a relative name for the
          current state.
      - kind: declare_named_action
        target: composite_state
        rationale: >-
          Add the missing ``enter <Name> { ... }`` / similar block in
          the resolving scope.
    do_not:
      - "Do not silently swap ``ref`` with an inline block — that loses the deduplication that ``ref`` was meant to provide."
  example_dsl: |
    state Root {
        state A {
            enter ref NoSuch.NoSuch;
        }
    }

# ---------------------------------------------------------------------------
# Import-related errors (Layer 2 PR-A alignment).
#
# These cover the ``imports.py`` raise sites that previously surfaced as
# unstructured ``SyntaxError`` ``ValueError``. jsfcstm has its own set of
# import-time analyzers (workspace-graph based) which now emit the same
# ``E_IMPORT_*`` codes so the two ends stay aligned.
# ---------------------------------------------------------------------------

E_IMPORT_NOT_FOUND:
  severity: error
  span_object: import_statement
  capability: pure_static
  description: >-
    An ``import`` statement points at a source file that cannot be found,
    cannot be read, or fails to parse.
  refs:
    source_path:
      type: str
      required: true
      description: >-
        The source-path token from the import statement, exactly as it
        appeared in the DSL.
    alias:
      type: str
      required: true
      description: >-
        The alias under which the import was declared.
    host_state_path:
      type: str
      required: true
      description: >-
        Dotted path of the composite state hosting the import statement.
    reason:
      type: str
      required: true
      description: >-
        Why resolution failed.
      enum: ['file_not_found', 'read_error', 'parse_error', 'no_root_state']
  for_llm:
    summary: >-
      An import target could not be resolved. Inspect ``refs.reason`` to
      branch the fix: ``file_not_found`` means the path is wrong or the
      file does not exist; ``read_error`` means the file exists but the
      I/O layer rejected it (permissions / encoding); ``parse_error``
      means the file was loaded but is not valid FCSTM DSL; ``no_root_state``
      means the file parses but declares no ``state Root { ... }`` block.
      The four reasons need different fixes — do not collapse them.
      Cross-end note (I2 from PR #115 final review): jsfcstm currently
      only distinguishes ``file_not_found`` and ``no_root_state``; its
      workspace index treats I/O failures and parse failures alike as
      ``missing`` and emits ``file_not_found`` for both. When consuming
      jsfcstm-side diagnostics, treat ``file_not_found`` as "any
      pre-no_root_state failure" and inspect the imported file
      directly to disambiguate read vs parse failures.
    recommended_actions:
      - kind: fix_path
        target: import_statement
        applies_to_reason: file_not_found
        rationale: >-
          For ``file_not_found``, adjust the source_path to a real file
          relative to the host file, or remove the import if the
          sub-machine is no longer required.
      - kind: create_file
        target: import_target
        applies_to_reason: file_not_found
        rationale: >-
          For ``file_not_found``, if the file should exist, create it
          with at least a top-level ``state Root { ... }`` so its root
          state can be merged in.
      - kind: fix_permissions
        target: import_target
        applies_to_reason: read_error
        rationale: >-
          For ``read_error``, the file exists but the I/O layer could not
          read it. Check file permissions, encoding (FCSTM expects UTF-8
          or auto-detected text), and that the path is not a directory.
      - kind: fix_dsl_in_imported_file
        target: import_target
        applies_to_reason: parse_error
        rationale: >-
          For ``parse_error``, the file was read but contains invalid
          FCSTM DSL. Open the imported file directly; the underlying
          grammar parse error is reported with its own line/column when
          you run ``pyfcstm`` on it standalone.
      - kind: add_root_state
        target: import_target
        applies_to_reason: no_root_state
        rationale: >-
          For ``no_root_state``, the file parses but declares no
          top-level ``state <Name> { ... }``. Add one — the merge needs
          a root state to inline.
    do_not:
      - "Do not silently rename the alias to dodge the missing file."
      - "Do not add a placeholder state under the alias — the import must resolve to a real file."
      - "Do not give the same recommended_action regardless of reason — the LLM consumer should branch on ``refs.reason`` and apply only the matching ``applies_to_reason`` actions."
  example_dsl: |
    state System {
        import "missing.fcstm" as Sub;
    }

E_IMPORT_CIRCULAR:
  severity: error
  span_object: import_statement
  capability: pure_static
  description: >-
    A cycle was detected while resolving ``import`` statements between
    two or more state-machine source files.
  refs:
    source_path:
      type: str
      required: true
      description: The source-path token that closed the cycle.
    alias:
      type: str
      required: true
      description: The alias under which the cyclic import was declared.
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    cycle_chain:
      type: list[str]
      required: true
      description: >-
        Ordered list of file paths that participate in the cycle, starting
        and ending at the same file.
  for_llm:
    summary: >-
      Two or more state-machine files import each other transitively. The
      compiler refuses to resolve cycles to keep the merged hierarchy
      tractable.
    recommended_actions:
      - kind: refactor
        target: import_statement
        rationale: >-
          Break the cycle by extracting the shared state(s) into a third
          file that both ends import without depending on each other.
      - kind: drop_back_edge
        target: import_statement
        rationale: >-
          If the cycle is accidental, remove the import statement that
          closes the loop (the one named in ``source_path``).
    do_not:
      - "Do not duplicate the imported states inline to break the cycle — that defeats the purpose of imports."
      - "Do not introduce a stub alias that re-exports the cycle from another file."
  example_dsl: |
    # a.fcstm
    state A { import "b.fcstm" as B; }
    # b.fcstm
    state B { import "a.fcstm" as A; }

E_IMPORT_ALIAS_CONFLICT:
  severity: error
  span_object: import_statement
  capability: pure_static
  description: >-
    An ``import`` alias clashes with an existing child state (or with
    another import alias) under the same composite state.
  refs:
    alias:
      type: str
      required: true
      description: The conflicting alias name.
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    conflicting_kind:
      type: str
      required: true
      description: >-
        What the alias clashed with.
      enum: ['existing_substate', 'previous_import_alias']
  for_llm:
    summary: >-
      The import alias collides with an already-defined name in the same
      composite scope. The merged hierarchy cannot have two children
      sharing a name.
    recommended_actions:
      - kind: rename_alias
        target: import_statement
        rationale: >-
          Pick a unique alias for the import; references to the imported
          machine elsewhere in the file must follow the new alias.
      - kind: rename_other
        target: existing_substate
        rationale: >-
          If the existing substate is the one that should be renamed,
          update its declaration and every transition referencing it.
    do_not:
      - "Do not silently drop one of the conflicting definitions."
      - "Do not add a numeric suffix to the alias as an automatic fix without checking downstream references."
  example_dsl: |
    state System {
        state Worker;
        import "worker.fcstm" as Worker;
    }

E_IMPORT_DUPLICATE_MAPPING:
  severity: error
  span_object: import_statement
  capability: pure_static
  description: >-
    Two or more mapping clauses under the same ``import { ... }`` block
    target the same source name (event or variable), or two source names
    target the same host name.
  refs:
    alias:
      type: str
      required: true
      description: The import alias whose mapping is duplicated.
    mapping_kind:
      type: str
      required: true
      description: >-
        Which mapping flavor was duplicated.
      enum: ['event', 'variable']
    duplicated_name:
      type: str
      required: true
      description: >-
        The source-side or target-side name that appears more than once.
    direction:
      type: str
      required: true
      description: >-
        Which side of the mapping was duplicated.
      enum: ['source_duplicated', 'target_duplicated']
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
  for_llm:
    summary: >-
      An import-mapping block contains a duplicate source or target name.
      Each source identifier can be mapped at most once; each target host
      slot can receive at most one source.
    recommended_actions:
      - kind: drop_duplicate
        target: mapping_clause
        rationale: >-
          Delete the duplicated mapping line — keep the intended one.
      - kind: rename_target
        target: mapping_clause
        rationale: >-
          If both sources are needed, give them distinct host-side names
          via a fresh mapping target.
    do_not:
      - "Do not merge mappings by concatenating their values."
      - "Do not introduce wildcard selectors to mask the duplicate."
  example_dsl: |
    state System {
        import "sub.fcstm" as Sub {
            def x = a;
            def x = b;
        }
    }

E_IMPORT_MAPPING_INVALID:
  severity: error
  span_object: import_statement
  capability: pure_static
  description: >-
    An import-mapping clause refers to a source name that does not exist
    in the imported machine, uses an invalid selector / template, or
    points at a host target that cannot host the mapped element.
  refs:
    alias:
      type: str
      required: true
      description: The import alias whose mapping is malformed.
    mapping_kind:
      type: str
      required: true
      description: Mapping flavor.
      enum: ['event', 'variable']
    host_state_path:
      type: str
      required: true
      description: Dotted path of the composite state hosting the import.
    reason:
      type: str
      required: true
      description: Short tag describing the failure mode.
      enum:
        - 'source_not_found'
        - 'target_invalid'
        - 'selector_invalid'
        - 'template_invalid'
        - 'empty_path'
        - 'host_root_mismatch'
    detail:
      type: str
      required: true
      description: >-
        Human-readable specifics of the mapping failure (mapping text,
        selector / template literal, or path that failed to resolve).
  for_llm:
    summary: >-
      An ``import { ... }`` mapping clause is malformed or points at a
      non-existent element on the source side / a non-receivable element
      on the host side.
    recommended_actions:
      - kind: fix_source
        target: mapping_clause
        rationale: >-
          Update the source-side name to match a real def / event in the
          imported file.
      - kind: fix_target
        target: mapping_clause
        rationale: >-
          Update the host-side target to a valid identifier that the
          merge can attach the imported element to.
      - kind: drop_clause
        target: mapping_clause
        rationale: >-
          Remove the mapping if it was speculative — unmapped imports
          still merge under their alias.
    do_not:
      - "Do not invent fake source names to make the selector match."
      - "Do not silently widen the selector to a wildcard if the original was specific."
  example_dsl: |
    state System {
        import "sub.fcstm" as Sub {
            def x = no_such_var;
        }
    }

# ---------------------------------------------------------------------------
# Design-health warnings emitted from inspect-surface analyzers.
# ---------------------------------------------------------------------------

W_UNREACHABLE_STATE:
  severity: warning
  span_object: state_identifier
  capability: pure_static
  description: >-
    A state is not reachable from the model's root entry path via any
    sequence of normal or forced transitions.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the unreachable state.
  for_llm:
    summary: >-
      This state cannot be entered at runtime; the surrounding
      transitions never lead to it. It is dead from the machine's
      perspective.
    recommended_actions:
      - kind: add_inbound_transition
        target: state
        rationale: Add a transition that reaches the state if it was meant to be used.
      - kind: remove_state
        target: state
        rationale: Remove the state if it was added speculatively.
    do_not:
      - "Do not add a self-loop to mask the unreachability."
  example_dsl: |
    state Root {
        state Idle;
        state Orphan;
        [*] -> Idle;
    }

W_GUARD_CONST_FALSE:
  severity: warning
  span_object: guard_expression
  capability: const_fold
  description: >-
    A transition's guard condition folds to the boolean literal
    ``false`` using the built-in constant folder, so the transition can
    never fire. The folder is intentionally side-effect free: it handles
    literal-only boolean, comparison, arithmetic, bitwise, unary, and
    ternary expressions, but does not evaluate variables, functions,
    solvers, or runtime state.
  refs:
    transition_span:
      type: Span
      required: false
      description: Source span of the transition declaration.
    folded_value:
      type: bool
      required: true
      description: Constant-folded guard value (always ``false``).
    from_path:
      type: str
      required: false
      description: Source state path of the transition, or ``[*]`` for an initial transition.
    to_path:
      type: str
      required: false
      description: Target state path of the transition, or ``[*]`` for an exit transition.
    guard_text:
      type: str
      required: false
      description: >-
        Normalized guard expression text used to disambiguate spanless
        inspect diagnostics. Pyfcstm and jsfcstm both render this with the
        shared inspect expression format: canonical boolean/operator spelling,
        decimal integer literals, and normalized spacing.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  for_llm:
    summary: >-
      The transition's guard is statically known to be ``false`` and the
      transition is effectively dead code.
    recommended_actions:
      - kind: fix_guard
        target: transition
        rationale: Rewrite the guard so it can become true under some valid state.
      - kind: remove_transition
        target: transition
        rationale: Remove the transition if it was placeholder / debug.
    do_not:
      - "Do not silently remove the guard — that would change the semantics."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [(0x0F & 0xF0) != 0];
    }

W_GUARD_CONST_TRUE:
  severity: warning
  span_object: guard_expression
  capability: const_fold
  description: >-
    A transition's guard condition folds to the boolean literal ``true``
    using the built-in constant folder, so the guard is redundant for
    all runtime states covered by that literal-only expression.
  refs:
    transition_span:
      type: Span
      required: false
      description: Source span of the transition declaration.
    guard_span:
      type: Span
      required: false
      description: >-
        Source span of the removable guard suffix, including the leading
        trigger separator when needed. This is reserved for future emitters
        that can provide a stable guard-only span; the current inspect
        emitters intentionally omit it.
    folded_value:
      type: bool
      required: true
      description: Constant-folded guard value (always ``true``).
    from_path:
      type: str
      required: false
      description: Source state path of the transition, or ``[*]`` for an initial transition.
    to_path:
      type: str
      required: false
      description: Target state path of the transition, or ``[*]`` for an exit transition.
    guard_text:
      type: str
      required: false
      description: >-
        Normalized guard expression text used to disambiguate spanless
        inspect diagnostics. Pyfcstm and jsfcstm both render this with the
        shared inspect expression format: canonical boolean/operator spelling,
        decimal integer literals, and normalized spacing.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  for_llm:
    summary: >-
      The transition's guard is statically known to be ``true`` and does
      not constrain the transition.
    recommended_actions:
      - kind: remove_guard
        target: transition
        rationale: Remove the guard if the transition is meant to be unconditional.
      - kind: fix_guard
        target: transition
        rationale: Rewrite the guard if it was intended to depend on runtime state.
    do_not:
      - "Do not add a dummy variable dependency only to silence the diagnostic."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [(1 + 2) == 3];
    }

W_DURING_CONST_ASSIGN:
  severity: warning
  span_object: lifecycle_action
  capability: const_fold
  description: >-
    A concrete ``during`` action assigns a variable to the same
    literal-only numeric value every cycle. The analyzer only checks the
    direct statements in ordinary ``during { ... }`` blocks; it skips
    abstract actions, refs, composite ``during before`` / ``during after``
    actions, aspect actions, functions, variables, and nested control
    flow.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the state that owns the during action.
    var_name:
      type: str
      required: true
      description: Variable assigned by the constant during statement.
    value:
      type: number
      required: true
      description: JSON-stable numeric value assigned on every cycle.
  for_llm:
    summary: >-
      The during block writes the same constant numeric value on every
      cycle, which often indicates initialization logic was placed in
      ``during`` instead of ``enter``.
    recommended_actions:
      - kind: move_to_enter
        target: action
        rationale: Move the assignment to ``enter`` if it should run once on state entry.
      - kind: rewrite_expression
        target: assignment
        rationale: Use runtime state in the expression if the value should evolve each cycle.
    do_not:
      - "Do not suppress the warning by adding a meaningless arithmetic no-op."
  emit_tier: static_pipeline
  example_dsl: |
    def int counter = 0;
    state Root {
        state Idle {
            during { counter = (2 + 3) * 4; }
        }
        [*] -> Idle;
    }

W_UNUSED_EVENT:
  severity: warning
  span_object: event_declaration
  capability: pure_static
  description: >-
    An ``event`` declaration is never referenced by any transition.
  refs:
    event_qualified_name:
      type: str
      required: true
      description: Fully qualified event name (e.g. ``Root.SubA.Pause``).
    scope:
      type: str
      required: true
      description: Scope at which the event is declared.
      enum: ['local', 'chain', 'absolute']
  for_llm:
    summary: >-
      An event is declared but never triggers any transition, so it is
      unused from the machine's perspective.
    recommended_actions:
      - kind: wire_event
        target: transition
        rationale: Add a transition that uses the event if it was meant to be emitted.
      - kind: remove_event
        target: event_declaration
        rationale: Remove the event if it was added speculatively.
    do_not:
      - "Do not rename the event to dodge the warning — that just shifts the problem."
  example_dsl: |
    state Root {
        event Unused;
        state A;
        state B;
        [*] -> A;
        A -> B :: SomethingElse;
    }

W_DEADLOCK_LEAF:
  severity: warning
  span_object: state_identifier
  capability: pure_static
  description: >-
    A non-pseudo leaf state has no outgoing transition.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the deadlocking leaf state.
    parent_path:
      type: str
      required: false
      description: >-
        Dotted path of the leaf state's parent. Present only when an
        exit-transition quick-fix can be inserted inside a parent state.
    reason:
      type: str
      required: true
      description: Why the leaf is considered a deadlock.
      enum: ['no_outgoing_transition']
    suggested_fix:
      type: dict
      required: false
      description: Structured quick-fix payload for adding a parent exit transition.
  suggested_fix:
    kind: insert
    target: deadlock_leaf_exit_transition
    anchor_ref: refs.parent_path
    text_template: "{state_name} -> [*];\n"
    rationale: Add an exit transition so the leaf can finish its parent state.
  for_llm:
    summary: >-
      This leaf state has no outgoing transition, so once the machine
      enters it there is no modeled way to leave.
    recommended_actions:
      - kind: add_transition
        target: state
        rationale: Add a modeled transition to the next intended state.
      - kind: add_exit_transition
        target: state
        rationale: Add ``State -> [*];`` if the leaf is meant to finish its parent.
    do_not:
      - "Do not add a self-loop just to silence the warning."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        [*] -> A;
    }

W_INITIAL_UNCONDITIONAL_MISSING:
  severity: warning
  span_object: composite_block
  capability: pure_static
  description: >-
    A composite state has no unconditional ``[*] -> child`` entry
    transition. Guarded or event-triggered entry transitions do not
    provide a guaranteed initial child.
  refs:
    composite_path:
      type: str
      required: true
      description: Dotted path of the composite state.
    existing_conditional_count:
      type: int
      required: true
      description: Number of existing initial transitions that are not unconditional.
    first_child_name:
      type: str
      required: false
      description: >-
        First declared non-pseudo child state name used as the fallback
        insertion target.
    suggested_fix:
      type: dict
      required: false
      description: Structured quick-fix payload for inserting an unconditional entry transition.
  suggested_fix:
    kind: insert
    target: unconditional_initial_transition
    anchor_ref: refs.composite_path
    text_template: "[*] -> {first_child_name};\n"
    rationale: Add an unconditional fallback entry transition for the composite state.
  for_llm:
    summary: >-
      The composite state can fail to choose an initial child because no
      unconditional entry transition is declared.
    recommended_actions:
      - kind: add_unconditional_initial
        target: composite_state
        rationale: Add a fallback ``[*] -> Child;`` entry transition.
      - kind: simplify_initial
        target: initial_transition
        rationale: Remove the guard or event if the current initial transition should always run.
    do_not:
      - "Do not assume a guarded initial transition always fires without proving the guard."
  emit_tier: static_pipeline
  example_dsl: |
    def int ready = 0;
    state Root {
        state A;
        [*] -> A : if [ready > 0];
    }

W_FORCED_NEVER_EXPANDS:
  severity: warning
  span_object: transition
  capability: pure_static
  description: >-
    A forced transition declaration has no concrete child state in its
    declaration scope to expand from.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the state containing the forced transition.
    original_raw:
      type: str
      required: true
      description: Original forced transition DSL text.
  for_llm:
    summary: >-
      The forced transition declaration expands to zero concrete
      transitions, so it has no runtime effect.
    recommended_actions:
      - kind: move_transition
        target: forced_transition
        rationale: Move the forced transition to a composite scope that owns matching children.
      - kind: remove_transition
        target: forced_transition
        rationale: Remove it if it was speculative.
    do_not:
      - "Do not leave a zero-expansion forced transition as documentation."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A {
            !* -> [*];
        }
        [*] -> A;
    }

W_DEAD_NAMED_ACTION:
  severity: warning
  span_object: named_action_declaration
  capability: pure_static
  description: >-
    A named action belongs to an unreachable state and is not referenced
    by any reachable action ref.
  refs:
    function_name:
      type: str
      required: true
      description: Named action identifier.
    defined_in:
      type: str
      required: true
      description: Dotted path of the state where the action is defined.
  for_llm:
    summary: >-
      This named action cannot run through the reachable state graph and
      is not referenced from elsewhere.
    recommended_actions:
      - kind: connect_state
        target: state
        rationale: Add a transition path to the owning state if the action matters.
      - kind: remove_action
        target: action
        rationale: Remove the action if it is unused scaffolding.
    do_not:
      - "Do not add an unrelated ref just to silence the warning."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B { enter Cleanup {} }
        [*] -> A;
    }

W_UNREFERENCED_VAR:
  severity: warning
  span_object: variable_declaration
  capability: pure_static
  description: >-
    A variable cannot affect any transition guard either directly or
    through the action/effect use-def graph, and no abstract action is
    visible that might use it outside the DSL.
  refs:
    var_name:
      type: str
      required: true
      description: Variable name.
    init_value:
      type: str
      required: true
      description: Source text of the initial value.
    definition_delete_anchor:
      type: str
      required: false
      description: >-
        Variable name repeated only when the declaration has no DSL reads
        or writes, so deleting the declaration alone is a safe quick-fix.
    suggested_fix:
      type: dict
      required: false
      description: Structured quick-fix payload for removing the variable definition.
  suggested_fix:
    kind: delete
    target: variable_definition
    anchor_ref: refs.definition_delete_anchor
    text_template: ""
    rationale: Remove the declaration-only variable because it has no DSL reads or writes.
  for_llm:
    summary: >-
      This variable does not participate in model decisions. It is dead
      from the DSL's guard-affect data-flow perspective.
    recommended_actions:
      - kind: remove_variable
        target: variable_definition
        rationale: Remove the variable and related writes if it was speculative scaffolding.
      - kind: connect_to_guard
        target: guard_or_assignment
        rationale: Add the missing data-flow path if the variable should affect a transition decision.
    do_not:
      - "Do not add a dummy guard reference only to silence the diagnostic."
  emit_tier: static_pipeline
  example_dsl: |
    def int unused = 0;
    def int ready = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [ready > 0];
    }

I_UNREFERENCED_VAR_MAYBE_ABSTRACT:
  severity: info
  span_object: variable_declaration
  capability: pure_static
  description: >-
    A variable cannot affect any transition guard through DSL data-flow,
    but at least one visible abstract action may use it outside the DSL.
  refs:
    var_name:
      type: str
      required: true
      description: Variable name.
    abstract_actions_in_scope:
      type: list[str]
      required: true
      description: >-
        Abstract action owners that may access the variable. FCSTM
        variables are global, so this is the full machine abstract-action
        inventory.
  for_llm:
    summary: >-
      This variable is unused by DSL guard-affect data-flow, but abstract
      action implementations may still use it.
    recommended_actions:
      - kind: inspect_abstract_action
        target: abstract_action
        rationale: Check the external implementation before removing the variable.
      - kind: remove_variable
        target: variable_definition
        rationale: Remove it only if the abstract action does not need it.
    do_not:
      - "Do not remove the variable without checking the abstract implementation."
  emit_tier: static_pipeline
  example_dsl: |
    def int maybe_external = 0;
    def int ready = 0;
    state Root {
        state A { enter abstract ExternalHook; }
        state B;
        [*] -> A;
        A -> B : if [ready > 0];
    }

W_GUARD_VARS_NEVER_CHANGE:
  severity: warning
  span_object: guard_expression
  capability: pure_static
  description: >-
    A transition guard reads variables that are never changed by any
    lifecycle action or transition effect, so the guard only depends on
    initial values.
  refs:
    from_path:
      type: str
      required: true
      description: Source state path of the transition, or [*] for an entry marker.
    to_path:
      type: str
      required: true
      description: Target state path of the transition, or [*] for an exit marker.
    guard_vars:
      type: list[str]
      required: true
      description: Guard variables that never change.
  for_llm:
    summary: >-
      This guard is controlled only by initial variable values. If those
      values never change, the transition condition is effectively fixed.
    recommended_actions:
      - kind: add_write
        target: action_or_effect
        rationale: Add the missing state update if the guard should evolve at runtime.
      - kind: simplify_guard
        target: transition
        rationale: Simplify or remove the guard if the initial value is intentional.
    do_not:
      - "Do not add a meaningless self-assignment; it does not model a real change."
      - "Do not rewrite the guard to a meaningless constant only to silence this diagnostic."
  emit_tier: static_pipeline
  example_dsl: |
    def int ready = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [ready > 0];
    }

W_UNWRITTEN_READ_VAR:
  severity: warning
  span_object: variable_declaration
  capability: pure_static
  description: >-
    A variable is read in guards or actions but is never written by any
    lifecycle action or transition effect.
  refs:
    var_name:
      type: str
      required: true
      description: Variable name.
    read_states:
      type: list[str]
      required: true
      description: State paths where the variable is read.
    init_value:
      type: str
      required: true
      description: Source text of the initial value.
  for_llm:
    summary: >-
      The variable is used as input but never updated after its initial
      definition, so model behavior may be accidentally constant.
    recommended_actions:
      - kind: add_write
        target: action_or_effect
        rationale: Add the intended update if the variable should change.
      - kind: simplify_guard
        target: expression
        rationale: Replace the read with a literal if the value is intentionally constant.
    do_not:
      - "Do not add a meaningless self-assignment."
  emit_tier: static_pipeline
  example_dsl: |
    def int ready = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [ready > 0];
    }

W_WRITE_ONLY_VAR:
  severity: warning
  span_object: variable_declaration
  capability: pure_static
  description: >-
    A variable is written by actions or effects but is never read by any
    guard, action, or transition effect expression.
  refs:
    var_name:
      type: str
      required: true
      description: Variable name.
    written_states:
      type: list[str]
      required: true
      description: State paths where the variable is written.
  for_llm:
    summary: >-
      The variable is updated but never influences model behavior.
    recommended_actions:
      - kind: add_read
        target: guard_or_action
        rationale: Read the variable where it should affect behavior.
      - kind: remove_variable
        target: variable_definition
        rationale: Remove the variable and writes if they are dead scaffolding.
    do_not:
      - "Do not add an unused read just to silence the warning."
  emit_tier: static_pipeline
  example_dsl: |
    def int counter = 0;
    state Root {
        state A { during { counter = 1; } }
        [*] -> A;
    }

W_REDUNDANT_TRANSITION:
  severity: warning
  span_object: transition
  capability: pure_static
  description: >-
    Multiple transitions share the same source, target, event, guard, and
    effect. Forced and normal transitions with the same behavioral key are
    counted here as redundant and may also emit W_FORCED_OVERRIDES_NORMAL.
  refs:
    from_path:
      type: str
      required: true
      description: Dotted source state path.
    to_path:
      type: str
      required: true
      description: Dotted target state path.
    duplicate_spans:
      type: list[Span]
      required: true
      description: Source spans for the duplicate transition declarations, using null for declarations whose span is unavailable.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  for_llm:
    summary: >-
      These transitions are indistinguishable by source, target, event,
      guard, and effect, so later copies do not add behavior.
    recommended_actions:
      - kind: remove_duplicate
        target: transition
        rationale: Keep one transition and remove redundant copies.
      - kind: differentiate_transition
        target: transition
        rationale: Change event, guard, target, or effect if the copy was meant to do something else.
    do_not:
      - "Do not keep duplicate transitions as comments."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B :: Go;
        A -> B :: Go;
    }

W_SELF_TRANSITION_NOP:
  severity: warning
  span_object: transition
  capability: pure_static
  description: >-
    A leaf self transition has no event, guard, effect, own lifecycle action,
    or ancestor aspect action.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the state with the no-op self transition.
    from_path:
      type: str
      required: false
      description: Dotted source state path.
    to_path:
      type: str
      required: false
      description: Dotted target state path.
    transition_span:
      type: Span
      required: false
      description: Source span of the no-op self transition when available.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  for_llm:
    summary: >-
      The transition points from a state to itself and has no trigger,
      guard, effect, or re-entry lifecycle behavior, so it does not model
      useful behavior.
    recommended_actions:
      - kind: remove_transition
        target: transition
        rationale: Remove the no-op transition.
      - kind: add_effect_or_trigger
        target: transition
        rationale: Add the missing behavior if this transition is intentional.
    do_not:
      - "Do not apply this warning to self transitions whose re-entry would run enter, during, exit, or ancestor aspect actions."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        [*] -> A;
        A -> A;
    }

W_EFFECT_SELF_ASSIGN:
  severity: warning
  span_object: effect_statement
  capability: pure_static
  description: >-
    An effect statement assigns a variable directly to itself.
  refs:
    state_path:
      type: str
      required: true
      description: Source state path when known.
    transition_span:
      type: Span
      required: false
      description: Source span of the transition containing the effect.
    var_name:
      type: str
      required: true
      description: Variable assigned to itself.
    effect_self_assign_anchor:
      type: str
      required: false
      description: >-
        Variable name repeated only when the self-assignment occurrence
        can be uniquely mapped back to a non-initial effect statement for
        the same source state and variable.
    suggested_fix:
      type: dict
      required: false
      description: Structured quick-fix payload for removing the no-op effect statement.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  suggested_fix:
    kind: delete
    target: effect_self_assign_statement
    anchor_ref: refs.effect_self_assign_anchor
    text_template: ""
    rationale: Remove the no-op self-assignment statement.
  for_llm:
    summary: >-
      The assignment does not change model state and is likely dead code.
    recommended_actions:
      - kind: remove_statement
        target: effect_statement
        rationale: Delete the self-assignment.
      - kind: fix_rhs
        target: expression
        rationale: Replace the right-hand side with the intended expression.
    do_not:
      - "Do not replace it with another no-op expression."
  emit_tier: static_pipeline
  example_dsl: |
    def int x = 0;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B effect { x = x; }
    }

W_FORCED_OVERRIDES_NORMAL:
  severity: warning
  span_object: transition
  capability: pure_static
  description: >-
    A forced transition expands to the same source, target, event, and
    guard as a normal transition.
  refs:
    from_path:
      type: str
      required: true
      description: Dotted source state path.
    to_path:
      type: str
      required: true
      description: Dotted target state path.
    forced_declaration_span:
      type: Span
      required: false
      description: Source span of the forced transition when available.
    normal_transition_span:
      type: Span
      required: false
      description: Source span of the normal transition when available.
  for_llm:
    summary: >-
      The forced transition duplicates a normal transition, which can
      make the forced declaration misleading or redundant.
    recommended_actions:
      - kind: remove_duplicate
        target: forced_transition
        rationale: Remove the forced transition if the normal one already covers it.
      - kind: adjust_forced_scope
        target: forced_transition
        rationale: Change the forced declaration if it should cover different states.
    do_not:
      - "Do not keep both unless the generated runtime intentionally treats forced metadata differently."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B :: Go;
        !A -> B :: Go;
    }

W_SHADOWED_EVENT:
  severity: warning
  span_object: event_declaration
  capability: pure_static
  description: >-
    A local event name shadows a chain or absolute event with the same
    leaf name.
  refs:
    event_name:
      type: str
      required: true
      description: Shared event leaf name.
    local_path:
      type: str
      required: true
      description: Qualified local event path.
    chain_path:
      type: str
      required: true
      description: Qualified chain or absolute event path.
  for_llm:
    summary: >-
      The same event leaf name exists in local and broader scopes, which
      can make transition triggers easy to misread.
    recommended_actions:
      - kind: rename_event
        target: event
        rationale: Use distinct event names for different scopes.
      - kind: adjust_scope
        target: transition_trigger
        rationale: Use ``:`` or ``::`` deliberately and consistently.
    do_not:
      - "Do not rename only one trigger without checking all emitters."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        event Tick;
        state A;
        state B;
        [*] -> A;
        A -> B : Tick;
        B -> A :: Tick;
    }

W_NAMED_ACTION_SHADOWS_ANCESTOR:
  severity: warning
  span_object: named_action_declaration
  capability: pure_static
  description: >-
    A named lifecycle action reuses the same function name as an
    ancestor-scoped named action.
  refs:
    function_name:
      type: str
      required: true
      description: Reused named action identifier.
    inner_state_path:
      type: str
      required: true
      description: Dotted path of the state containing the shadowing action.
    outer_state_path:
      type: str
      required: true
      description: Dotted path of the ancestor state containing the shadowed action.
  for_llm:
    summary: >-
      A nested state defines a named action with the same name as an
      ancestor action. Relative action refs can become hard to audit
      because the same leaf name means different functions at different
      hierarchy levels.
    recommended_actions:
      - kind: rename_inner_action
        target: named_action
        rationale: Give the nested action a distinct name when it implements different behavior.
      - kind: use_ref
        target: action
        rationale: Use ``ref`` to reuse the ancestor action when the behavior should be shared.
    do_not:
      - "Do not leave the shadowing name in place unless the scope distinction is intentional and documented outside the DSL."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        enter Sync { }
        state Child { enter Sync { } }
        [*] -> Child;
    }

W_LITERAL_TYPE_NARROWING:
  severity: warning
  span_object: expression
  capability: pure_static
  description: >-
    An ``int`` variable is initialized or assigned directly from a
    floating-point literal, which can imply silent narrowing in generated
    code. Compound expressions containing floating-point literals are out
    of scope for this warning.
  refs:
    var_name:
      type: str
      required: true
      description: Target variable name.
    target_type:
      type: str
      required: true
      description: Declared target variable type.
      enum: ['int']
    source_expr:
      type: str
      required: true
      description: Source text of the direct float literal.
  for_llm:
    summary: >-
      A direct float literal value flows into an ``int`` variable. The
      model may truncate or generate target-language code with a
      narrowing conversion; compound expressions such as ``3.0 + 0.5``
      are intentionally outside this warning's scope.
    recommended_actions:
      - kind: change_type
        target: variable_definition
        rationale: Use ``def float`` when fractional values are intended.
      - kind: change_literal
        target: expression
        rationale: Use an integer literal or explicit rounding expression when integer behavior is intended.
    do_not:
      - "Do not silently rely on target-language truncation rules."
  emit_tier: static_pipeline
  example_dsl: |
    def int truncated = 3.5;
    state Root { state A; [*] -> A; }

# ---------------------------------------------------------------------------
# C/C++ deployment-profile numeric diagnostics catalog contract.
# ---------------------------------------------------------------------------

W_NUMERIC_LITERAL_OUT_OF_TARGET_RANGE:
  severity: warning
  span_object: expression
  capability: pure_static
  emit_tier: static_pipeline
  description: >-
    An integer literal that would be rendered into a C/C++ family template
    falls outside the default ``PYFCSTM_GENERATED_INT64`` signed range. This
    warning is target-profile-specific: Python generated runtimes may not have
    the same fixed-width integer carrying risk.
  refs:
    target_family:
      type: str
      required: true
      description: Target family whose default deployment profile owns this risk.
      enum: ['c_family']
    target_templates:
      type: list[str]
      required: true
      description: >-
        Ordered target templates covered by this default C/C++ profile:
        ``c``, ``c_poll``, ``cpp``, ``cpp_poll``.
      item_enum: ['c', 'c_poll', 'cpp', 'cpp_poll']
      exact_values: ['c', 'c_poll', 'cpp', 'cpp_poll']
    runtime_note:
      type: str
      required: true
      description: >-
        Human-readable note that this is a C/C++ deployment-profile risk and
        that Python generated runtimes may not have the same risk.
    context:
      type: str
      required: true
      description: Expression location where the literal appears.
      enum: ['var_initializer', 'guard', 'transition_effect', 'lifecycle_action']
    statement_kind:
      type: str
      required: false
      description: Statement shape when the expression is an operation assignment RHS.
      enum: ['operation_assignment']
    expr_text:
      type: str
      required: true
      description: Source text of the expression containing the literal.
    literal_text:
      type: str
      required: true
      description: Source text of the integer literal after applying a unary sign when present.
    target_bits:
      type: int
      required: true
      description: Target integer width in bits.
    signed:
      type: bool
      required: true
      description: Whether the target integer profile is signed.
    min_value_text:
      type: str
      required: true
      description: Decimal text of the minimum representable target value.
    max_value_text:
      type: str
      required: true
      description: Decimal text of the maximum representable target value.
    var_name:
      type: str
      required: false
      description: Variable receiving the literal when the location can be named.
  for_llm:
    summary: >-
      A literal intended for C/C++ generated code exceeds the default 64-bit
      signed integer profile. Treat this as a C/C++ deployment-profile warning,
      not as proof that Python generated code is invalid.
    recommended_actions:
      - kind: reduce_literal
        target: expression
        rationale: Keep integer literals within the documented C/C++ target range when deploying to C-family templates.
      - kind: choose_target_profile
        target: deployment_plan
        rationale: If the large value is intentional, document or verify a target profile that can carry it before generating C/C++ code.
    do_not:
      - "Do not describe this as a target-independent FCSTM model error; the risk is tied to the C/C++ default integer profile."
      - "Do not flag the legal lower-bound spelling ``-9223372036854775808`` as out of range."
  example_dsl: |
    def int too_large = 9223372036854775808;
    state Root { state A; [*] -> A; }

W_NUMERIC_CONSTANT_DIVISION_BY_ZERO:
  severity: warning
  span_object: expression
  capability: const_fold
  emit_tier: static_pipeline
  description: >-
    A ``/`` or ``%`` operation has a right-hand side that the lightweight
    literal-only constant folder can classify as zero. This is reported as a
    C/C++ deployment-profile risk because generated C/C++ code needs an
    explicit definition or failure channel; Python runtime exception semantics
    are different.
  refs:
    target_family:
      type: str
      required: true
      description: Target family whose default deployment profile owns this risk.
      enum: ['c_family']
    target_templates:
      type: list[str]
      required: true
      description: >-
        Ordered target templates covered by this default C/C++ profile:
        ``c``, ``c_poll``, ``cpp``, ``cpp_poll``.
      item_enum: ['c', 'c_poll', 'cpp', 'cpp_poll']
      exact_values: ['c', 'c_poll', 'cpp', 'cpp_poll']
    runtime_note:
      type: str
      required: true
      description: >-
        Human-readable note that this is a C/C++ deployment-profile risk and
        that Python generated runtimes may not have the same failure contract.
    context:
      type: str
      required: true
      description: Expression location where the operator appears.
      enum: ['var_initializer', 'guard', 'transition_effect', 'lifecycle_action']
    statement_kind:
      type: str
      required: false
      description: Statement shape when the expression is an operation assignment RHS.
      enum: ['operation_assignment']
    expr_text:
      type: str
      required: true
      description: Source text of the expression containing the operation.
    operator:
      type: str
      required: true
      description: Operator whose right-hand side folded to zero.
      enum: ['/', '%']
    rhs_text:
      type: str
      required: true
      description: Source text of the right-hand side that folded to zero.
  for_llm:
    summary: >-
      A division or modulo RHS is statically zero under the lightweight
      literal-only folder. For C/C++ generated code this needs a design fix or
      explicit failure policy; do not conflate it with Python's exception model.
    recommended_actions:
      - kind: fix_denominator
        target: expression
        rationale: Replace the zero RHS with a non-zero expression or guard the operation before C/C++ deployment.
      - kind: add_failure_policy
        target: deployment_plan
        rationale: If zero is possible by design, define the C/C++ failure channel instead of leaving generated code behavior implicit.
    do_not:
      - "Do not require the whole expression to be literal-only; only the RHS of ``/`` or ``%`` needs to fold to zero."
      - "Do not drop ``refs.operator`` when division and modulo share this code."
  example_dsl: |
    def int result = 0;
    def int input = 1;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B effect { result = input / (1 - 1); };
    }

W_NUMERIC_SHIFT_COUNT_OUT_OF_TARGET_RANGE:
  severity: warning
  span_object: expression
  capability: const_fold
  emit_tier: static_pipeline
  description: >-
    A shift count folds to a constant below zero or not less than the default
    C/C++ target integer width. This is a C/C++ 64-bit deployment-profile
    portability risk; Python big-integer shifting is not the same target
    contract.
  refs:
    target_family:
      type: str
      required: true
      description: Target family whose default deployment profile owns this risk.
      enum: ['c_family']
    target_templates:
      type: list[str]
      required: true
      description: >-
        Ordered target templates covered by this default C/C++ profile:
        ``c``, ``c_poll``, ``cpp``, ``cpp_poll``.
      item_enum: ['c', 'c_poll', 'cpp', 'cpp_poll']
      exact_values: ['c', 'c_poll', 'cpp', 'cpp_poll']
    runtime_note:
      type: str
      required: true
      description: >-
        Human-readable note that this is a C/C++ deployment-profile risk and
        that Python generated runtimes may not have the same fixed-width shift risk.
    context:
      type: str
      required: true
      description: Expression location where the shift appears.
      enum: ['var_initializer', 'guard', 'transition_effect', 'lifecycle_action']
    statement_kind:
      type: str
      required: false
      description: Statement shape when the expression is an operation assignment RHS.
      enum: ['operation_assignment']
    expr_text:
      type: str
      required: true
      description: Source text of the shift expression.
    operator:
      type: str
      required: true
      description: Shift operator.
      enum: ['<<', '>>']
    target_bits:
      type: int
      required: true
      description: Target integer width in bits.
    shift_count_text:
      type: str
      required: true
      description: Source text of the shift count after lightweight folding.
  for_llm:
    summary: >-
      A shift count is statically outside the C/C++ default 64-bit profile.
      Treat this as a target-profile portability warning, not as a Python
      generated-runtime error.
    recommended_actions:
      - kind: bound_shift_count
        target: expression
        rationale: Keep constant shift counts within ``0 <= count < 64`` for the default C/C++ profile.
      - kind: use_verify_for_dynamic_count
        target: deployment_plan
        rationale: If the shift count is not constant, use the verify line to prove the range before C/C++ deployment.
    do_not:
      - "Do not report dynamic shift counts as proven unsafe from this catalog-only rule."
      - "Do not fold negative or oversized shift operations into a normal numeric result."
  example_dsl: |
    def int flags = 1;
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B : if [(flags << 64) != 0];
    }

W_NUMERIC_FLOAT_BITWISE:
  severity: warning
  span_object: expression
  capability: pure_static
  emit_tier: static_pipeline
  description: >-
    A value known to be ``float`` participates in a bitwise or shift operator
    that belongs to the C/C++ integer operation profile. The warning is
    target-profile-specific even when other runtimes may also reject some
    float-bitwise shapes for different reasons.
  refs:
    target_family:
      type: str
      required: true
      description: Target family whose default deployment profile owns this risk.
      enum: ['c_family']
    target_templates:
      type: list[str]
      required: true
      description: >-
        Ordered target templates covered by this default C/C++ profile:
        ``c``, ``c_poll``, ``cpp``, ``cpp_poll``.
      item_enum: ['c', 'c_poll', 'cpp', 'cpp_poll']
      exact_values: ['c', 'c_poll', 'cpp', 'cpp_poll']
    runtime_note:
      type: str
      required: true
      description: >-
        Human-readable note that this is a C/C++ integer-operation profile
        risk and that other runtimes may fail for different reasons.
    context:
      type: str
      required: true
      description: Expression location where the bitwise operation appears.
      enum: ['var_initializer', 'guard', 'transition_effect', 'lifecycle_action']
    statement_kind:
      type: str
      required: false
      description: Statement shape when the expression is an operation assignment RHS.
      enum: ['operation_assignment']
    expr_text:
      type: str
      required: true
      description: Source text of the bitwise expression.
    operator:
      type: str
      required: true
      description: Bitwise or shift operator involving a float-shaped operand.
      enum: ['&', '^', '|', '<<', '>>']
    operand_types:
      type: list[str]
      required: true
      description: >-
        Operand type tags in expression order. Allowed members are ``int``,
        ``float``, and ``unknown``.
      item_enum: ['int', 'float', 'unknown']
    operand_type_sources:
      type: list[str]
      required: true
      description: >-
        Evidence source for each operand type tag. Allowed members are
        ``literal``, ``declared_var``, and ``local_expression``.
      item_enum: ['literal', 'declared_var', 'local_expression']
  for_llm:
    summary: >-
      A float-shaped operand reaches a C/C++ integer bitwise operation. Keep
      the diagnostic target-specific and use the operand type refs to explain
      why the expression is considered risky.
    recommended_actions:
      - kind: use_integer_operand
        target: expression
        rationale: Replace the float operand with an integer flag/mask value when deploying to C/C++ templates.
      - kind: change_variable_type
        target: variable_definition
        rationale: If the value is intended as a bit mask, declare and update it as an integer-shaped variable.
    do_not:
      - "Do not describe this only as a generic Python TypeError; the shared contract is about the C/C++ integer-operation profile."
      - "Do not infer cross-statement temporary types for this first deterministic rule."
  example_dsl: |
    def float gain = 1.5;
    def int flags = 1;
    state Root {
        state A {
            during { flags = flags & gain; }
        }
        [*] -> A;
    }

W_ASPECT_NO_DESCENDANT_LEAF:
  severity: warning
  span_object: lifecycle_action
  capability: pure_static
  description: >-
    A ``>> during`` aspect is attached to a state with no descendant
    non-pseudo leaf states, so the aspect cannot affect any leaf cycle.
  refs:
    composite_path:
      type: str
      required: true
      description: Dotted path of the state declaring the aspect.
    aspect:
      type: str
      required: true
      description: Aspect direction.
      enum: ['before', 'after']
  for_llm:
    summary: >-
      The aspect action has no descendant leaf state to wrap, so it has
      no modeled runtime target.
    recommended_actions:
      - kind: add_leaf
        target: composite_state
        rationale: Add the intended descendant leaf state under this composite.
      - kind: move_or_remove_aspect
        target: aspect_action
        rationale: Move the aspect to a composite with leaves, or remove it if it is dead scaffolding.
    do_not:
      - "Do not replace it with a normal during action unless the execution semantics really should change."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        pseudo state Marker;
        [*] -> Marker;
        >> during before { }
    }

W_HIGH_VAR_TO_LEAF_RATIO:
  severity: warning
  span_object: composite_block
  capability: pure_static
  description: >-
    The number of variables is high relative to the number of non-pseudo
    leaf states.
  refs:
    n_vars:
      type: int
      required: true
      description: Number of top-level variable definitions.
    n_leaf_states:
      type: int
      required: true
      description: Number of non-pseudo leaf states.
    actual:
      type: number
      required: true
      description: Actual ``n_vars / max(n_leaf_states, 1)`` ratio.
    threshold:
      type: number
      required: true
      description: Effective threshold used for this inspection call.
  for_llm:
    summary: >-
      The model has many variables for its number of leaf states, which
      often indicates flag bloat or speculative state that does not
      belong in the DSL.
    recommended_actions:
      - kind: audit_variables
        target: variable_definitions
        rationale: Remove or consolidate variables that do not represent durable machine state.
      - kind: split_model
        target: state_machine
        rationale: If every variable is meaningful, consider whether the model is combining too many concerns.
    do_not:
      - "Do not raise the threshold without checking whether the variables influence behavior."
  emit_tier: static_pipeline
  example_dsl: |
    def int a = 0;
    def int b = 0;
    def int c = 0;
    state Root { state A; [*] -> A; }

W_DEEP_HIERARCHY:
  severity: warning
  span_object: state_identifier
  capability: pure_static
  description: >-
    The state hierarchy exceeds the configured maximum depth.
  refs:
    max_depth:
      type: int
      required: true
      description: Maximum hierarchy depth found in the model.
    deepest_path:
      type: str
      required: true
      description: One deepest state path that triggered the warning.
    actual:
      type: int
      required: true
      description: Actual maximum hierarchy depth.
    threshold:
      type: int
      required: true
      description: Effective threshold used for this inspection call.
  for_llm:
    summary: >-
      The hierarchy is deeper than the configured readability threshold,
      making lifecycle order and transition scope harder to reason about.
    recommended_actions:
      - kind: flatten_hierarchy
        target: state_tree
        rationale: Collapse levels that do not add lifecycle or transition semantics.
      - kind: extract_submachine
        target: composite_state
        rationale: Split a deeply nested concern into a separate machine when appropriate.
    do_not:
      - "Do not flatten a level that carries required enter, exit, during, or aspect semantics."
  emit_tier: static_pipeline
  example_dsl: |
    state Root { state A { state B { state C; [*] -> C; } [*] -> B; } [*] -> A; }

W_LARGE_COMPOSITE:
  severity: warning
  span_object: composite_block
  capability: pure_static
  description: >-
    A composite state has more direct children than the configured
    threshold.
  refs:
    composite_path:
      type: str
      required: true
      description: Dotted path of the large composite state.
    n_children:
      type: int
      required: true
      description: Number of direct child states.
    actual:
      type: int
      required: true
      description: Actual direct child count.
    threshold:
      type: int
      required: true
      description: Effective threshold used for this inspection call.
  for_llm:
    summary: >-
      A single composite state owns many direct children, which can make
      transition review and initial-state reasoning difficult.
    recommended_actions:
      - kind: group_children
        target: composite_state
        rationale: Introduce meaningful nested composites to group related child states.
      - kind: split_machine
        target: state_machine
        rationale: Move unrelated child groups into separate machines if they represent separate concerns.
    do_not:
      - "Do not add arbitrary grouping states that have no semantic meaning."
  emit_tier: static_pipeline
  example_dsl: |
    state Root { state A; state B; state C; [*] -> A; }

I_TRANSITION_TO_SELF_VIA_PARENT:
  severity: info
  span_object: transition
  capability: pure_static
  description: >-
    A composite state transitions to itself, which can intentionally
    force a re-entry path through child initialization and lifecycle
    actions.
  refs:
    state_path:
      type: str
      required: true
      description: Dotted path of the self-transitioning composite state.
    crosses_composite:
      type: bool
      required: true
      description: Always ``True`` for this info because the state is composite.
  for_llm:
    summary: >-
      This is an informational observation rather than a defect: a
      composite self-transition may be a deliberate reinitialization
      pattern.
    recommended_actions:
      - kind: preserve_if_intentional
        target: transition
        rationale: Keep the transition when the model should re-run composite entry semantics.
      - kind: review_lifecycle
        target: composite_state
        rationale: Confirm the enter/exit and initial-child actions are intended to run.
    do_not:
      - "Do not delete this transition automatically; it may be the intended reset path."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state Active { state Leaf; [*] -> Leaf; }
        [*] -> Active;
        Active -> Active;
    }

I_TRANSITION_NEVER_EVENT_TRIGGERED:
  severity: info
  span_object: transition
  capability: pure_static
  description: >-
    A normal transition has no event and no guard, so it is an
    unconditional fall-through candidate.
  refs:
    from_path:
      type: str
      required: true
      description: Dotted source state path.
    to_path:
      type: str
      required: true
      description: Dotted target state path.
    transition_span:
      type: Span
      required: false
      description: Source span of the transition when available.
    transition_index:
      type: int
      required: false
      description: >-
        Zero-based index in parent-first model transition order, including
        expanded forced transitions at their declaring state before ordinary
        transitions and descendant-state transitions. This is used only as a
        source-range disambiguation hint when spans are unavailable.
  for_llm:
    summary: >-
      The transition is not event-triggered and has no guard. This may
      be a deliberate unconditional fall-through, so treat it as context
      rather than a fix target.
    recommended_actions:
      - kind: keep_if_fallthrough
        target: transition
        rationale: Keep it when the state should immediately advance.
      - kind: add_trigger_or_guard
        target: transition
        rationale: Add the missing event or guard if the transition should wait.
    do_not:
      - "Do not add a meaningless event just to silence this info."
  emit_tier: static_pipeline
  example_dsl: |
    state Root {
        state A;
        state B;
        [*] -> A;
        A -> B;
    }

# ---------------------------------------------------------------------------
# Verify diagnostics emitted only from the optional Python verify pipeline.
# ---------------------------------------------------------------------------

I_NONTRIVIAL_SCC:
  severity: info
  span_object: state_identifier
  capability: pure_static
  emit_tier: verify_pipeline
  description: >-
    A non-trivial strongly connected component exists in the guard-agnostic
    leaf-level topology graph.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['topological_only']
    representative_state_path:
      type: str
      required: true
      description: One state path from the reported strongly connected component.
    scc:
      type: list[str]
      required: true
      description: State paths in the non-trivial strongly connected component.
  for_llm:
    summary: >-
      The topology contains a cycle. This is often intentional in state
      machines, so treat it as a review prompt rather than a direct defect.
    recommended_actions:
      - kind: review_cycle
        target: topology
        rationale: Confirm the cycle has a deliberate runtime exit or event-driven purpose.
      - kind: add_exit
        target: transition
        rationale: Add an exit path if the component should not be able to loop forever.
    do_not:
      - "Do not delete cyclic transitions automatically; cyclic control flow can be valid FCSTM behavior."
  example_dsl: |
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B;
        B -> A;
    }

W_TOPOLOGICAL_NOEXIT:
  severity: warning
  span_object: state_identifier
  capability: pure_static
  emit_tier: verify_pipeline
  description: >-
    A root-reachable leaf or cycle has no guard-agnostic route to the root
    exit sink.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['topological_only']
    representative_state_path:
      type: str
      required: true
      description: One state path from the no-exit counterexample.
    counterexample_kind:
      type: str
      required: true
      description: Shape of the topological counterexample.
      enum: ['trap_cycle', 'deadlock']
    scc:
      type: list[str]
      required: true
      description: Trap-cycle component paths, or an empty list for a deadlock leaf.
  for_llm:
    summary: >-
      From the current topology, execution can enter a region that has no
      structural path to terminate at the root exit.
    recommended_actions:
      - kind: add_exit_transition
        target: topology
        rationale: Add a route from the stuck state or cycle to an exit-capable path.
      - kind: mark_intentional
        target: review_note
        rationale: If the model intentionally never exits, keep the behavior and document it.
    do_not:
      - "Do not add an unconditional exit without checking lifecycle and event semantics."
  example_dsl: |
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B;
    }

I_TOPOLOGICAL_NON_TERMINATING:
  severity: info
  span_object: state_identifier
  capability: pure_static
  emit_tier: verify_pipeline
  description: >-
    The topology does not force all root-reachable executions to eventually
    reach the root terminator.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['topological_only']
    representative_state_path:
      type: str
      required: true
      description: One state path from the non-terminating counterexample.
    counterexample_path:
      type: list[str]
      required: true
      description: Representative cycle or deadlock path reported by topology verify.
  for_llm:
    summary: >-
      The structural graph allows a path that can avoid termination forever.
      This may be a valid service loop, but it should be reviewed explicitly.
    recommended_actions:
      - kind: review_nontermination
        target: topology
        rationale: Decide whether the non-terminating path is intended.
      - kind: add_progress_transition
        target: transition
        rationale: Add an exit or progress edge if all executions should eventually finish.
    do_not:
      - "Do not treat every loop as a bug; long-running control loops are common state-machine behavior."
  example_dsl: |
    state System {
        state A;
        [*] -> A;
        A -> A;
        A -> [*];
    }

W_EVENT_UNREACHABLE_EMIT:
  severity: warning
  span_object: event_declaration
  capability: pure_static
  emit_tier: verify_pipeline
  description: >-
    A used event has no consumer source that is reachable in the
    guard-agnostic topology graph.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['topological_only']
    event_name:
      type: str
      required: true
      description: Qualified event name whose consumers are unreachable.
    consumer_count:
      type: int
      required: true
      description: Number of unreachable consumer transitions represented by this finding.
  for_llm:
    summary: >-
      The event is used by transitions, but those transition sources are not
      reachable from the root entry topology.
    recommended_actions:
      - kind: connect_consumer
        target: transition_source
        rationale: Add a topology path that reaches the state consuming the event.
      - kind: remove_dead_event_path
        target: transition
        rationale: Remove or rewrite the unreachable event transition if it is dead scaffolding.
    do_not:
      - "Do not add an emitter for this event if no reachable state can consume it."
  example_dsl: |
    state System {
        event Panic;
        state A;
        state LostA;
        state LostB;
        [*] -> A;
        LostA -> A : Panic;
        LostB -> A : Panic;
    }

W_DEAD_GUARD:
  severity: warning
  span_object: guard_expression
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A transition guard is unsatisfiable under model variable type and
    runtime-definedness constraints.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the guarded transition.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
  for_llm:
    summary: >-
      SMT proves the guard cannot become true for any valid variable
      valuation. This differs from W_GUARD_CONST_FALSE, which only reports
      literal-only guards folded syntactically to false.
    recommended_actions:
      - kind: fix_guard
        target: transition
        rationale: Relax or correct the contradictory guard condition.
      - kind: remove_transition
        target: transition
        rationale: Remove the transition if the guard intentionally makes it unreachable.
    do_not:
      - "Do not replace the guard with true unless the transition really should become unconditional."
      - "Do not confuse this SMT finding with W_GUARD_CONST_FALSE; variables and runtime-definedness matter here."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B : if [x > 1 && x < 0];
    }

W_GUARD_TAUTOLOGY:
  severity: warning
  span_object: guard_expression
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A transition guard is true for every variable valuation that satisfies
    model type and runtime-definedness constraints.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the guarded transition.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
  for_llm:
    summary: >-
      SMT proves the guard is always true under the modeled variable
      constraints. This differs from W_GUARD_CONST_TRUE, which only reports
      literal-only guards folded syntactically to true.
    recommended_actions:
      - kind: remove_redundant_guard
        target: transition
        rationale: Remove the guard if the transition should be unconditional.
      - kind: tighten_guard
        target: transition
        rationale: Replace the guard if it was intended to restrict when the transition fires.
    do_not:
      - "Do not assume every tautological guard is wrong; it may document intent."
      - "Do not confuse this SMT finding with W_GUARD_CONST_TRUE; variables and runtime-definedness matter here."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B : if [x >= 0 || x < 0];
    }

W_FORCED_GUARD_UNSAT:
  severity: warning
  span_object: guard_expression
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A forced-transition guard cannot be satisfied under declaration
    initializer values.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the forced transition.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
    scope:
      type: str
      required: true
      description: Initial-value scope used by the verify algorithm.
      enum: ['dsl_def_init_only']
  for_llm:
    summary: >-
      The forced transition expands structurally, but its guard is false under
      top-level declaration initializers.
    recommended_actions:
      - kind: adjust_initializer
        target: variable_definition
        rationale: Change the initializer if the forced transition must be possible at startup.
      - kind: adjust_forced_guard
        target: transition
        rationale: Correct the guard if it does not match the intended forced-transition entry condition.
    do_not:
      - "Do not delete the forced transition solely because it is impossible at declaration time; later runtime values may still matter for normal guards."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A;
        !A -> B : if [x > 0];
    }

W_EFFECT_SMT_NO_OP:
  severity: warning
  span_object: effect_statement
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A transition effect leaves all model variables unchanged for every
    guarded, runtime-defined execution.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the transition with the effect.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
  for_llm:
    summary: >-
      Symbolic execution proves the effect does not change any persistent
      model variable when its guard is enabled.
    recommended_actions:
      - kind: remove_effect
        target: effect_block
        rationale: Remove the effect if it is dead or only placeholder logic.
      - kind: change_assignment
        target: effect_statement
        rationale: Update the effect so it changes the intended persistent variable.
    do_not:
      - "Do not report block-local temporary-only changes as state changes; they disappear after the effect block."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B : if [x >= 0] effect { x = x + 0; };
    }

I_EFFECT_GUARD_CONTRADICT:
  severity: info
  span_object: effect_statement
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A transition effect makes the same transition guard false after every
    guarded, runtime-defined execution.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the transition with the effect.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
  for_llm:
    summary: >-
      The effect immediately invalidates the guard that enabled the
      transition. This may be a deliberate one-shot or latch reset pattern.
    recommended_actions:
      - kind: review_one_shot
        target: transition
        rationale: Confirm the effect is meant to falsify the enabling guard.
      - kind: adjust_effect_or_guard
        target: transition
        rationale: Change either side if the post-state should still satisfy the guard.
    do_not:
      - "Do not treat this info as an automatic defect; guard-reset effects are often intentional."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A;
        A -> B : if [x > 0] effect { x = 0; };
    }

W_TRANSITION_SHADOWED:
  severity: warning
  span_object: transition
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A later outgoing transition is fully covered by earlier same-source
    triggers and therefore cannot be selected.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    transition:
      type: dict
      required: true
      description: Raw verify transition payload for the shadowed transition.
    transition_summary:
      type: str
      required: true
      description: Stable human-readable transition summary derived from the raw payload.
    source_state_path:
      type: str
      required: true
      description: Dotted source state path whose outgoing order creates the shadowing.
    reason:
      type: str
      required: true
      description: Shadowing reason classification.
      enum: ['guard_shadow', 'duplicate_event', 'unconditional_catchall', 'prior_trigger_cover']
    shadowed_by_count:
      type: int
      required: true
      description: Number of earlier transitions covering this transition.
    shadowed_by:
      type: list[str]
      required: true
      description: Stable summaries of earlier transitions that shadow this transition.
  for_llm:
    summary: >-
      Transition ordering means an earlier same-source transition consumes all
      cases that could have reached this later transition.
    recommended_actions:
      - kind: reorder_transitions
        target: transition_list
        rationale: Move the more specific transition before the broader predecessor if both are needed.
      - kind: remove_shadowed_transition
        target: transition
        rationale: Remove the later transition if the predecessor intentionally covers all cases.
    do_not:
      - "Do not reorder transitions without checking FCSTM first-match semantics."
  example_dsl: |
    state System {
        state A;
        state B;
        state C;
        [*] -> A;
        A -> B;
        A -> C;
    }

I_ENTER_DURING_CONTRADICT:
  severity: info
  span_object: lifecycle_action
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    Entry-time assignments make a first-cycle during branch condition
    predetermined; the enter postcondition does not leave both during
    branches feasible.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    state_path:
      type: str
      required: true
      description: Dotted leaf state path inspected by the lifecycle algorithm.
    condition:
      type: str
      required: true
      description: First-cycle during condition proven predetermined.
    condition_source:
      type: str
      required: true
      description: Source label for the condition inside the during operation block.
    branch_taken:
      type: str
      required: true
      description: Branch direction forced after entry.
      enum: ['true', 'false']
  for_llm:
    summary: >-
      After entering the leaf, the first during cycle already has a fixed
      branch decision. This may be intentional initialization logic, but the
      branch is not genuinely conditional on the first cycle.
    recommended_actions:
      - kind: review_enter_during_relation
        target: lifecycle_action
        rationale: Check whether enter assignments intentionally force the first during branch.
      - kind: adjust_condition_or_enter
        target: state
        rationale: Change the enter action or during condition if both branches should remain possible.
    do_not:
      - "Do not remove the enter action just to make the first-cycle branch variable; entry side effects may be required."
  example_dsl: |
    def int x = 0;
    state System {
        state A {
            enter { x = 1; }
            during {
                if [x > 0] { x = x + 1; } else { x = x - 1; }
            }
        }
        [*] -> A;
    }

W_COMPOSITE_INIT_INCOMPLETE:
  severity: warning
  span_object: composite_block
  capability: requires_solver
  emit_tier: verify_pipeline
  description: >-
    A composite state's initial transitions do not jointly cover all
    variable and event inputs.
  refs:
    algorithm_name:
      type: str
      required: true
      description: Verify registry algorithm that produced the raw finding.
    verification_scope:
      type: str
      required: true
      description: Verify scope for this finding.
      enum: ['smt_local']
    composite_path:
      type: str
      required: true
      description: Dotted composite state path whose initial transitions have a coverage gap.
    init_transition_count:
      type: int
      required: true
      description: Number of initial transitions considered for the composite.
    init_transitions:
      type: list[str]
      required: true
      description: Stable summaries of the initial transitions considered.
    witness:
      type: str_or_null
      required: false
      description: Solver model demonstrating an uncovered input valuation, when available.
  for_llm:
    summary: >-
      There is a variable/event assignment for which none of the composite
      initial transitions can fire, so entry can get stuck at the composite.
    recommended_actions:
      - kind: add_catch_all_initial
        target: composite_state
        rationale: Add an unconditional fallback initial transition if one child should be the default.
      - kind: cover_missing_guard_case
        target: initial_transition
        rationale: Adjust guarded initial transitions so their union covers the missing valuation.
    do_not:
      - "Do not add overlapping initial transitions without reviewing declaration order and guard intent."
  example_dsl: |
    def int x = 0;
    state System {
        state A;
        state B;
        [*] -> A : if [x > 0];
        [*] -> B : if [x < 0];
    }
