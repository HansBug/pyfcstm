name: Docs Check

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'pyfcstm/*.py'
      - 'pyfcstm/**/*.py'
      - 'pyfcstm/diagnostics/codes.yaml'
      - 'logos/**'
      - 'tools/check_docs_pdf.py'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements-doc.txt'
      - 'auto_rst.py'
      - 'auto_rst_top_index.py'
      - 'tools/check_docs_terminology.py'
      - '.github/scripts/detect_ci_routes.py'
      - '.readthedocs.yaml'
      - '.github/workflows/docs-check.yml'
      - '.github/workflows/doc.yml.deprecated'
  pull_request:
    paths:
      - 'docs/**'
      - 'pyfcstm/*.py'
      - 'pyfcstm/**/*.py'
      - 'pyfcstm/diagnostics/codes.yaml'
      - 'logos/**'
      - 'tools/check_docs_pdf.py'
      - 'Makefile'
      - 'requirements.txt'
      - 'requirements-doc.txt'
      - 'auto_rst.py'
      - 'auto_rst_top_index.py'
      - 'tools/check_docs_terminology.py'
      - '.github/scripts/detect_ci_routes.py'
      - '.readthedocs.yaml'
      - '.github/workflows/docs-check.yml'
      - '.github/workflows/doc.yml.deprecated'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_docs_routes:
    name: Detect docs routes
    runs-on: ubuntu-22.04
    outputs:
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
      docs_resource_changed: ${{ steps.detect.outputs.docs_resource_changed }}
      fail_closed: ${{ steps.detect.outputs.fail_closed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Detect docs routes
        id: detect
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/docs-routes
          changed_file=.ci/docs-routes/changed-files.txt
          detector_output=.ci/docs-routes/detector.json
          : > "$changed_file"

          detector_event="${GITHUB_EVENT_NAME}"
          fail_closed_args=()
          zero_sha="0000000000000000000000000000000000000000"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            ref_name="${REF_NAME:-}"
            default_branch="${DEFAULT_BRANCH:-}"
            if [ -z "${HEAD_SHA:-}" ] || ! git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
              echo "Push head SHA is unavailable; failing closed for docs routes."
              fail_closed_args=(--fail-closed)
            elif [ -z "$default_branch" ]; then
              echo "Default branch is unavailable; failing closed for docs routes."
              fail_closed_args=(--fail-closed)
            elif [ -n "$ref_name" ] && [ "$ref_name" != "$default_branch" ]; then
              echo "Push on non-default ref ${ref_name}; detecting docs routes from merge-base with ${default_branch}."
              if git fetch --no-tags --prune origin "+refs/heads/${default_branch}:refs/remotes/origin/${default_branch}" \
                && merge_base="$(git merge-base "origin/${default_branch}" "${HEAD_SHA}")" \
                && [ -n "$merge_base" ] \
                && git diff --name-only "$merge_base" "${HEAD_SHA}" > "$changed_file"; then
                echo "Detected changed files between merge-base ${merge_base} and ${HEAD_SHA}."
              else
                echo "Could not diff ${default_branch} merge-base..${HEAD_SHA}; failing closed for docs routes."
                : > "$changed_file"
                fail_closed_args=(--fail-closed)
              fi
            elif [ -z "${BEFORE_SHA:-}" ] || [ "${BEFORE_SHA}" = "$zero_sha" ]; then
              echo "Default-branch push base SHA is unavailable; failing closed for docs routes."
              fail_closed_args=(--fail-closed)
            elif git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null && git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}" > "$changed_file"; then
              echo "Detected changed files between ${BEFORE_SHA} and ${HEAD_SHA}."
            else
              echo "Could not diff ${BEFORE_SHA}..${HEAD_SHA}; failing closed for docs routes."
              : > "$changed_file"
              fail_closed_args=(--fail-closed)
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ -n "${PR_BASE_SHA:-}" ] \
              && [ -n "${PR_HEAD_SHA:-}" ] \
              && git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null \
              && git cat-file -e "${PR_HEAD_SHA}^{commit}" 2>/dev/null \
              && git diff --name-only "${PR_BASE_SHA}" "${PR_HEAD_SHA}" > "$changed_file"; then
              echo "Detected changed files between PR base ${PR_BASE_SHA} and head ${PR_HEAD_SHA}."
            else
              echo "Could not diff PR base..head; failing closed for docs routes."
              : > "$changed_file"
              fail_closed_args=(--fail-closed)
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            detector_event="workflow_dispatch"
            echo "workflow_dispatch uses fail-closed docs route defaults."
          else
            echo "Unsupported event ${GITHUB_EVENT_NAME}; failing closed for docs routes."
            detector_event="local"
            fail_closed_args=(--fail-closed)
          fi

          python .github/scripts/detect_ci_routes.py \
            --changed-files "$changed_file" \
            --event-name "$detector_event" \
            "${fail_closed_args[@]}" \
            --json > "$detector_output"

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path('.ci/docs-routes/detector.json').read_text(encoding='utf-8'))
          output_keys = ('docs_changed', 'docs_resource_changed', 'fail_closed')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              for key in output_keys:
                  print('{0}={1}'.format(key, str(bool(result.get(key, False))).lower()), file=out)
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as summary:
              print('## Docs route detector', file=summary)
              print('', file=summary)
              print('* Docs changed: `{0}`'.format(result.get('docs_changed')), file=summary)
              print('* Docs resource changed: `{0}`'.format(result.get('docs_resource_changed')), file=summary)
              print('* Fail closed: `{0}`'.format(result.get('fail_closed')), file=summary)
              print('', file=summary)
              print('```json', file=summary)
              print(json.dumps(result, indent=2, sort_keys=True), file=summary)
              print('```', file=summary)
          PY

  docs_html:
    name: Docs HTML
    runs-on: ubuntu-22.04
    needs: detect_docs_routes
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install docs dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make ripgrep
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-doc.txt
          python -m pip install -e . --no-deps
      - name: Check Chinese documentation terminology
        shell: bash
        run: |
          make docs_terminology_check
      - name: Build English docs without generated contents
        shell: bash
        run: |
          NO_CONTENTS_BUILD=1 READTHEDOCS_LANGUAGE=en sphinx-build -b html docs/source /tmp/pyfcstm-docs-check-en
      - name: Build Chinese docs without generated contents
        shell: bash
        run: |
          NO_CONTENTS_BUILD=1 READTHEDOCS_LANGUAGE=zh sphinx-build -b html docs/source /tmp/pyfcstm-docs-check-zh
      - name: Scan rendered HTML for reST markup problems
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'class="problematic"' /tmp/pyfcstm-docs-check-en /tmp/pyfcstm-docs-check-zh -g '*.html'; then
            echo "Found rendered docutils problematic spans." >&2
            exit 1
          fi
          if rg -n '<span class="problematic"[^\n]*>``</span>|<span class="problematic"[^\n]*>`</span>' /tmp/pyfcstm-docs-check-en /tmp/pyfcstm-docs-check-zh -g '*.html'; then
            echo "Found rendered inline-literal markup problems." >&2
            exit 1
          fi
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import sys

          RAW_STRONG_RE = re.compile(r"\*\*[^\n]*?\*\*")
          IGNORED_PARTS = {"_modules", "api_doc"}
          IGNORED_TAGS = {"code", "pre", "script", "style"}


          class RawStrongScanner(HTMLParser):
              def __init__(self, source_path):
                  super().__init__(convert_charrefs=True)
                  self.source_path = source_path
                  self.ignored_stack = []
                  self.matches = []

              def handle_starttag(self, tag, attrs):
                  if tag in IGNORED_TAGS:
                      self.ignored_stack.append(tag)

              def handle_endtag(self, tag):
                  if tag in IGNORED_TAGS and tag in self.ignored_stack:
                      for index in range(len(self.ignored_stack) - 1, -1, -1):
                          if self.ignored_stack[index] == tag:
                              del self.ignored_stack[index]
                              break

              def handle_data(self, data):
                  if self.ignored_stack:
                      return
                  for match in RAW_STRONG_RE.finditer(data):
                      line, column = self.getpos()
                      self.matches.append((line, column + match.start(), match.group(0)))


          failures = []
          for root in (Path("/tmp/pyfcstm-docs-check-en"), Path("/tmp/pyfcstm-docs-check-zh")):
              for html_file in root.rglob("*.html"):
                  if IGNORED_PARTS.intersection(html_file.relative_to(root).parts):
                      continue
                  scanner = RawStrongScanner(html_file)
                  scanner.feed(html_file.read_text(encoding="utf-8", errors="replace"))
                  for line, column, marker in scanner.matches:
                      failures.append(f"{html_file}:{line}:{column}: {marker}")

          if failures:
              print("Found raw strong-emphasis markers in rendered narrative HTML.", file=sys.stderr)
              for failure in failures:
                  print(failure, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Verify large autodoc values remain hidden
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          for root in (
              Path('/tmp/pyfcstm-docs-check-en'),
              Path('/tmp/pyfcstm-docs-check-zh'),
          ):
              page = root / 'api_doc' / 'diagnostics' / 'codes.html'
              text = page.read_text(encoding='utf-8', errors='replace')
              if 'CODE_REGISTRY' not in text:
                  raise SystemExit('CODE_REGISTRY documentation is missing from {0}'.format(page))
              if 'mappingproxy(' in text or 'CodeSpec(code=' in text:
                  raise SystemExit('CODE_REGISTRY runtime value leaked into {0}'.format(page))
          PY

  docs_pdf:
    name: Docs PDF
    runs-on: ubuntu-24.04
    needs: detect_docs_routes
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty-v1.2023.6
        ports:
          - 18080:8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install docs PDF dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            graphviz \
            fonts-freefont-otf \
            latexmk \
            librsvg2-bin \
            make \
            mupdf-tools \
            pandoc \
            poppler-utils \
            qpdf \
            ripgrep \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-xetex
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-doc.txt
          python -m pip install -e . --no-deps
      - name: Verify XeLaTeX and PDF toolchain
        shell: bash
        run: |
          set -euo pipefail
          xelatex --version | head -n 1
          latexmk -v
          qpdf --version
          pdfinfo -v 2>&1 | head -n 1
          mutool -v
          kpsewhich xeCJK.sty
          kpsewhich FandolSong-Regular.otf
          fc-match -f '%{family}\n' FreeSerif | grep -F FreeSerif
      - name: Run PDF validator adversarial self-check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci/docs-pdf
          python tools/check_docs_pdf.py --check 2>&1 | tee .ci/docs-pdf/validator-self-check.log
      - name: Build and validate acceptance PDF
        env:
          PLANTUML_HOST: http://localhost:18080
        shell: bash
        run: |
          set -euo pipefail
          plantumlcli -c
          make docs_pdf 2>&1 | tee .ci/docs-pdf/build-output.log

          zh_seconds="$(cat docs/build/pdf/zh/duration-seconds.txt)"
          zh_tex="$(find docs/build/pdf/zh/latex -maxdepth 1 -type f -name '*.tex' -print -quit)"
          zh_pdf="${zh_tex%.tex}.pdf"
          {
            echo '## Acceptance PDF build'
            echo
            echo "* Chinese: \`${zh_seconds}s\`, \`${zh_pdf}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload PDF build evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: docs-pdf-evidence
          if-no-files-found: warn
          retention-days: 7
          path: |
            .ci/docs-pdf/*.log
            docs/build/pdf/**/*.pdf
            docs/build/pdf/**/build.log
            docs/build/pdf/**/duration-seconds.txt
            docs/build/pdf/**/latex/*.tex
            docs/build/pdf/**/latex/*.log
            docs/build/pdf/**/latex/*.ilg
            docs/build/pdf/**/latex/*.idx
            docs/build/pdf/**/latex/*.toc

  docs_resources:
    name: Docs generated resources
    runs-on: ubuntu-22.04
    needs: detect_docs_routes
    if: ${{ needs.detect_docs_routes.outputs.docs_resource_changed == 'true' }}
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty-v1.2023.6
        ports:
          - 18080:8080
    steps:
      - name: Checkout code
        uses: actions/checkout@v3.3.0
        with:
          fetch-depth: 20
          submodules: 'recursive'
      - name: Set up python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install docs resource dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends make graphviz pandoc
          dot -V
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-doc.txt
          python -m pip install -e . --no-deps
      - name: Build docs generated resources
        env:
          PLANTUML_HOST: http://localhost:18080
        shell: bash
        run: |
          plantumlcli -c
          make -C docs contents
      - name: Verify generated docs resources are committed
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
            git diff --exit-code -- docs/source
            untracked_docs="$(git ls-files --others --exclude-standard -- docs/source)"
            if [ -n "$untracked_docs" ]; then
              echo "Untracked docs resources were generated:" >&2
              echo "$untracked_docs" >&2
              exit 1
            fi
            exit 0
          fi

          mkdir -p .ci/docs-resources
          changed_file=.ci/docs-resources/changed-files.txt
          verify_file=.ci/docs-resources/verify-paths.txt

          if ! git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune origin \
              "+refs/heads/${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}"
          fi
          if ! git cat-file -e "${PR_HEAD_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --prune origin \
              "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}/head"
          fi

          git diff --name-only "${PR_BASE_SHA}" "${PR_HEAD_SHA}" > "$changed_file"

          python - <<'PY'
          from pathlib import Path

          changed_paths = [
              line.strip()
              for line in Path('.ci/docs-resources/changed-files.txt').read_text(
                  encoding='utf-8'
              ).splitlines()
              if line.strip()
          ]
          present_paths = set()
          absent_paths = set()

          generated_suffixes = (
              '.fcstm.puml',
              '.fcstm.puml.png',
              '.fcstm.puml.svg',
              '.puml.png',
              '.puml.svg',
              '.gv.png',
              '.gv.svg',
              '.demo.py.txt',
              '.demox.py.txt',
              '.demox.py.err',
              '.demox.py.exitcode',
              '.plot.py.svg',
              '.demo.sh.txt',
              '.demox.sh.txt',
              '.demox.sh.err',
              '.demox.sh.exitcode',
              '.result.ipynb',
          )

          def add_present(path):
              if path.startswith('docs/source/'):
                  present_paths.add(path)

          def add_absent(path):
              if path.startswith('docs/source/'):
                  absent_paths.add(path)

          def add_for_source(path, source_exists):
              if source_exists:
                  add_present(path)
              else:
                  add_absent(path)

          def changed_file_exists(path):
              return Path(path).exists()

          for changed_path in changed_paths:
              if changed_path.startswith('logos/'):
                  add_present('docs/source/_static/logos')
                  continue
              if not changed_path.startswith('docs/source/'):
                  continue
              source_exists = changed_file_exists(changed_path)
              if changed_path.endswith('.full.fcstm'):
                  stem = changed_path[:-len('.full.fcstm')]
                  add_for_source(stem + '.full.fcstm.puml', source_exists)
                  add_for_source(stem + '.full.fcstm.puml.png', source_exists)
                  add_for_source(stem + '.full.fcstm.puml.svg', source_exists)
              elif changed_path.endswith('.minimal.fcstm'):
                  stem = changed_path[:-len('.minimal.fcstm')]
                  add_for_source(stem + '.minimal.fcstm.puml', source_exists)
                  add_for_source(stem + '.minimal.fcstm.puml.png', source_exists)
                  add_for_source(stem + '.minimal.fcstm.puml.svg', source_exists)
              elif changed_path.endswith('.fcstm'):
                  stem = changed_path[:-len('.fcstm')]
                  add_for_source(stem + '.fcstm.puml', source_exists)
                  add_for_source(stem + '.fcstm.puml.png', source_exists)
                  add_for_source(stem + '.fcstm.puml.svg', source_exists)
              elif changed_path.endswith('.puml'):
                  add_for_source(changed_path + '.png', source_exists)
                  add_for_source(changed_path + '.svg', source_exists)
              elif changed_path.endswith('.gv'):
                  add_for_source(changed_path + '.png', source_exists)
                  add_for_source(changed_path + '.svg', source_exists)
              elif changed_path.endswith('.demo.py'):
                  add_for_source(changed_path + '.txt', source_exists)
              elif changed_path.endswith('.demox.py'):
                  add_for_source(changed_path + '.txt', source_exists)
                  add_for_source(changed_path + '.err', source_exists)
                  add_for_source(changed_path + '.exitcode', source_exists)
              elif changed_path.endswith('.plot.py'):
                  add_for_source(changed_path + '.svg', source_exists)
              elif changed_path.endswith('.demo.sh'):
                  add_for_source(changed_path + '.txt', source_exists)
              elif changed_path.endswith('.demox.sh'):
                  add_for_source(changed_path + '.txt', source_exists)
                  add_for_source(changed_path + '.err', source_exists)
                  add_for_source(changed_path + '.exitcode', source_exists)
              elif changed_path.endswith('.ipynb'):
                  add_for_source(changed_path[:-len('.ipynb')] + '.result.ipynb', source_exists)
              elif changed_path.endswith('.fcstm.puml.png'):
                  source = changed_path[:-len('.fcstm.puml.png')] + '.fcstm'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.fcstm.puml.svg'):
                  source = changed_path[:-len('.fcstm.puml.svg')] + '.fcstm'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.fcstm.puml'):
                  source = changed_path[:-len('.fcstm.puml')] + '.fcstm'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.puml.png'):
                  source = changed_path[:-len('.puml.png')] + '.puml'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.puml.svg'):
                  source = changed_path[:-len('.puml.svg')] + '.puml'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.gv.png'):
                  source = changed_path[:-len('.gv.png')] + '.gv'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.gv.svg'):
                  source = changed_path[:-len('.gv.svg')] + '.gv'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demo.py.txt'):
                  source = changed_path[:-len('.txt')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.py.txt'):
                  source = changed_path[:-len('.txt')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.py.err'):
                  source = changed_path[:-len('.err')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.py.exitcode'):
                  source = changed_path[:-len('.exitcode')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.plot.py.svg'):
                  source = changed_path[:-len('.svg')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demo.sh.txt'):
                  source = changed_path[:-len('.txt')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.sh.txt'):
                  source = changed_path[:-len('.txt')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.sh.err'):
                  source = changed_path[:-len('.err')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.demox.sh.exitcode'):
                  source = changed_path[:-len('.exitcode')]
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith('.result.ipynb'):
                  source = changed_path[:-len('.result.ipynb')] + '.ipynb'
                  add_for_source(changed_path, changed_file_exists(source))
              elif changed_path.endswith(generated_suffixes):
                  add_present(changed_path)

          with Path('.ci/docs-resources/verify-paths.txt').open('w', encoding='utf-8') as output:
              for path in sorted(present_paths | absent_paths):
                  print(path, file=output)
          with Path('.ci/docs-resources/verify-present-paths.txt').open('w', encoding='utf-8') as output:
              for path in sorted(present_paths):
                  print(path, file=output)
          with Path('.ci/docs-resources/verify-absent-paths.txt').open('w', encoding='utf-8') as output:
              for path in sorted(absent_paths):
                  print(path, file=output)
          PY

          echo "Docs generated resource paths checked for this PR:"
          cat "$verify_file"

          if [ -s "$verify_file" ]; then
            present_verify_file=.ci/docs-resources/verify-present-paths.txt
            absent_verify_file=.ci/docs-resources/verify-absent-paths.txt
            tracked_verify_file=.ci/docs-resources/tracked-verify-paths.txt
            ignored_verify_file=.ci/docs-resources/ignored-existing-paths.txt
            untracked_verify_file=.ci/docs-resources/untracked-existing-paths.txt
            missing_verify_file=.ci/docs-resources/missing-paths.txt
            stale_verify_file=.ci/docs-resources/stale-paths.txt
            : > "$tracked_verify_file"
            : > "$ignored_verify_file"
            : > "$untracked_verify_file"
            : > "$missing_verify_file"
            : > "$stale_verify_file"

            while IFS= read -r path; do
              if [ -z "$path" ]; then
                continue
              fi
              if [ -d "$path" ] || git ls-files --error-unmatch -- "$path" >/dev/null 2>&1; then
                printf '%s\n' "$path" >> "$tracked_verify_file"
              elif [ -e "$path" ]; then
                if git check-ignore -q --no-index -- "$path"; then
                  printf '%s\n' "$path" >> "$ignored_verify_file"
                else
                  printf '%s\n' "$path" >> "$untracked_verify_file"
                fi
              else
                printf '%s\n' "$path" >> "$missing_verify_file"
              fi
            done < "$present_verify_file"

            while IFS= read -r path; do
              if [ -z "$path" ]; then
                continue
              fi
              if [ -e "$path" ] || git ls-files --error-unmatch -- "$path" >/dev/null 2>&1; then
                printf '%s\n' "$path" >> "$stale_verify_file"
              fi
            done < "$absent_verify_file"

            if [ -s "$missing_verify_file" ]; then
              echo "Expected docs resources were not generated:" >&2
              cat "$missing_verify_file" >&2
              exit 1
            fi

            if [ -s "$stale_verify_file" ]; then
              echo "Docs resources were generated or committed for deleted sources:" >&2
              cat "$stale_verify_file" >&2
              exit 1
            fi

            if [ -s "$tracked_verify_file" ]; then
              xargs -a "$tracked_verify_file" -r git diff --exit-code --
              untracked_docs="$(xargs -a "$tracked_verify_file" -r git ls-files --others --exclude-standard --)"
              if [ -n "$untracked_docs" ]; then
                echo "Untracked docs resources were generated:" >&2
                echo "$untracked_docs" >&2
                exit 1
              fi
            fi

            if [ -s "$untracked_verify_file" ]; then
              echo "Untracked docs resources were generated:" >&2
              cat "$untracked_verify_file" >&2
              exit 1
            fi

            if [ -s "$ignored_verify_file" ]; then
              echo "Ignored generated docs resources exist and are intentionally not committed:"
              cat "$ignored_verify_file"
            fi
          fi
